function normalizeAssetClass(v) {
  if (!v) return "";
  const u = v.toString().toUpperCase().trim();
  if (u.includes("OBBLIG")) return "Obbligazioni";
  if (u.includes("AZIONI") || u === "AZIONI") return "Azioni";
  if (u.includes("COMMODIT")) return "Commodities";
  if (u.includes("CRYPTO")) return "Crypto";
  if (u.includes("FONDI") || u.includes("FONDO")) return "Fondi";
  if (u.includes("MULTI")) return "Multi Asset";
  return v;
}
function rowToAnagrafe(r, fiscMap) {

  // fiscMap è { fiscale_id: {prodotto, type} }.
  // Se fiscMap manca o l'id non si trova, fallback alle colonne r.type/r.prodotto
  // (compatibilità con vecchio comportamento e backup_20260604).
  let prodotto = r.prodotto || "";
  let typeRaw  = r.type || "";
  if (fiscMap && r.fiscale_id != null) {

    if (f) {

    id: r.id,
    isin: r.isin||"",
    asset: r.asset||"",
    assetClass: normalizeAssetClass(typeRaw),
    ticker: r.ticker||"",
    prodotto: prodotto,
    fiscale_id: r.fiscale_id!=null ? Number(r.fiscale_id) : null,

}

async function fetchWithTimeout(url, opts, ms=20000) {
  // AbortSignal.timeout uses platform timer — not throttled when tab is hidden
  const signal = (typeof AbortSignal !== "undefined" && AbortSignal.timeout)
    ? AbortSignal.timeout(ms)
    : undefined;
  try {
    const r = await fetch(url, signal ? {...opts, signal} : opts);
    return r;
  } catch(e) {
    if(e.name==="TimeoutError"||e.name==="AbortError")
      throw new Error("Request timeout — riprova");
    throw e;
  }
}

async function saveLastKnownPrice(anagrafeId, cacheKey, price, source, userId, changePct, priceDate) {
  if(!anagrafeId || !price) return;
  // price_date: data del prezzo (formato YYYY-MM-DD, Europe/Rome).
  //   - source="live"   → arriva dal provider (Yahoo regularMarketTime / Borsa Italiana)
  //   - source="manual" → l'utente ha inserito il prezzo, usiamo today
  //   - fallback se non passato → today (retrocompatibilità)
  if(!priceDate) {
    const now = new Date();
    const rome = new Date(now.toLocaleString("en-US", { timeZone: "Europe/Rome" }));
    priceDate = `${rome.getFullYear()}-${String(rome.getMonth()+1).padStart(2,"0")}-${String(rome.getDate()).padStart(2,"0")}`;
  }
  // GUARD: regola di aggiornamento cache.
  //  - manuale: sempre aggiorna (l'utente forza)
  //  - live: aggiorna se priceDate STRETTAMENTE più recente di cache.price_date,
  //          oppure se stessa data ma prezzo cambiato (mercato live durante giornata).
  //
  // CRITICO: updated_at viene avanzato a now() SOLO quando priceDate avanza.
  // Se priceDate è uguale (es. mattina prima dell'apertura, Yahoo dà ancora ieri
  // con un micro-adjustment), aggiorniamo il prezzo MA conserviamo updated_at vecchio.
  // Così lkpFresh (basata su updated_at) resta false e change_pct mostrato è 0.
  let preserveUpdatedAt = null;
  if(source !== "manual" && cacheKey) {
    const existing = _pricesCache[cacheKey];
    if(existing && existing.price_date) {
      if(priceDate < existing.price_date) return;  // data ricevuta più vecchia, skip
      if(priceDate === existing.price_date && Number(price) === Number(existing.price)) return;
      if(priceDate === existing.price_date) {
        // Stessa data, prezzo diverso → aggiorna prezzo ma NON updated_at
        preserveUpdatedAt = existing.updated_at;
      }
      // priceDate > existing.price_date → aggiorna tutto (updated_at = now)
    }
  }
  const newUpdatedAt = preserveUpdatedAt || new Date().toISOString();
  if(cacheKey) _pricesCache[cacheKey] = {price, source: source||"live", updated_at: newUpdatedAt, change_pct: (changePct!=null?changePct:null), price_date: priceDate};
  // Demo: aggiorna solo cache in-memory, non scrive su DB condiviso
  if(_isDemo) return;
  try {
    const hdr = getHdr();
    const r = await fetchWithTimeout(`${SB_URL}/rest/v1/price_cache_new?on_conflict=anagrafe_id`, {
      method: "POST",
      headers: {...hdr, "Prefer": "return=minimal,resolution=merge-duplicates"},
      body: JSON.stringify({
        anagrafe_id: anagrafeId,
        last_price: price,
        tipo: source||"live",
        updated_by: userId||_currentSession?.user?.id,
        updated_at: newUpdatedAt,
        change_pct: (changePct!=null?changePct:null),
        price_date: priceDate
      })
    });
    if(!r.ok) console.error("price_cache_new failed:", r.status, await r.text());
  } catch(e) { console.warn("price_cache_new save failed", e); }
}

async function sbLoad(table, impersonateUid) {
  // v600 — demo segue il flusso utenti normali: legge sempre transactions_new/snapshot6,
  // nessun redirect a txdemo/snapdemo. L'editing resta bloccato a livello UI (message box).
  const realTable = table;
  // PostgREST limita a 1000 righe per richiesta (default db-max-rows). L'header
  // Range NON supera questo limite, viene troncato silenziosamente. Per leggere
  // tabelle con >1000 record (es. anagrafe) serve PAGINARE.
  const PAGE_SIZE = 1000;
  const baseUrl = `${SB_URL}/rest/v1/${realTable}?select=*&order=id`
    + (impersonateUid ? `&user_id=eq.${impersonateUid}` : "");

  const all = [];
  let from = 0;
  while (true) {
    const to = from + PAGE_SIZE - 1;
    const hdr = {...getHdr(), "Range-Unit": "items", "Range": `${from}-${to}`};
    let r;
    try {
      r = await fetchWithTimeout(baseUrl, {headers: hdr});
    } catch(netErr) {
      throw new Error(`Rete: ${netErr.message}`);
    }
    // 200 = pagina completa, 206 = parziale (entrambi OK)
    if (!r.ok && r.status !== 206) {
      let txt=""; try{txt=await r.text();}catch(e){}
      throw new Error(`HTTP ${r.status} su ${realTable}: ${txt.slice(0,200)}`);
    }
    const page = await r.json();
    all.push(...page);
    if (page.length < PAGE_SIZE) break;  // ultima pagina
    from += PAGE_SIZE;
    if (from > 100000) break;  // safety stop
  }
  return all;
}

// Carica solo i record anagrafe richiesti per id. Usato per lazy load all'avvio:
// carichiamo solo i record che servono per le tx dell'utente, non tutta l'anagrafe.
async function sbLoadAnagrafeByIds(ids) {
  if(!ids || ids.length===0) return [];
  // Limite query string lungo: se ci sono > 500 ids, splittiamo in batch.
  const BATCH = 500;
  const all = [];
  for (let i=0; i<ids.length; i+=BATCH) {
    const slice = ids.slice(i, i+BATCH);
    const idsList = slice.map(x=>String(x)).join(",");
    const hdr = {...getHdr(), "Range-Unit": "items", "Range": "0-999"};
    const url = `${SB_URL}/rest/v1/anagrafe?select=*&id=in.(${idsList})`;
    const r = await fetchWithTimeout(url, {headers: hdr});
    if(!r.ok && r.status !== 206) {
      let txt=""; try{txt=await r.text();}catch(e){}
      throw new Error(`HTTP ${r.status} su anagrafe?id=in: ${txt.slice(0,200)}`);
    }
    const page = await r.json();
    all.push(...page);
  }
  return all;
}

// Data odierna in fuso Europe/Rome (YYYY-MM-DD).
// Importante: coincide con la price_date che i provider (Yahoo, Borsa Italiana)
// restituiscono per i prezzi italiani — evita disallineamenti dovuti a UTC.
const today = () => {
  const now = new Date();
  const rome = new Date(now.toLocaleString("en-US", { timeZone: "Europe/Rome" }));
  return `${rome.getFullYear()}-${String(rome.getMonth()+1).padStart(2,"0")}-${String(rome.getDate()).padStart(2,"0")}`;
};
// Data di ieri in fuso Europe/Rome (YYYY-MM-DD).

// applicare a queste la variazione "di oggi" calcolata su change_pct
// (che si riferisce al prezzo di chiusura di ieri, non al prezzo di carico).
const yesterday = () => {
  const now = new Date();
  const rome = new Date(now.toLocaleString("en-US", { timeZone: "Europe/Rome" }));
  rome.setDate(rome.getDate() - 1);
  return `${rome.getFullYear()}-${String(rome.getMonth()+1).padStart(2,"0")}-${String(rome.getDate()).padStart(2,"0")}`;
};
// Lunedì della settimana corrente (Rome-agnostic, basato su data locale), formato YYYY-MM-DD.
// Coerente con week_start scritto dal cron weekly_cache_update.
const mondayOfCurrentWeek = () => {
  const d = new Date();
  const dow = d.getDay();            // 0=domenica, 1=lunedì
  const diff = (dow === 0 ? 6 : dow - 1); // giorni da sottrarre per arrivare a lunedì
  d.setDate(d.getDate() - diff);
  return d.toISOString().slice(0,10);
};

const fN = (n, d=0) => {
  if (n==null||isNaN(n)) return "—";
  const v = Object.is(n,-0)?0:n; n=v;
  const abs = Math.abs(n).toFixed(d);
  const [int, dec] = abs.split(".");
  const grouped = int.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const formatted = dec !== undefined && d > 0 ? grouped + "," + dec : grouped;
  return (n < 0 ? "-" : "") + formatted;

const fP = (n, d=1) => n==null||isNaN(n) ? "—" : fN(n,d) + "%";

};

function wavgAt(txs, date) {
  const pos = {};
  const filtered = [...txs].filter(t => t.type !== "INCOME" && t.date <= date)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const tx of filtered) {
    const k = tx.instrument;
    if (!pos[k]) pos[k] = {qty:0, cost:0, assetClass:tx.assetClass, instrument:tx.instrument, isin:tx.isin||""};
    if (tx.type === "BUY") {
      pos[k].qty += tx.qty;
      pos[k].cost += tx.totale;
    } else if (tx.type === "SELL" && pos[k].qty > 0) {
      const avg = pos[k].cost / pos[k].qty;
      pos[k].cost -= avg * tx.qty;
      pos[k].qty = Math.max(0, pos[k].qty - tx.qty);
      if (pos[k].qty === 0) pos[k].cost = 0;
    }
  }
  return pos;
}
function investitoAt(txs, date) {
  return Object.values(wavgAt(txs, date)).reduce((s,p) => s + (p.qty>0 ? p.cost : 0), 0);
}
// Ricalcola {live, bond} positions da newTxs+anagrafe senza usare lo stato React.
// Usato dai caller di snapCurrentMonth dopo setTxs() per evitare stale closure.
function positionsFromTxs(txs, anagrafe) {
  const pos = wavgAt(txs, today());
  const all = Object.values(pos);
  const live = all
    .filter(p => p.qty > 0 && p.assetClass !== "Obbligazioni")
    .map(p => {
      const anag = anagrafe.find(a => a.asset.trim().toLowerCase() === p.instrument.trim().toLowerCase()) || {};
      return {...p, id: anag.id||null, ticker: anag.ticker||"", isin: anag.isin||"", prodotto: anag.prodotto||""};
    });
  const bond = all
    .filter(p => p.qty > 0 && p.assetClass === "Obbligazioni")
    .map(p => {
      const anag = anagrafe.find(a => a.asset.trim().toLowerCase() === p.instrument.trim().toLowerCase()) || {};
      return {...p, id: anag.id||null, isin: anag.isin||"", ticker: anag.ticker||"", prodotto: anag.prodotto||""};

}
function snapAt(snaps, date) {
  const s = [...snaps].sort((a,b) => a.date.localeCompare(b.date)).filter(x => x.date <= date);
  return s.length ? s[s.length-1].value : null;
}
// Last snap date at or before date
function mediaPesata(txs, from, to) {
  const eventDates = [...new Set(
    [from, ...txs.filter(t => t.type!=="INCOME" && t.date>=from && t.date<=to).map(t=>t.date), to]
  )].sort();
  let totW = 0, totD = 0;
  for (let i = 0; i < eventDates.length-1; i++) {

    const days = (new Date(d1) - new Date(d0)) / 86400000;

    const posBefore = wavgAt(txs.filter(t => t.date < sell.date), sell.date);
    const p = posBefore[sell.instrument];

  const initialSnap2 = snaps.find(s=>s.is_initial);
  const allDates2 = txs.map(t=>t.date).filter(Boolean).sort();
  const realStart2 = initialSnap2?.date || allDates2[0] || mStart;
  const mpBaseRaw = mStart > prevMEnd ? mStart : prevMEnd;
  const mpFrom = (realStart2 > mpBaseRaw && realStart2 <= mEnd) ? realStart2 : mpBaseRaw;
  const mp = mediaPesata(txs, mpFrom, mEnd);
  const pct = mp > 0 ? (rendimento/mp)*100 : null;
  return {plOpen, plClose, cedole, tax, rendimento, pct, mediaInv:mp};
}

const INST_COLORS = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a78bfa","#fb923c","#34d399","#e879f9"];
// Colore deterministico per nome strumento — hash → HSL.
// Usa luminosità medio-alta e saturazione alta per restare leggibile su tema scuro.
const instColor = (name) => {
  const s = String(name||"");
  let h = 0;
  for (let i=0; i<s.length; i++) h = ((h<<5) - h + s.charCodeAt(i)) & 0xffffffff;
  const hue = Math.abs(h) % 360;
  // varia leggermente saturazione (62-78%) e luminosità (56-68%) in base ad altri bit dell'hash
  const sat = 62 + (Math.abs(h>>9) % 17);
  const lig = 56 + (Math.abs(h>>17) % 13);
  return `hsl(${hue} ${sat}% ${lig}%)`;
};

      }).flat().filter(Boolean)}

function Donut({slices, total, onSliceClick, colorFn, highlight, onClear}) {
  if (!total||!slices.length) return <div className="empty">Nessuna posizione aperta</div>;
  const getCol = colorFn || acColor;
  const R=100,cx=150,cy=120,ir=78,single=slices.length===1;
  let ang=-Math.PI/2;
  const arcs=slices.map((s,ci)=>{
    const col=getCol(s.label);
    const op = highlight==null ? 0.9 : (highlight===s.label ? 0.95 : 0.18);
    const startAng = ang;
    if (single) {
      return{...s,path:null,col,op,midAng:startAng+Math.PI};
    }
    const sw=(s.value/total)*2*Math.PI*0.999;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    const midAng = ang + sw/2;
    ang+=sw;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const lg=sw>Math.PI?1:0;
    const xi1=cx+ir*Math.cos(ang-sw),yi1=cy+ir*Math.sin(ang-sw);
    const xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    return{...s,path:`M${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${lg} 0 ${xi1},${yi1}Z`,col,op,midAng};
  });
  // Etichetta callout per fetta selezionata
  const activeArc = highlight!=null ? arcs.find(a=>a.label===highlight) : null;
  let callout = null;
  if(activeArc){
    const lr = R + 14; // raggio etichetta
    const lx = cx + lr*Math.cos(activeArc.midAng);
    const ly = cy + lr*Math.sin(activeArc.midAng);
    const anchor = lx < cx-10 ? "end" : (lx > cx+10 ? "start" : "middle");
    callout = (
      <g style={{pointerEvents:"none"}}>
        <text x={lx} y={ly} textAnchor={anchor} fontSize="13" fontWeight="700"
          fill="var(--t)" fontFamily="Helvetica Neue,Helvetica,Arial,sans-serif" dominantBaseline="middle"
          stroke="var(--bg)" strokeWidth="3" paintOrder="stroke">
          {fN(activeArc.value)}
        </text>
      </g>
    );
  }
  return (
    <div style={{display:"flex",justifyContent:"center"}}
      onClick={onClear?function(e){
        // click su area vuota del wrapper (non sulle fette) → reset
        if(e.target.tagName!=="path" && e.target.tagName!=="rect") onClear();
      }:null}>
      <svg width="300" height="240" viewBox="0 0 300 240">
        {/* Background click target per area attorno al donut (rect intero) */}
        <rect x="0" y="0" width="300" height="240" fill="transparent"
          onClick={onClear?function(e){e.stopPropagation();onClear();}:null}
          style={{cursor:onClear&&highlight!=null?"pointer":"default"}}/>
        {arcs.map((a,i)=>a.path
          ?<path key={i} d={a.path} fill={a.col} opacity={a.op} style={{cursor:onSliceClick?"pointer":"default",transition:"opacity .15s"}} onClick={onSliceClick?function(e){e.stopPropagation();onSliceClick(a.label);}:null}/>
          :<g key={i} style={{cursor:onSliceClick?"pointer":"default"}} onClick={onSliceClick?function(e){e.stopPropagation();onSliceClick(a.label);}:null}><circle cx={cx} cy={cy} r={R} fill={a.col} opacity={a.op}/><circle cx={cx} cy={cy} r={ir} fill="var(--s1)"/></g>
        )}
        {/* Foro centrale cliccabile per clear */}
        <circle cx={cx} cy={cy} r={ir-2} fill="var(--s1)"
          onClick={onClear?function(e){e.stopPropagation();onClear();}:null}
          style={{cursor:onClear&&highlight!=null?"pointer":"default"}}/>
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="10" fill="var(--m)" fontFamily="Helvetica Neue,Helvetica,Arial,sans-serif" fontWeight="700" letterSpacing="1" style={{pointerEvents:"none"}}>TOTALE</text>
        <text x={cx} y={cy+14} textAnchor="middle" fontSize="18" fill="var(--t)" fontFamily="Helvetica Neue,Helvetica,Arial,sans-serif" fontWeight="700" style={{pointerEvents:"none"}}>
          {total>=1000?`${(total/1000).toFixed(1)}k`:fN(total)}
        </text>
        {callout}
      </svg>
    </div>
  );
}

const EMPTY={date:today(),type:"",assetClass:"",prodotto:"",instrument:"",isin:"",ticker:"",anagrafeId:null,qty:"",price:"",commission:"",tax:"",amount:"",commenti:""};

function LiveView({livePositions,bondPositions,qtyYesterdayMap,livePrices,bondPrices,manualBondPrices,setManualBondPrices,liveLoading,lastUpdated,holdingsView,setHoldingsView,snaps,weeklyCache,setSyncStatus,onRefresh,sbUpdate,sbInsert,snapToRow,snapCurrentMonth,userId,isImpersonating,forceView}) {
  var qtyYest = qtyYesterdayMap || {};
  var view = forceView || holdingsView;
  var [leftMode, setLeftMode] = React.useState(function(){ return localStorage.getItem("tf_holdings_left_box")==="weekly"?"weekly":"default"; });
  function toggleLeftMode(){
    setLeftMode(function(m){ var n=m==="default"?"weekly":"default"; localStorage.setItem("tf_holdings_left_box", n); return n; });
  }
  var [manualPriceModal, setManualPriceModal] = React.useState(null); // {anagrafeId, cacheKey, asset, currentPrice}
  var [manualPriceVal, setManualPriceVal] = React.useState("");
  var [allocOverlay, setAllocOverlay] = React.useState(null); // assetClass label or null
  var [collapsed, setCollapsed] = React.useState(function(){ return localStorage.getItem("tf_holdings_collapsed")==="1"; });
  var [sortMode, setSortMode] = React.useState(function(){ return localStorage.getItem("tf_holdings_sort") || "default"; });
  var [sortOpen, setSortOpen] = React.useState(false);
  var sortMenuRef = React.useRef(null);
  React.useEffect(function(){
    if(!sortOpen) return;
    function onDoc(e){ if(sortMenuRef.current && !sortMenuRef.current.contains(e.target)) setSortOpen(false); }
    document.addEventListener("mousedown", onDoc);
    return function(){ document.removeEventListener("mousedown", onDoc); };
  },[sortOpen]);
  function chooseSortMode(m){ setSortMode(m); localStorage.setItem("tf_holdings_sort", m); setSortOpen(false); }
  var [allocExpanded, setAllocExpanded] = React.useState(function(){ return localStorage.getItem("tf_alloc_expanded")==="1"; });
  var [allocHighlight, setAllocHighlight] = React.useState(null); // label of highlighted slice/row

  // effectiveBondPrices: live → manual → cache
  var effectiveBondPrices = {};
  bondPositions.forEach(function(p){
    if(p.isin) {
      var auto = bondPrices[p.isin];
      var manual = manualBondPrices[p.isin];
      var lkpE = _pricesCache[p.isin]||null;
      if(manual) effectiveBondPrices[p.isin] = {price:manual.price, change_pct:null, stale:false};
      else if(auto && auto.price>0) effectiveBondPrices[p.isin] = auto;
      else if(lkpE) effectiveBondPrices[p.isin] = {price:lkpE.price, change_pct:null, stale:true};
      else effectiveBondPrices[p.isin] = null;
    }
  });

  // Logica prezzo unica per ogni posizione (bond o non-bond)
  function getPos(p) {
    var isBond = p.assetClass==="Obbligazioni";
    var cacheKey = p.isin;
    var manualP = manualBondPrices[cacheKey];
    var lkp = _pricesCache[cacheKey]||null;
    var rawPrice=null, changePct=null, stale=false;
    // Sorgente live (consolidata): bond → effectiveBondPrices; resto → livePrices[ticker]
    // Nota: fetchLivePrices ha già applicato il fallback su lkp internamente,
    // quindi `live` qui contiene tutto quello che serve (price + change_pct + stale).
    var live = isBond ? effectiveBondPrices[cacheKey] : livePrices[p.ticker || p.isin];

    if (manualP) {
      rawPrice  = manualP.price;
      changePct = (manualP.change_pct!=null) ? manualP.change_pct : null;
    } else if (live && live.price>0) {
      rawPrice  = live.price;
      changePct = (live.change_pct!=null) ? live.change_pct : null;
      if (live.stale) stale = true;
    }
    // ── Fondi: come tutti gli altri, niente eccezioni (per ora) ──
    var ctv = rawPrice!=null ? rawPrice*p.qty : null;
    // ── varEur: formula unica per tutti = ctv × pct / (100 + pct) ──
    // Matematica: pct si riferisce a "variazione rispetto a ieri", quindi il prezzo
    // di ieri è price/(1+pct/100). varEur = ctv − ctv_ieri = ctv × pct/(100+pct).
    var varEur = null;
    if(ctv!=null && changePct!=null && changePct!==0) {
      varEur = ctv * changePct / (100 + changePct);
    } else if(ctv!=null && changePct===0) {
      varEur = 0;
    }
    // Posizione apert oggi (qty=0 ieri): non esiste un "ieri" da cui calcolare
    // la variazione giornaliera via change_pct. La var. di oggi coincide col
    // P/L dall'apertura (ctv - cost), cioè tutto il guadagno/perdita è di oggi.
    if(ctv!=null && (qtyYest[p.instrument]||0)<=0) {
      varEur = ctv - p.cost;
    }
    return {rawPrice, ctv, changePct, stale, isBond, varEur};
  }

  // Tutte le posizioni
  var allPos = [];
  livePositions.forEach(function(p){ allPos.push(p); });
  bondPositions.forEach(function(p){ allPos.push(p); });

  // Grand total e inv
  var grandTotal=0, totInvAll=0;
  allPos.forEach(function(p){
    var g=getPos(p);
    grandTotal+=g.ctv!=null?g.ctv:p.cost;
    totInvAll+=p.cost;
  });
  // Aggiorna global per auto-snapshot da App
  window._tf_grand_total = grandTotal;
  var totDiffAll=grandTotal-totInvAll;
  var totDiffPctAll=totInvAll>0?(totDiffAll/totInvAll)*100:null;

  // Performance settimanale: (cval-inv) oggi − (cval-inv) lunedì.
  // weeklyCache = riga da weekly_cache (o null se non ancora popolata).
  var weeklyDiff=null, weeklyDiffPct=null;
  if(weeklyCache && weeklyCache.cval_week!=null && weeklyCache.inv_week!=null){
    var plOpenNow = grandTotal - totInvAll;
    var plOpenWeek = Number(weeklyCache.cval_week) - Number(weeklyCache.inv_week);
    weeklyDiff = plOpenNow - plOpenWeek;
    weeklyDiffPct = Number(weeklyCache.cval_week)>0 ? (weeklyDiff/Number(weeklyCache.cval_week))*100 : null;
  }

  // Donut
  var byAC={};
  allPos.forEach(function(p){
    var g=getPos(p);
    var v=g.ctv!=null?g.ctv:p.cost;
    byAC[p.assetClass]=(byAC[p.assetClass]||0)+v;
  });
  var donutSlices=Object.entries(byAC).filter(function(e){return e[1]>0;}).map(function(e){
    return {label:e[0],value:e[1],pct:grandTotal>0?(e[1]/grandTotal)*100:0};
  });

  // Day totals — var giornaliera in euro = ctv × change_pct / (100 + change_pct)
  var totVarDay=0, hasDayVar=false;
  allPos.forEach(function(p){
    var g=getPos(p);
    if(g.varEur!=null){ totVarDay+=g.varEur; hasDayVar=true; }
  });
  var varDayPct=grandTotal>0&&hasDayVar?(totVarDay/grandTotal)*100:null;

  // Asset cards — nuovo layout grid 2x4
  function renderRows(view) {
    var allPositions = [];
    livePositions.forEach(function(p){ allPositions.push({...p, isBond:false}); });
    bondPositions.forEach(function(p){ allPositions.push({...p, isBond:true}); });

    // ── Calcola metriche per una posizione ──
    function computeMetrics(p){
      var cacheKey=p.isin;
      var manualP=manualBondPrices[cacheKey];
      var lkp=_pricesCache[cacheKey]||null;
      var rawPrice=null, changePct=null, stale=false;
      var live = p.isBond ? effectiveBondPrices[cacheKey] : livePrices[p.ticker || p.isin];
      if (manualP) {
        rawPrice  = manualP.price;
        changePct = (manualP.change_pct!=null) ? manualP.change_pct : null;
      } else if (live && live.price>0) {
        rawPrice  = live.price;
        changePct = (live.change_pct!=null) ? live.change_pct : null;
        if (live.stale) stale = true;
      }
      var ctv=rawPrice!=null?rawPrice*p.qty:null;
      var diff=ctv!=null?ctv-p.cost:null;
      var diffPct=p.cost>0&&diff!=null?(diff/p.cost)*100:null;
      // varEur: formula unica ctv × pct/(100+pct), uguale per tutti.
      var varEur = null;
      if(ctv!=null && changePct!=null && changePct!==0) {
        varEur = ctv * changePct / (100 + changePct);
      } else if(ctv!=null && changePct===0) {
        varEur = 0;
      }
      // Posizione apert oggi (qty=0 ieri): la var. di oggi coincide col P/L
      // dall'apertura (diff/diffPct), non con change_pct (riferito a ieri).
      if(ctv!=null && (qtyYest[p.instrument]||0)<=0) {
        varEur = diff;
        changePct = diffPct;
      }
      return {cacheKey,manualP,lkp,rawPrice,changePct,stale,ctv,diff,diffPct,varEur};
    }

    // ── Sort helpers ──
    function sortKey(item){
      if(sortMode==="pl_pct_oggi") return item.changePct;
      if(sortMode==="pl_val_oggi") return item.varEur;
      if(sortMode==="pl_pct_aperte") return item.diffPct;
      if(sortMode==="pl_val_aperte") return item.diff;
      return null;
    }
    function sortCmp(a,b){
      var va=sortKey(a), vb=sortKey(b);
      if(va==null && vb==null) return 0;
      if(va==null) return 1;
      if(vb==null) return -1;
      return vb-va; // decrescente
    }

      var rawPrice=m.rawPrice, changePct=m.changePct, stale=m.stale;
      var lkp=m.lkp, manualP=m.manualP, cacheKey=m.cacheKey;

          </div>
          <div className="hsub">{qtyStr} @ {pmcStr} = {totStr}</div>
          <div className="hval">{c3Val}</div>
          <div className={"hpct "+rowSign}>{c4Val}</div>
          <div className={"hdiff "+rowSign}>{c4Diff}</div>
        </div>
      );
    }

            var bp=effectiveBondPrices[cacheKey];
            rawPrice=manualP?manualP.price:(bp&&bp.price>0?bp.price:(_pricesCache[cacheKey]?_pricesCache[cacheKey].price:null));
          } else {
            var lp=livePrices[p.ticker || p.isin];
            rawPrice=manualP?manualP.price:(lp&&lp.price?lp.price:null);
          }
          var ctv=rawPrice!=null?rawPrice*p.qty:null;
          return {instrument:p.instrument, value:(ctv!=null?ctv:p.cost)};
        }).sort(function(a,b){return b.value-a.value;});
        var catTotal = values.reduce(function(a,b){return a+b.value;},0);
        return (
          <div className="modal-bg" onClick={function(){setAllocOverlay(null);}}>
            <div className="modal" style={{maxWidth:400}} onClick={function(e){e.stopPropagation();}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{width:14,height:14,borderRadius:"50%",background:acColor(allocOverlay)}}/>
                  <span className="mtitle" style={{textTransform:"uppercase"}}>{allocOverlay}</span>
                </div>
                <button className="mx" onClick={function(){setAllocOverlay(null);}}>✕</button>
              </div>
              <div style={{fontSize:12,color:"var(--m)",fontFamily:"var(--mono)",marginBottom:10}}>
                {values.length} strument{values.length===1?"o":"i"} · Totale {fN(catTotal)}
              </div>
              <div style={{maxHeight:"60vh",overflowY:"auto"}}>
                {values.map(function(a,i){
                  var pct = catTotal>0?(a.value/catTotal)*100:0;
                  return (
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                      padding:"10px 4px",borderBottom:"1px solid var(--b)",gap:10}}>
                      <div style={{fontWeight:700,color:"var(--t)",fontSize:14,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {a.instrument}
                      </div>
                      <div style={{display:"flex",gap:14,fontFamily:"var(--mono)",fontWeight:700,flexShrink:0}}>
                        <span style={{color:"var(--t)"}}>{fN(a.value)}</span>
                        <span style={{color:"var(--t)",minWidth:50,textAlign:"right"}}>{fP(pct,1)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Modal prezzo manuale */}
      {manualPriceModal&&<div className="modal-bg" onClick={function(){setManualPriceModal(null);setManualPriceVal("");}}>
        <div className="modal" style={{maxWidth:340}} onClick={function(e){e.stopPropagation();}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span className="mtitle">Prezzo manuale</span>
            <button className="mx" onClick={function(){setManualPriceModal(null);setManualPriceVal("");}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            <div className="fg"><label>Data</label><input disabled value={today()}/></div>
                        <div className="fg"><label>Asset</label><input disabled value={manualPriceModal.asset}/></div>
                                    <div className="fg"><label>Prezzo</label>
              <input autoFocus type="number" inputMode="decimal" step="0.01" placeholder="es. 98.50"
                value={manualPriceVal}
                onChange={function(e){setManualPriceVal(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")document.getElementById("btn-save-manual-price").click();}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="btn" onClick={function(){setManualPriceModal(null);setManualPriceVal("");}}>Annulla</button>
            <button id="btn-save-manual-price" className="btn bp" onClick={function(){
              var v=parseFloat(manualPriceVal.replace(",","."));
              if(!v||v<=0) return;
              var aid=manualPriceModal.anagrafeId;
              var ck=manualPriceModal.cacheKey;
              try {
                var oldPrice = (_pricesCache[ck] && _pricesCache[ck].price>0) ? _pricesCache[ck].price : null;
                var newChangePct = (oldPrice!=null) ? Math.round(((v-oldPrice)/oldPrice)*10000)/100 : null;
                setManualBondPrices(function(prev){var n=Object.assign({},prev);n[ck]={price:v,change_pct:newChangePct,manual:true};return n;});
                saveLastKnownPrice(aid,ck,v,"manual",userId,newChangePct,today());
                onRefresh();
                setTimeout(function(){
                  // v600 — nessuna logica duplicata: richiama la stessa snapCurrentMonth
                  // usata ovunque (usa manualBondPrices via closure esterna, già aggiornato
                  // sopra), che scrive SOLO su snapshot6 (FI/RA), non più su "snapshot".
                  if(snapCurrentMonth) snapCurrentMonth().catch(function(e){console.error("snap sync error",e);});
                },1500);
              } catch(err) { console.error("manualPrice save error:", err); }
              setManualPriceModal(null);
              setManualPriceVal("");
            }}>Salva</button>
          </div>
        </div>
      </div>}
    </div>
  );
}



function TxDetailModal({tx, onClose, onSave, onDelete}) {
  const [edit, setEdit] = useState(false);
  const [f, setF] = useState({date:tx.date,qty:tx.qty,price:tx.price,tax:tx.tax,commission:tx.commission,commenti:tx.commenti||""});
  const isBond = tx.assetClass==="Obbligazioni";
  const isI = tx.type==="INCOME";
  // Guard anti-doppio click su Salva (edit tx)
  const savingRef = React.useRef(false);
  const [isSaving, setIsSaving] = React.useState(false);
  const handleSave = async () => {
    if(savingRef.current) return;
    savingRef.current = true;
    setIsSaving(true);
    try {
      await onSave({...tx,...f,qty:isI?0:+f.qty,price:isI?(+f.amount||0):+f.price,amount:isI?(+f.amount||0):null,tax:+f.tax||0,commission:+f.commission||0});
    } finally {
      savingRef.current = false;
      setIsSaving(false);
    }
  };
  const inp = (key,type="text",opts={}) => <input type={type} value={f[key]??""} onChange={e=>setF(p=>({...p,[key]:e.target.value}))}
    disabled={!edit} {...opts}
    style={{background:edit?"var(--bg)":"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",
      color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",
      opacity:1,cursor:edit?"auto":"not-allowed",background:edit?"var(--bg)":"var(--s2)",borderStyle:edit?"solid":"dashed",color:edit?"var(--t)":"var(--m)"}}/>;
  return (
    <div className="modal-bg" onClick={()=>{onClose();setEdit(false);}}>
      <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <div className="mtitle">{tx.instrument}</div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <button className="ic" title="Modifica" onClick={()=>setEdit(e=>!e)}>✏️</button>
            <button className="ic del" title="Elimina" onClick={onDelete}>🗑</button>
            <button className="mx" onClick={()=>{onClose();setEdit(false);}}>✕</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"12px 0"}}>
          <div className="fg"><label>Data</label>
            <input type="date" value={f["date"]??""} disabled
              style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",
                color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",
                boxSizing:"border-box",opacity:0.75,cursor:"not-allowed"}}/></div>
          <div className="fg"><label>Operazione</label>
            <input disabled value={tx.type} style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",opacity:0.6,cursor:"not-allowed"}}/>
          </div>
          <div className="fg"><label>Strumento</label>
            <input disabled value={tx.prodotto||"—"} style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",opacity:0.6,cursor:"not-allowed"}}/>
          </div>
          <div className="fg"><label>Asset class</label>
            <input disabled value={tx.assetClass} style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",opacity:0.6,cursor:"not-allowed"}}/>
          </div>
          <div className="fg"><label>ISIN</label>
            <input disabled value={tx.isin||"—"} style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",opacity:0.6,cursor:"not-allowed"}}/>
          </div>
          <div className="fg"><label>Ticker</label>
            <input disabled value={tx.ticker||"—"} style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",opacity:0.6,cursor:"not-allowed"}}/>
          </div>
          {!isI&&<div className="fg"><label>Quantità</label>{inp("qty","number")}</div>}
          {!isI&&<div className="fg"><label>Prezzo</label>{inp("price","number")}</div>}
          {isI&&<div className="fg" style={{gridColumn:"span 2"}}><label>Importo Lordo</label>
            {edit
              ? <input type="number" step="0.01" value={f.amount??""} onChange={e=>setF(p=>({...p,amount:e.target.value}))}
                  style={{background:"var(--bg)",border:"1px solid var(--bl)",borderRadius:6,padding:"8px 10px",color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"}}/>
              : <input disabled value={fN(tx.amount)} style={{background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",color:"var(--t)",fontFamily:"var(--mono)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",opacity:0.6,cursor:"not-allowed"}}/>
            }
          </div>}
          {!isI&&<div className="fg" style={{gridColumn:"span 2"}}>
            <label>Totale{isBond?" · prezzo %":""}</label>
            <input disabled value={edit ? fN((+f.qty||0)*(+f.price||0)) : fN(tx.totale)} style={{background:"var(--bg)",color:"var(--t)"}}/>
          </div>}
          {(tx.type==="SELL"||isI)&&<div className="fg"><label>Tax</label>{inp("tax","number")}</div>}
          {isI&&<div className="fg" style={{gridColumn:"span 2"}}>
            <label>Netto</label>
            <input disabled value={fN(edit?(+f.amount||0)-(+f.tax||0):(tx.amount||0)-(tx.tax||0))} style={{background:"var(--bg)",color:"var(--t)"}}/>
          </div>}
          {!isI&&<div className="fg"><label>Commissioni</label>{inp("commission","number")}</div>}
          <div className="fg" style={{gridColumn:"span 2"}}><label>Commenti</label>{inp("commenti")}</div>
        </div>
        {edit&&<div style={{display:"flex",gap:8,justifyContent:"flex-end",paddingTop:8,borderTop:"1px solid var(--b)"}}>
          <button className="btn bg_" onClick={()=>setEdit(false)} disabled={isSaving}>Annulla</button>
          <button className="btn bp" onClick={handleSave} disabled={isSaving} style={isSaving?{opacity:0.5,cursor:"wait"}:{}}>{isSaving?"Salvataggio...":"Salva"}</button>
        </div>}
      </div>
    </div>
  );
}

function AdminTab({anagrafe,setAnagrafe,fiscale,setFiscale,adminUsers,loadAdminUsers,deleteUser,doImpersonate,setSyncStatus,anagrafeToRow,rowToAnagrafe,setConfirmDlg,adminView}) {
  const [anagModal,setAnagModal] = useState(null);
  const [anagForm,setAnagForm] = useState({asset:"",assetClass:"Obbligazioni",prodotto:"",isin:"",ticker:"",fiscale_id:null});
  const [anagEdit,setAnagEdit] = useState(false);
  const [anagSearch,setAnagSearch] = useState("");

  // Mappa fiscale per id (lookup O(1))
  const fiscaleById = React.useMemo(()=>{
    const m = {};
    fiscale.forEach(f=>{ m[f.id] = f; });
    return m;
  },[fiscale]);
  // Lista ordinata per dropdown (prodotto / type)
  const fiscaleSorted = React.useMemo(()=>
    [...fiscale].sort((a,b)=>{
      const x = (a.prodotto||"").localeCompare(b.prodotto||"");
      return x!==0 ? x : (a.type||"").localeCompare(b.type||"");
    })
  ,[fiscale]);

  const openAnagEdit = (a) => { setAnagForm({asset:a.asset,assetClass:a.assetClass,prodotto:a.prodotto||"",isin:a.isin||"",ticker:a.ticker||"",fiscale_id:a.fiscale_id||null}); setAnagEdit(false); setAnagModal(a); };
  const openAnagNew  = () => { setAnagForm({asset:"",assetClass:"",prodotto:"",isin:"",ticker:"",fiscale_id:null}); setAnagEdit(true); setAnagModal("new"); };

  const saveAnag = async () => {
    if(!anagForm.asset.trim()) return;
    if(!anagForm.fiscale_id) { alert("Seleziona Prodotto/Tipo dalla mappa fiscale"); return; }
    // Allinea assetClass e prodotto al record fiscale linkato (single source of truth)
    const f = fiscaleById[anagForm.fiscale_id];
    const aligned = {...anagForm, assetClass: f?.type||anagForm.assetClass, prodotto: f?.prodotto||anagForm.prodotto};
    try {
      setSyncStatus("saving");
      if(anagModal==="new") {
        const ins = await adminCall("insert-anagrafe", {row: anagrafeToRow(aligned)});
        const fiscMap = Object.fromEntries((fiscale||[]).map(f=>[f.id, {prodotto:f.prodotto, type:f.type}]));
        setAnagrafe(p=>[...p, rowToAnagrafe(ins, fiscMap)]);
      } else {
        await adminCall("update-anagrafe", {id: anagModal.id, row: anagrafeToRow(aligned)});
        setAnagrafe(p=>p.map(a=>a.id===anagModal.id?{...a,...aligned}:a));
      }
      setSyncStatus("saved"); setTimeout(()=>setSyncStatus(""),2000);
      setAnagModal(null);
      setAnagEdit(false);
    } catch(e) { setSyncStatus("error"); alert(e.message); }
  };

  // ── Mappa prodotti CRUD state (v.5.17) ──────────────────────────────────────
  const [fiscModal,setFiscModal] = useState(null);
  const [fiscForm,setFiscForm] = useState({prodotto:"",type:"",reddito:"CAPITALE",aliquota:""});
  const [fiscEdit,setFiscEdit] = useState(false);
  const [fiscSearch,setFiscSearch] = useState("");

  const openFiscEdit = (f) => { setFiscForm({prodotto:f.prodotto,type:f.type,reddito:f.reddito,aliquota:f.aliquota!=null?String(f.aliquota):""}); setFiscEdit(false); setFiscModal(f); };
  const openFiscNew  = () => { setFiscForm({prodotto:"",type:"",reddito:"CAPITALE",aliquota:""}); setFiscEdit(true); setFiscModal("new"); };

  const saveFisc = async () => {
    if(!fiscForm.prodotto.trim() || !fiscForm.type.trim()) { alert("Prodotto e Tipo obbligatori"); return; }
    if(!["CAPITALE","DIVERSI"].includes(fiscForm.reddito)) { alert("Reddito deve essere CAPITALE o DIVERSI"); return; }
    const aliq = parseFloat((fiscForm.aliquota||"").replace(",","."));
    if(isNaN(aliq) || aliq<0) { alert("Aliquota non valida"); return; }
    try {
      setSyncStatus("saving");
      const row = {prodotto:fiscForm.prodotto.toUpperCase().trim(), type:fiscForm.type.toUpperCase().trim(), reddito:fiscForm.reddito, aliquota:aliq};
      if(fiscModal==="new") {
        const ins = await sbInsert("fiscale", row);
        setFiscale(p=>[...p, rowToFiscale(ins)]);
      } else {
        await sbUpdate("fiscale", fiscModal.id, row);
        const newProdotto = row.prodotto;
        setFiscale(p=>p.map(f=>f.id===fiscModal.id?{...f,...row}:f));
        // Aggiorna anagrafe in stato: tutte le righe con questo fiscale_id
        // devono riflettere il nuovo prodotto (JOIN logico)
        setAnagrafe(p=>p.map(a=>a.fiscale_id===fiscModal.id?{...a,prodotto:newProdotto}:a));
      }
      setSyncStatus("saved"); setTimeout(()=>setSyncStatus(""),2000);
      setFiscModal(null);
      setFiscEdit(false);
    } catch(e) { setSyncStatus("error"); alert(e.message); }
  };

  return (
    <div>

      {adminView==="anagrafe"&&<div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",position:"sticky",top:"calc(var(--nav-h) - 1px)",background:"var(--bg)",zIndex:80,padding:"8px 0 11px"}}>
          <input type="search" placeholder="Cerca strumento…"
            value={anagSearch} onChange={e=>setAnagSearch(e.target.value)}
            style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,padding:"7px 12px",borderRadius:8,
              border:"1px solid var(--b)",background:"var(--s2)",color:"var(--t)",
              flex:1,minWidth:0,outline:"none",height:38,boxSizing:"border-box"}}/>
          <button onClick={openAnagNew}
            style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
              width:38,height:38,borderRadius:8,border:"1px solid var(--b)",background:"var(--s2)",
              color:"var(--t)",cursor:"pointer",flexShrink:0,padding:0}}>
            <PlusIcon size={18}/>
          </button>
          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--m)",letterSpacing:".08em"}}>v. 6.01</div>
        </div>
        <div style={{background:"var(--s1)",border:"1px solid var(--b)",borderRadius:10,overflow:"hidden"}}>
          <table style={{width:"100%",tableLayout:"fixed",borderCollapse:"collapse"}}>
            <tbody>
              {anagrafe.filter(a=>{
                if(!anagSearch) return true;
                const q = anagSearch.toLowerCase();
                return (a.asset||"").toLowerCase().includes(q)
                    || (a.isin||"").toLowerCase().includes(q)
                    || (a.ticker||"").toLowerCase().includes(q)
                    || (a.prodotto||"").toLowerCase().includes(q);
              })
                .sort((a,b)=>a.asset.localeCompare(b.asset))
                .map((a,i)=>(
                <tr key={i} style={{cursor:"pointer"}} onClick={()=>openAnagEdit(a)}>
                  <td style={{fontWeight:700,fontSize:15,color:"var(--t)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"10px 12px"}}>{a.asset}</td>
                  <td style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color:"var(--t)",textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"10px 12px",width:"35%"}}>{a.prodotto||"—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>}

      {adminView==="utenti"&&<div>
        <div style={{display:"flex",justifyContent:"flex-end",position:"sticky",top:"calc(var(--nav-h) - 1px)",background:"var(--bg)",zIndex:80,padding:"8px 0 11px"}}>
          <button className="btn bg_" onClick={loadAdminUsers}>↻ Ricarica</button>
        </div>
        {adminUsers.length===0?<div className="empty">Nessun utente caricato</div>:(
          <div className="hlist">
            {adminUsers.map((u,i)=>(
              <div key={i} className="hcard" style={{cursor:"pointer",gridTemplateColumns:"1fr auto"}} title="Tap per impersonare"
                onClick={(e)=>{if(e.target.closest&&e.target.closest('button'))return;doImpersonate(u.id,u.email);}}>
                <div style={{gridRow:1,gridColumn:1,fontWeight:700,fontSize:15,color:"var(--t)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</div>
                <button className="ic del" style={{gridRow:1,gridColumn:2}} title="Elimina utente"
                  onClick={(e)=>{e.stopPropagation();setConfirmDlg({msg:"Eliminare utente "+u.email+"?", onOk:()=>deleteUser(u.id)});}}>🗑</button>
              </div>
            ))}
          </div>
        )}
      </div>}

      {/* ── MAPPA PRODOTTI (v.5.17) — CRUD admin ── */}
      {adminView==="fiscale"&&<div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",position:"sticky",top:"calc(var(--nav-h) - 1px)",background:"var(--bg)",zIndex:80,padding:"8px 0 11px"}}>
          <input type="search" placeholder="Cerca prodotto o tipo…"
            value={fiscSearch} onChange={e=>setFiscSearch(e.target.value)}
            style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,padding:"7px 12px",borderRadius:8,
              border:"1px solid var(--b)",background:"var(--s2)",color:"var(--t)",
              flex:1,minWidth:0,outline:"none",height:38,boxSizing:"border-box"}}/>
          <button onClick={openFiscNew}
            style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
              width:38,height:38,borderRadius:8,border:"1px solid var(--b)",background:"var(--s2)",
              color:"var(--t)",cursor:"pointer",flexShrink:0,padding:0}}>
            <PlusIcon size={18}/>
          </button>
          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--m)",letterSpacing:".08em"}}>v. 6.01</div>
        </div>
        <div style={{background:"var(--s1)",border:"1px solid var(--b)",borderRadius:10,overflow:"hidden"}}>
          <table style={{width:"100%",tableLayout:"fixed",borderCollapse:"collapse"}}>
            <tbody>
              {fiscaleSorted.filter(f=>!fiscSearch||(f.prodotto||"").toLowerCase().includes(fiscSearch.toLowerCase())||(f.type||"").toLowerCase().includes(fiscSearch.toLowerCase()))
                .map((f,i)=>(
                <tr key={f.id} style={{cursor:"pointer"}} onClick={()=>openFiscEdit(f)}>
                  <td style={{fontWeight:700,fontSize:14,color:"var(--t)",fontFamily:"var(--mono)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"10px 12px"}}>{f.prodotto}</td>
                  <td style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,color:"var(--m)",textAlign:"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"10px 12px"}}>{f.type}</td>
                  <td style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,color:"var(--t)",textAlign:"right",padding:"10px 12px",width:"22%"}}>{f.aliquota}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>}

      {/* ── MODALE FISCALE (CRUD) ── */}
      {fiscModal&&(
        <div className="modal-bg" onClick={()=>{setFiscModal(null);setFiscEdit(false);}}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhdr">
              <div className="mtitle">{fiscModal==="new"?"Nuova combinazione":`${fiscModal.prodotto} / ${fiscModal.type}`}</div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {fiscModal!=="new"&&<button className="ic" title={fiscEdit?"Annulla modifica":"Modifica"} onClick={()=>{

  const snaps = useMemo(()=>{

      if(s.is_initial) byDate[s.date].is_initial=true;

      if(s.is_initial) byDate[s.date].is_initial=true;
    }
    return Object.entries(byDate)
      .map(([date,v])=>({id:date,date,value:Math.round(v.value*100)/100,is_initial:v.is_initial}))

      if(_event === "SIGNED_IN") {

        _currentSession = s;

      }
      if(_event === "SIGNED_OUT") {
        dataLoadStarted = false;

        }
      })();
    }
    return () => listener?.subscription?.unsubscribe();

  async function loadData(uid) {
    setLoading(true);
    try {
      setSyncStatus("loading");
      // Load prices cache for this user
      const effectiveUid2 = uid || session?.user?.id || _currentSession?.user?.id;
      let tRows, fRows;
      // v600 — lavora SOLO su snapshot6/weeklycache6. Nessuna lettura di "snapshot"/"weekly_cache" legacy.
      let s6Rows = [];
      let wc6Rows = [];
      // STEP 1: carica tx e fiscale (NON anagrafe completa)
      if(uid) {
        // Impersonazione admin: admin6 ora copre anche snapshot6/weeklycache6
        // (get-data restituisce transactions + snapshots6 + weekly6 in un colpo solo).
        const [result, fiscRes] = await Promise.all([
          adminCall6("get-data", {user_id: uid}),
          sbLoad("fiscale"),
        ]);
        tRows = result.transactions;
        s6Rows = result.snapshots6 || [];
        wc6Rows = result.weekly6 || [];
        fRows = fiscRes;
      } else {
        [tRows, fRows, s6Rows, wc6Rows] = await Promise.all([
          sbLoad("transactions_new", null),
          sbLoad("fiscale"),
          sbLoad("snapshot6", null),
          loadWeeklyCache6(),
        ]);
      }
      // STEP 2: estrai gli anagrafe_id usati dalle tx dell'utente e carica
      // SOLO quei record di anagrafe (lazy load mirato).
      const usedIds = Array.from(new Set((tRows||[]).map(t=>t.anagrafe_id).filter(Boolean)));
      const aRows = await sbLoadAnagrafeByIds(usedIds);
      const fiscList = (fRows||[]).map(rowToFiscale);
      // Mappa fiscale {id → {prodotto, type}} per derivare campi anagrafe via JOIN
      const fiscMap = Object.fromEntries(fiscList.map(f=>[f.id, {prodotto:f.prodotto, type:f.type}]));
      const anagList = aRows.map(r => rowToAnagrafe(r, fiscMap));
      _anagList = anagList;
      await loadPricesCache(); setPricesCacheVer(v=>v+1);
      const anagMap = Object.fromEntries(anagList.map(a=>[a.id,a]));
      setAnagrafe(anagList);
      setAnagFull(false);  // anagrafe ridotta, non completa
      setFiscale(fiscList);
      setTxs(tRows.map(r=>rowToTx(r,anagMap)));
      setSnaps6(s6Rows.map(rowToSnap6));
      setWeeklyCache6(wc6Rows);
      setReady(true);
      setLoading(false);
      setSyncStatus("");
    } catch(e) {
      console.error(e);
      setLoading(false);
      setSyncStatus("error");
      setTimeout(()=>setSyncStatus(""),3000);
    }
  }

    await loadData(null);
    setAuthLoading(false);

  async function doSignup() {
    setAuthLoading(true); setAuthErr("");
    if(!authNome.trim()||!authCognome.trim()) { setAuthErr("Nome e cognome sono obbligatori"); setAuthLoading(false); return; }
    if(authPwd !== authPwdConfirm) { setAuthErr("Le password non corrispondono"); setAuthLoading(false); return; }
    const displayName = [authNome.trim(), authCognome.trim()].filter(Boolean).join(" ");

  // Per ogni posizione aperta live: PL = qty*price - cost.

  //   - PL>0, reddito=CAPITALE  → Plus capitale  (imponibile += PL, tax += PL*aliq/100)
  //   - PL>0, reddito=DIVERSI   → Plus diversi   (imponibile += PL, tax += PL*aliq/100)
  //   - PL<0                    → Minus          (imponibile += |PL|, tax += |PL|*aliq/100)

  // Posizioni senza fiscale_id linkato non dovrebbero esistere (vincolo applicativo),
  // ma se capitano vengono escluse silenziosamente.
  const posFiscaleData = useMemo(()=>{
    pricesCacheVer; // dipendenza per re-render quando cache aggiornata
    const out = {
      plusCap: {imp:0, tax:0},
      plusDiv: {imp:0, tax:0},
      minus:   {imp:0, tax:0},
    };
    const allPos = [...livePositions, ...bondPositions];
    for (const p of allPos) {
      if (!p.qty || p.qty<=0) continue;
      // Risoluzione anagrafe → fiscale
      const anag = anagrafe.find(a=>a.id===p.id);
      if (!anag || anag.fiscale_id==null) continue;
      const f = fiscaleById[anag.fiscale_id];
      if (!f) continue;
      // Risoluzione prezzo live (stessa logica di LiveView, semplificata)
      const isBond = p.assetClass==="Obbligazioni";
      const manualP = manualBondPrices[p.isin];
      const lkp = _pricesCache[p.isin]||null;
      let rawPrice = null;
      if (isBond) {
        const bp = bondPrices[p.isin];
        if (manualP) rawPrice = manualP.price;
        else if (bp && bp.price>0) rawPrice = bp.price;
        else if (lkp && lkp.price>0) rawPrice = lkp.price;
      } else {
        const lp = livePrices[p.ticker || p.isin];
        if (manualP) rawPrice = manualP.price;
        else if (lp && lp.price>0) rawPrice = lp.price;
        else if (lkp && lkp.price>0) rawPrice = lkp.price;
      }
      // Fallback: nessun prezzo disponibile → uso prezzo di carico (PL=0 per quella posizione)
      if (rawPrice==null) rawPrice = p.qty>0 ? p.cost/p.qty : 0;
      const ctv = rawPrice * p.qty;
      const pl  = ctv - p.cost;
      const aliq = Number(f.aliquota)||0;
      if (pl > 0) {
        const tax = pl * aliq / 100;
        if (f.reddito === "CAPITALE") {
          out.plusCap.imp += pl;
          out.plusCap.tax += tax;
        } else if (f.reddito === "DIVERSI") {
          out.plusDiv.imp += pl;
          out.plusDiv.tax += tax;
        }
      } else if (pl < 0) {
        const absPl = -pl;
        out.minus.imp += absPl;
        out.minus.tax += absPl * aliq / 100;
      }
    }

  // v600 — stessa logica di updateInitialAndCascade sopra (invariata), ma scoped
  // a un sottoinsieme di transazioni (per portafoglio) e alle righe di snapshot6 con quel portafoglio.
  // Sotto impersonazione admin passa da admin6 (insert-snap6/update-snap6/delete-snap6).
  async function cascade6ForPortfolio(portafoglio, txsSubset, txDate, userId) {
    try {
      const buySell = txsSubset.filter(t=>t.type==="BUY"||t.type==="SELL");
      if(!buySell.length) return;
      const oldestDate = buySell.reduce((m,t)=>t.date<m?t.date:m, buySell[0].date);
      const currentSnaps6 = snaps6Ref.current.filter(s=>s.portafoglio===portafoglio);
      const existingInitial = currentSnaps6.find(s=>s.is_initial);

      if(!existingInitial) {
        const initialInv = investitoAt(txsSubset, oldestDate);
        const initialRow = snapToRow6({date:oldestDate,value:initialInv}, userId, portafoglio, true);
        const ins = impUid ? await adminCall6("insert-snap6",{row:initialRow}) : await sbInsert("snapshot6", initialRow);
        setSnaps6(p=>[...p,{id:ins?.id||Date.now(),date:oldestDate,portafoglio,value:initialInv,is_initial:true}].sort((a,b)=>a.date.localeCompare(b.date)));

      } else if(txDate > existingInitial.date) {
        // Nuova tx più recente della initial → non toccare nulla

      } else if(txDate === existingInitial.date) {
        const updatedInv = investitoAt(txsSubset, existingInitial.date);
        const updatedRow = snapToRow6({date:existingInitial.date,value:updatedInv}, userId, portafoglio, true);
        impUid ? await adminCall6("update-snap6",{id:existingInitial.id,row:updatedRow}) : await sbUpdate("snapshot6", existingInitial.id, updatedRow);
        setSnaps6(p=>p.map(s=>s.id===existingInitial.id?{...s,value:updatedInv}:s));

      } else {
        const newInitialInv = investitoAt(txsSubset, oldestDate);
        const newInitialRow = snapToRow6({date:oldestDate,value:newInitialInv}, userId, portafoglio, true);
        const ins = impUid ? await adminCall6("insert-snap6",{row:newInitialRow}) : await sbInsert("snapshot6", newInitialRow);
        const newInitialId = ins?.id||Date.now();

        const oldMonth = existingInitial.date.slice(0,7);
        const sameMonthSnap = currentSnaps6.find(s=>s.id!==existingInitial.id && !s.is_initial && s.date.slice(0,7)===oldMonth);
        if(sameMonthSnap) {
          impUid ? await adminCall6("delete-snap6",{id:existingInitial.id}) : await sbDelete("snapshot6", existingInitial.id);
          setSnaps6(p=>[...p.filter(s=>s.id!==existingInitial.id), {id:newInitialId,date:oldestDate,portafoglio,value:newInitialInv,is_initial:true}].sort((a,b)=>a.date.localeCompare(b.date)));
        } else {
          const demotedRow = snapToRow6({date:existingInitial.date,value:existingInitial.value}, userId, portafoglio, false);
          impUid ? await adminCall6("update-snap6",{id:existingInitial.id,row:demotedRow}) : await sbUpdate("snapshot6", existingInitial.id, demotedRow);
          setSnaps6(p=>[...p.map(s=>s.id===existingInitial.id?{...s,is_initial:false}:s), {id:newInitialId,date:oldestDate,portafoglio,value:newInitialInv,is_initial:true}].sort((a,b)=>a.date.localeCompare(b.date)));
        }
      }
    } catch(e) { console.error(`cascade6 error (${portafoglio})`, e); }
  }

  // v600 — demo segue il flusso normale: nessun helper di calcolo/aggiornamento

  // snapCurrentMonth: accetta positions e mappe prezzi come parametri espliciti per evitare
  // stale closure su stato React. I caller devono sempre passare dati freschi calcolati
  // nel momento dell'invocazione, non letti dallo stato (che non è ancora aggiornato dopo setTxs).
  const snapCurrentMonth = async (explicitPositions, explicitLiveMap, explicitBondMap) => {
    try {
      const posLive = explicitPositions?.live ?? livePositions;
      const posBond = explicitPositions?.bond ?? bondPositions;
      const liveMap = explicitLiveMap ?? livePrices;
      const bondMap = explicitBondMap ?? bondPrices;
      const allPos = [...posLive, ...posBond];
      let grand = 0;
      let grandFI = 0, grandRA = 0; // v600 FASE 2 — subtotali per portafoglio
      for (const p of allPos) {
        if (!p.qty || p.qty<=0) continue;
        const isBond = p.assetClass==="Obbligazioni";
        const manualP = manualBondPrices[p.isin];
        const lkp = _pricesCache[p.isin]||null;
        let raw = null;
        if (isBond) {
          const bp = bondMap[p.isin];
          if (manualP) raw = manualP.price;
          else if (bp && bp.price>0) raw = bp.price;
          else if (lkp && lkp.price>0) raw = lkp.price;
        } else {
          const lp = liveMap[p.ticker || p.isin];
          if (manualP) raw = manualP.price;
          else if (lp && lp.price>0) raw = lp.price;
          else if (lkp && lkp.price>0) raw = lkp.price;
        }
        if (raw==null) raw = p.qty>0 ? p.cost/p.qty : 0;
        const posVal = raw * p.qty;
        grand += posVal;
        if (isBond) grandFI += posVal; else grandRA += posVal;
      }
      const val = Math.round(grand*100)/100;
      if(val <= 0) return;
      const d = today();
      const uid = impUid||session?.user?.id;

      // v600 — lavora SOLO su snapshot6, split per portafoglio (admin6 sotto impersonazione).
      const valFI = Math.round(grandFI*100)/100;
      const valRA = Math.round(grandRA*100)/100;
      const currentSnaps6 = snaps6Ref.current;
      for (const [portafoglio, pval] of [["FI",valFI],["RA",valRA]]) {
        const existing6 = currentSnaps6.find(s=>s.portafoglio===portafoglio && !s.is_initial && s.date.slice(0,7)===d.slice(0,7));
        const srow6 = snapToRow6({date:d,value:pval}, uid, portafoglio);
        if (existing6) {
          impUid ? await adminCall6("update-snap6",{id:existing6.id,row:srow6}) : await sbUpdate("snapshot6", existing6.id, srow6);
          setSnaps6(p=>p.map(s=>s.id===existing6.id?{...s,date:d,value:pval}:s));
        } else {
          const ins6 = impUid ? await adminCall6("insert-snap6",{row:srow6}) : await sbInsert("snapshot6", srow6);
          setSnaps6(p=>[...p,{id:ins6?.id||Date.now(),date:d,portafoglio,value:pval,is_initial:false}].sort((a,b)=>a.date.localeCompare(b.date)));
        }
      }
    } catch(e){ console.error("snapCurrentMonth error",e); }
  };

  const fetchLivePrices = async (positions, bonds) => {
    setLiveLoading(true);
    const HDR = getEdgeHdr();
    const GP_URL = "https://csyyrbkbgyjyztkjtbrm.supabase.co/functions/v1/get-price";

    // ── Loop UNICO su tutti gli strumenti ───────────────────────────────────
    // Caso A: prezzo ricevuto con data oggi → usa direttamente i dati ricevuti
    // Caso B: tutto il resto (no prezzo, oppure prezzo con data passata) → cache + check updated_at
    const allPositions = [...positions, ...(bonds||[])];
    const results = {};
    const bondResults = {};
    const todayStr = today();
    await Promise.all(allPositions.map(async p=>{
      const useBondMap = (p.assetClass==="Obbligazioni");
      const outKey     = useBondMap ? p.isin : (p.ticker || p.isin);
      const outMap     = useBondMap ? bondResults : results;
      const cacheKey   = p.isin || p.ticker;
      if (!outKey) return;

      // Esegue fetch dal provider e gestisce errore. Restituisce d=null se fallisce.
      let d = null;
      try {
        const r = await fetch(GP_URL, {
          method:"POST", headers:HDR,
          body:JSON.stringify({type:p.assetClass, product:p.prodotto||"", ticker:p.ticker||"", isin:p.isin||""}),
          signal:AbortSignal.timeout(useBondMap?25000:15000)
        });
        if(r.ok) d = await r.json();
      } catch(e) { /* d resta null, gestiamo come nessun prezzo */ }

      // CASO A: prezzo ricevuto + data oggi → usa direttamente
      if (d && d.price && d.price>0 && d.price_date === todayStr) {
        const pct = (d.change_pct!=null) ? d.change_pct : 0;
        await saveLastKnownPrice(p.id, cacheKey, d.price, "live", impUid||session?.user?.id, pct, todayStr);
        outMap[outKey] = {price: d.price, currency:"", change_pct: pct, stale: false};
        return;
      }

      // CASO B: prezzo manca, oppure data non oggi → cache
      // stale (matita ON) deve essere true SOLO quando il provider non ha consegnato
      // alcun prezzo (cache-only fallback, es. GP). Se il provider ha risposto
      // ma con data passata, NON è un caso "manuale".
      const providerGavePrice = !!(d && d.price && d.price>0);
      if (providerGavePrice && d.price_date) {
        // Salva il change_pct ricevuto dal provider (NON zero). La validità sarà
        // determinata in lettura confrontando cache.updated_at con today.
        const pctRicevuto = (d.change_pct!=null) ? d.change_pct : 0;
        await saveLastKnownPrice(p.id, cacheKey, d.price, "live", impUid||session?.user?.id, pctRicevuto, d.price_date);
      }
      // Leggi cache per costruire la response UI
      const lkp = _pricesCache[cacheKey] || null;
      if (lkp) {
        // Regola: cache.change_pct vale solo se cache.updated_at è di oggi (solo data).
        // Se updated_at è di un giorno passato, posizione "ferma" → 0.
        const lkpUpdatedDay = lkp.updated_at ? lkp.updated_at.slice(0,10) : null;
        const lkpFresh = (lkpUpdatedDay === todayStr);
        const effPct = (lkpFresh && lkp.change_pct!=null) ? lkp.change_pct : 0;
        outMap[outKey] = {price: lkp.price, currency:"", change_pct: effPct, stale: !providerGavePrice};
      } else {
        outMap[outKey] = {error:"N/D"};
      }
    }));
    setLivePrices(results);
    setBondPrices(bondResults);

    setLastUpdated(new Date());
    setLiveLoading(false);
    return {liveResults: results, bondResults};
  };

  // Refresh on resume: quando l'app torna in foreground (tab attiva, app iOS riaperta
  // dal background, finestra riprende il focus), verifica se sono passati più di
  // 15 minuti dall'ultimo aggiornamento prezzi. In tal caso, lancia un refresh.
  // Eventi coperti:
  //  - visibilitychange (tab in background → foreground)
  //  - pageshow        (resume da bfcache, app iOS)
  //  - focus           (finestra desktop riprende focus)
  useEffect(()=>{
    if(!ready) return;
    const REFRESH_MS = 15*60*1000;
    const checkAndRefresh = async () => {
      if(document.hidden) return;
      const last = lastUpdated ? lastUpdated.getTime() : 0;
      if(Date.now() - last >= REFRESH_MS) {
        const priceData = await fetchLivePrices(livePositions, bondPositions);
        await new Promise(r=>setTimeout(r,500));
        await snapCurrentMonth({live:livePositions,bond:bondPositions}, priceData?.liveResults||{}, priceData?.bondResults||{});
      }
    };
    document.addEventListener("visibilitychange", checkAndRefresh);
    window.addEventListener("pageshow", checkAndRefresh);
    window.addEventListener("focus", checkAndRefresh);
    return ()=>{
      document.removeEventListener("visibilitychange", checkAndRefresh);
      window.removeEventListener("pageshow", checkAndRefresh);
      window.removeEventListener("focus", checkAndRefresh);
    };
  },[ready, lastUpdated, livePositions, bondPositions]);

  const rowsToCsv=(rows)=>rows.map(r=>r.map(v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"').join(",")).join("\n");
  // Salva un Blob: su iOS (se supporta la condivisione di file) usa il foglio nativo
  // "Condividi/Salva in File", altrimenti download classico via <a download>.
  const saveBlob=async(blob,filename)=>{
    try {
      const f=new File([blob],filename,{type:blob.type});
      if(navigator.canShare && navigator.canShare({files:[f]})) {
        await navigator.share({files:[f],title:filename});
        return;
      }
    } catch(e){ /* utente ha annullato o share non disponibile → fallback download */ }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

            <PlusIcon size={18}/>
          </button>

              var totStr = fN(tx.totale);
              var subLine = isIncome
                ? `Cedola/Dividendo · ${totStr}`
                : `${qtyStr} @ ${priceStr} = ${totStr}`;

                  <div className="tname">{tx.instrument}</div>
                  <div className="tsub">{subLine}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>}

                setSnapEditMode(e=>!e);
              }}>✏️</button>}

            <button className="btn bp" onClick={saveSnap}>{snapEdit?"Aggiorna":"Salva"}</button>

                    })()
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      );
    })()}

    {/* TX MODAL */}
    {modal&&(
      <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal">
          <div className="mhdr">
            <div className="mtitle">{typeof modal==="string"?"Nuova Transazione":"Modifica Transazione"}</div>
            <button className="mx" onClick={()=>setModal(null)}>✕</button>
          </div>
          <div className="fg2">
            <div className="fg"><label>Data</label>
              <input type="date" max={today()} className={ferr.date?"err":""} value={form.date} onChange={sf("date")}/>
              {ferr.date&&<span className="em">{ferr.date}</span>}
            </div>
            <div className="fg"><label>Operazione</label>
              <select value={form.type||""} onChange={sf("type")} className={ferr.type?"err":""}>
                <option value="" disabled>Seleziona…</option>
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
                <option value="INCOME">CEDOLA/DIV</option>
              </select>
              {ferr.type&&<span className="em">{ferr.type}</span>}
            </div>
            <div className="fg"><label>Seleziona strumento</label>
              <select value={txFilter} onChange={e=>{
                  setTxFilter(e.target.value);
                  // Reset completo campo strumento al cambio filtro
                  setForm(p=>({...p,instrument:"",assetClass:"",prodotto:"",isin:"",ticker:"",anagrafeId:null}));
                  setAcQuery("");
                  setAcOpen(false);
                  setFerr(fe=>({...fe,instrument:undefined,isin:undefined}));
                }}>
                <option value="AZIONI">Azioni</option>
                <option value="ETP">ETF, ETC, ETN</option>
                <option value="BOND">Obbligazioni</option>
                <option value="ALTRO">Altro</option>
              </select>
            </div>
            <div className="fg" style={{gridColumn:"span 2",position:"relative"}}>
              <label>Digita nome, isin o ticker</label>
              <input className={ferr.instrument?"err":""}
                value={acOpen ? acQuery : form.instrument}
                autoComplete="off"
                autoCorrect="off"
                autoCapitalize="off"
                spellCheck={false}
                inputMode="search"
                type="search"
                name="tf-asset-search"
                onFocus={()=>{
                  setAcOpen(true);
                  setAcQuery(form.instrument||"");
                  setFerr(f=>({...f,instrument:undefined,isin:undefined}));
                }}
                onChange={e=>{
                  const val=e.target.value;
                  setAcQuery(val);
                  setAcOpen(true);
                  // Se l'utente cancella tutto, resetta i campi a cascata
                  if(!val.trim()){
                    setForm(p=>({...p,instrument:"",assetClass:"",prodotto:"",isin:"",ticker:"",anagrafeId:null}));
                  }
                }}
                onBlur={()=>{
                  // Delay per permettere il click sul risultato prima della chiusura
                  setTimeout(()=>{
                    setAcOpen(false);
                    // Se l'utente ha lasciato testo che non matcha esattamente un asset, segnala errore
                    if(acQuery && acQuery.trim() && !form.anagrafeId){
                      setFerr(f=>({...f,instrument:"Titolo non censito — contatta l'admin"}));
                    }
                  },150);
                }}
                placeholder="Es. ENEL, IT0003128367, ENEL.MI"/>
              {acOpen && (()=>{
                const q = acQuery.trim().toLowerCase();
                if (q.length < 3) return null;
                // Filtro categoria.
                //   AZIONI = prodotto AZIONI
                //   ETP    = ETF/ETC/ETN
                //   BOND   = bond singoli (no ETF/ETN obbligazionari)
                //   ALTRO  = tutto ciò che non rientra nei precedenti (FONDI, GP, ecc.)
                //   ALL    = niente filtro (solo admin)
                const ETP_PRODS  = ['ETF','ETC','ETN'];
                const BOND_PRODS = ['BTP','BOT','TITOLI DI STATO EU','TITOLI DI STATO FOREIGN','CORPORATE BOND'];
                const ALL_KNOWN  = ['AZIONI', ...ETP_PRODS, ...BOND_PRODS];
                const filteredList = instList.filter(a=>{
                  const prod = (a.prodotto||"").toUpperCase();
                  if (txFilter==="AZIONI") return prod==="AZIONI";
                  if (txFilter==="ETP")    return ETP_PRODS.includes(prod);
                  if (txFilter==="BOND")   return BOND_PRODS.includes(prod);
                  if (txFilter==="ALTRO")  return !ALL_KNOWN.includes(prod);
                  return true;
                });
                const results = filteredList.filter(a=>(
                  (a.asset||"").toLowerCase().includes(q) ||
                  (a.isin||"").toLowerCase().includes(q) ||
                  (a.ticker||"").toLowerCase().includes(q)
                ));
                if (results.length===0) return (
                  <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,
                    background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,
                    marginTop:2,padding:"10px 12px",fontFamily:"var(--sans)",
                    fontSize:12,color:"var(--m)",fontStyle:"italic"}}>
                    Nessun risultato per "{acQuery}"
                  </div>
                );
                // Altezza riga ≈ 52px → 4 righe ≈ 208px (scroll se oltre)
                return (
                  <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,
                    background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,
                    marginTop:2,maxHeight:208,overflowY:"auto",
                    boxShadow:"0 6px 16px rgba(0,0,0,0.35)"}}>
                    {results.map(a=>(
                      <div key={a.id}
                        onMouseDown={e=>e.preventDefault()/* evita blur prima del click */}
                        onClick={()=>{
                          setForm(p=>({
                            ...p,
                            instrument:a.asset,
                            assetClass:a.assetClass,
                            prodotto:a.prodotto||"",
                            isin:a.isin||"",
                            ticker:a.ticker||"",
                            anagrafeId:a.id,
                          }));
                          setFerr(f=>({...f,instrument:undefined,isin:undefined}));
                          setAcOpen(false);
                          setAcQuery("");
                        }}
                        style={{padding:"8px 12px",cursor:"pointer",
                          borderBottom:"1px solid var(--b)"}}
                        onMouseEnter={e=>e.currentTarget.style.background="var(--s1)"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <div style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:700,
                          color:"var(--t)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {a.asset}
                        </div>
                        <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--m)",
                          marginTop:2,letterSpacing:".05em"}}>
                          {a.isin||"—"}{a.ticker?" · "+a.ticker:""}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })()}
              {ferr.instrument&&<span className="em">{ferr.instrument}</span>}
            </div>
            <div className="fg"><label>ISIN</label>
              <input disabled value={form.isin||"—"} style={{background:"var(--bg)",color:"var(--t)"}}/>
            </div>
            <div className="fg"><label>Ticker</label>
              <input disabled value={form.ticker||"—"} style={{background:"var(--bg)",color:"var(--t)"}}/>
            </div>

            {isI?(
              <div className="fg" style={{gridColumn:"span 2"}}>
                <label>Importo Lordo</label>
                <input type="number" step="any" className={ferr.amount?"err":""} value={form.amount} onChange={sf("amount")}/>
                {ferr.amount&&<span className="em">{ferr.amount}</span>}
              </div>
            ):<>
              <div className="fg"><label>Quantità</label>
                <input type="number" className={ferr.qty?"err":""} value={form.qty} onChange={sf("qty")}/>
                {ferr.qty&&<span className="em">{ferr.qty}</span>}
              </div>
              <div className="fg"><label>Prezzo</label>
                <input type="number" className={ferr.price?"err":""} value={form.price} onChange={sf("price")}/>
                {ferr.price&&<span className="em">{ferr.price}</span>}
              </div>
              <div className="fg" style={{gridColumn:"span 2"}}>
                <label>Totale{isBond?" · prezzo %":""}</label>
                <input disabled value={totPreview>0?fN(totPreview):"—"} style={{background:"var(--bg)",color:"var(--t)"}}/>
              </div>
              {form.type==="SELL"&&(
                <div className="fg"><label>Tax</label>
                  <input type="number" step="any" value={form.tax} onChange={sf("tax")}/>
                </div>
              )}
              <div className="fg"><label>Commissioni (opz.)</label>
                <input type="number" value={form.commission} onChange={sf("commission")}/>
              </div>
            </>}
            {isI&&(
              <div className="fg"><label>Tax</label>
                <input type="number" step="any" value={form.tax} onChange={sf("tax")}/>
              </div>
            )}
            <div className="fg" style={{gridColumn:"span 2"}}>
              <label>Commenti</label>
              <input type="text" value={form.commenti||""} onChange={sf("commenti")} placeholder="Note opzionali"/>
            </div>
            {isI&&(
              <div className="fg" style={{gridColumn:"span 2"}}>
                <label>Netto</label>
                <input disabled value={form.amount!==""?fN((+form.amount||0)-(+form.tax||0)):"—"} style={{background:"var(--bg)",color:"var(--t)"}}/>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn bg_" onClick={()=>setModal(null)}>Annulla</button>
            <button className="btn bp" onClick={saveTx} disabled={isSaving} style={isSaving?{opacity:0.5,cursor:"wait"}:{}}>{isSaving?"Salvataggio...":(typeof modal==="string"?"Salva":"Aggiorna")}</button>
          </div>
        </div>
      </div>
    )}
  </>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
