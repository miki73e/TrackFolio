const { useState, useMemo, useEffect, useCallback } = React;

async function getHdr(useServiceRole) {
  if(useServiceRole) {
    return {"apikey":SB_ANON,"Authorization":`Bearer ${SB_JWT}`,"Content-Type":"application/json"};
  }
  const { data:{ session } } = await _sb.auth.getSession();
  const token = session?.access_token || SB_ANON;
  return {"apikey":SB_ANON,"Authorization":`Bearer ${token}`,"Content-Type":"application/json"};
}
async function getEdgeHdr() {
  return {"Content-Type":"application/json","Authorization":`Bearer ${SB_JWT}`};
}

// Map JS object → Supabase transaction row
// ── Anagrafe helpers ──────────────────────────────────────────────────────────
function normalizeAssetClass(v) {
  if (!v) return "";
  const u = v.toString().toUpperCase().trim();
  if (u.includes("OBBLIG")) return "Obbligazioni";
  if (u.includes("AZIONI") || u === "AZIONI") return "Azioni";
  if (u.includes("COMMODIT")) return "Commodities";
  if (u.includes("CRYPTO")) return "Crypto";
  if (u.includes("FONDI") || u.includes("FONDO")) return "Fondi";
  return v;
}
function rowToAnagrafe(r) {
  return {
    id: r.id,
    isin: r.isin||"",
    asset: r.asset||"",
    assetClass: normalizeAssetClass(r.type),
    ticker: r.ticker||"",
  };
}
function anagrafeToRow(a) {
  return {
    isin: a.isin||null,
    asset: a.asset||"",
    type: a.assetClass||"",
    ticker: a.ticker||null,
  };
}

// ── Transaction mapping (transactions_new) ────────────────────────────────────
// r = Supabase row, anagMap = {id -> anagrafe object}
function rowToTx(r, anagMap) {
  // Try by anagrafe_id first, fallback to searching by asset name if missing
  var anag = anagMap[r.anagrafe_id] || {};
  if(!anag.asset && r.anagrafe_id) {
    // anagrafe_id exists but not in map — use empty object
    anag = {};
  }
  const isI = (r.action||"").toUpperCase()==="INCOME";
  const assetClass = anag.assetClass || "";
  const isBond = assetClass==="Obbligazioni";
  const qty = Number(r.qty)||0;
  const price = Number(r.price)||0;
  const totale = isI ? price : isBond ? qty*price/100 : qty*price;
  return {
    id: r.id,
    anagrafeId: r.anagrafe_id,
    date: r.data,
    type: (r.action||"").toUpperCase(),
    assetClass,
    instrument: anag.asset||"",
    isin: anag.isin||"",
    ticker: anag.ticker||"",
    qty, price,
    tax: Number(r.tax)||0,
    commission: Number(r.commissioni)||0,
    totale: Math.round(totale*10000)/10000,
    amount: isI ? price : null,
  };
}
function txToRow(t) {
  const row = {
    "data": t.date,
    "action": (t.type||"").toUpperCase(),
    "anagrafe_id": t.anagrafeId,
    "qty": t.qty!==undefined&&t.qty!==null ? Number(t.qty) : null,
    "price": t.price!==undefined&&t.price!==null ? Number(t.price) : null,
    "tax": t.tax!==undefined&&t.tax!==null ? Number(t.tax) : null,
    "commissioni": t.commission!==undefined&&t.commission!==null ? Number(t.commission) : null,
  };
  if(t.userId) row["user_id"] = t.userId;
  return row;
}
// Map Supabase snapshot row → JS object
function rowToSnap(r) {
  return {id: r.id, date: r.data, value: Number(r.totale_pf)};
}
function snapToRow(s, userId) {
  const row = {"data": s.date, "totale_pf": Number(s.value)};
  if(userId) row["user_id"] = userId;
  return row;
}

async function sbLoad(table, impersonateUid) {
  const hdr = await getHdr(!!impersonateUid); // use service role when impersonating
  let r;
  try {
    let url = `${SB_URL}/rest/v1/${table}?select=*&order=id`;
    if(impersonateUid) url += `&user_id=eq.${impersonateUid}`;
    r = await fetch(url, {headers: hdr});
  } catch(netErr) {
    throw new Error(`Rete: ${netErr.message}`);
  }
  if (!r.ok) {
    let txt = "";
    try { txt = await r.text(); } catch(e) {}
    throw new Error(`HTTP ${r.status} su ${table}: ${txt.slice(0,200)}`);
  }
  return r.json();
}
async function sbInsert(table, row, useServiceRole) {
  const hdr = await getHdr(useServiceRole);
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: "POST", headers: {...hdr, "Prefer": "return=representation"},
    body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(`Insert ${table} failed: ${r.status}`);
  const rows = await r.json();
  return rows[0];

const css = `
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0e;--s1:#12141a;--s2:#1a1d26;--b:#22273a;
  --g:#22c55e;--r:#ef4444;--bl:#3b82f6;--y:#f59e0b;
  --t:#f1f5f9;--m:#64748b;--m2:#94a3b8;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--t);font-family:var(--sans);min-height:100vh;font-size:14px}
.nav{display:flex;background:var(--s1);border-bottom:1px solid var(--b);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:78px;padding:13px 6px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--m);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nb.on{color:var(--bl);border-bottom-color:var(--bl)}
.nb:hover:not(.on){color:var(--t)}
.pbar{display:flex;gap:5px;padding:9px 14px;background:var(--s1);border-bottom:1px solid var(--b);overflow-x:auto;scrollbar-width:none;align-items:center}
.pbar::-webkit-scrollbar{display:none}
.pb{font-family:var(--mono);font-size:10px;padding:4px 11px;border-radius:4px;border:1px solid var(--b);background:none;color:var(--m);cursor:pointer;transition:all .15s;white-space:nowrap}
.pb.on{background:var(--bl);color:#fff;border-color:var(--bl);font-weight:700}
.pb:hover:not(.on){color:var(--t)}
.main{padding:13px;max-width:860px;margin:0 auto}
.k2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.k4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:13px}
@media(max-width:440px){.k4{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:13px 15px;overflow:hidden}
.card.g{border-color:var(--g)}.card.r{border-color:var(--r)}
.cl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);margin-bottom:7px}
.cv{font-family:var(--mono);font-weight:700;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv.lg{font-size:21px}.cv.md{font-size:15px}
.green{color:var(--g)}.red{color:var(--r)}.blue{color:var(--bl)}.neu{color:var(--t)}.mu{color:var(--m)}
.panel{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:13px 15px;margin-bottom:11px}
.pt{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--m2);margin-bottom:11px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.tbl{background:var(--s1);border:1px solid var(--b);border-radius:10px;overflow:auto;max-height:65vh}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--bg);color:var(--m);font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;padding:7px 11px;text-align:right;border-bottom:1px solid var(--b);white-space:nowrap;position:sticky;top:0;z-index:2}
th:first-child{text-align:left;position:sticky;left:0;top:0;z-index:3;background:var(--bg)}
td{padding:7px 11px;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:11px;text-align:right;white-space:nowrap;vertical-align:middle}
td:first-child{text-align:left;font-family:var(--sans);font-size:11px;font-weight:500;position:sticky;left:0;background:var(--s1);z-index:1}
tr:last-child td{border-bottom:none}
tr:hover td{background:#181b26}
tr:hover td:first-child{background:#1a1d28}
.bdg{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;font-family:var(--mono)}
.bb{background:rgba(59,130,246,.15);color:var(--bl)}.bs{background:rgba(239,68,68,.15);color:var(--r)}.bi{background:rgba(34,197,94,.15);color:var(--g)}
.hm{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
@media(max-width:400px){.hm{grid-template-columns:repeat(3,1fr)}}
.hc{border-radius:7px;padding:8px 4px;text-align:center}
.hcl{font-size:9px;color:var(--m);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.hcv{font-family:var(--mono);font-size:11px;font-weight:700}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:105px}
.fg label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--m)}
.fg input,.fg select{background:var(--bg);border:1px solid var(--b);border-radius:5px;padding:7px 9px;color:var(--t);font-size:11px;font-family:var(--mono);outline:none}
.fg input:focus,.fg select:focus{border-color:var(--bl)}
.fg select option{background:#0f1117}
.fg input.err,.fg select.err{border-color:var(--r)}
.em{font-size:9px;color:var(--r);margin-top:1px}
.btn{padding:7px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s}

const MN = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const AC_LIST = ["Obbligazioni","Azioni","Commodities","Crypto","Fondi","Altro"];
const AC_COL  = {"Obbligazioni":"#3b82f6","Azioni":"#22c55e","Commodities":"#f59e0b","Crypto":"#a78bfa","Fondi":"#06b6d4","Altro":"#fb923c"};
const acColor = cls => AC_COL[cls] || "#64748b";
const today = () => new Date().toISOString().slice(0,10);

const fN = (n, d=0) => {
  if (n==null||isNaN(n)) return "—";
  const abs = Math.abs(n).toFixed(d);
  const [int, dec] = abs.split(".");
  const grouped = int.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const formatted = dec !== undefined && d > 0 ? grouped + "," + dec : grouped;
  return (n < 0 ? "-" : "") + formatted;
};
const fP = (n, d=1) => n==null||isNaN(n) ? "—" : fN(n,d) + "%";
const sgn = n => n==null||isNaN(n) ? "neu" : n > 0 ? "green" : n < 0 ? "red" : "neu";
const heatCol = p => {
  if (p==null) return "var(--s2)";
  const t = Math.max(-1, Math.min(1, p/5));
  return t >= 0 ? `rgba(34,197,94,${0.08+t*0.4})` : `rgba(239,68,68,${0.08+Math.abs(t)*0.4})`;
};

// ── Engine ────────────────────────────────────────────────────────────────────
function wavgAt(txs, date) {
  const pos = {};
  const filtered = [...txs].filter(t => t.type !== "INCOME" && t.date <= date)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const tx of filtered) {
    const k = tx.instrument;
    if (!pos[k]) pos[k] = {qty:0, cost:0, assetClass:tx.assetClass, instrument:tx.instrument, isin:tx.isin||""};
    if (tx.type === "BUY") {
      pos[k].qty += tx.qty;
      pos[k].cost += tx.totale + (tx.commission||0);
    } else if (tx.type === "SELL" && pos[k].qty > 0) {
      const avg = pos[k].cost / pos[k].qty;
      pos[k].cost -= avg * tx.qty;
      pos[k].qty = Math.max(0, pos[k].qty - tx.qty);
      if (pos[k].qty === 0) pos[k].cost = 0;
    }
  }
  return pos;
}
function investitoAt(txs, date) {
  return Object.values(wavgAt(txs, date)).reduce((s,p) => s + (p.qty>0 ? p.cost : 0), 0);
}
function snapAt(snaps, date) {
  const s = [...snaps].sort((a,b) => a.date.localeCompare(b.date)).filter(x => x.date <= date);
  return s.length ? s[s.length-1].value : null;
}
// Last snap date at or before date
function lastSnapDate(snaps, date) {
  const s = [...snaps].sort((a,b) => a.date.localeCompare(b.date)).filter(x => x.date <= date);
  return s.length ? s[s.length-1].date : null;
}
function mediaPesata(txs, from, to) {
  const eventDates = [...new Set(
    [from, ...txs.filter(t => t.type!=="INCOME" && t.date>=from && t.date<=to).map(t=>t.date), to]
  )].sort();
  let totW = 0, totD = 0;
  for (let i = 0; i < eventDates.length-1; i++) {
    const d0 = eventDates[i], d1 = eventDates[i+1];
    const days = (new Date(d1) - new Date(d0)) / 86400000;
    if (days <= 0) continue;
    totW += investitoAt(txs, d0) * days;
    totD += days;
  }
  totW += investitoAt(txs, to);
  totD += 1;
  return totD > 0 ? totW / totD : 0;
}
function plOpenYear(txs, snaps, year) {
  const jan1 = `${year}-01-01`, dec31 = `${year}-12-31`;
  const snapEnd = snapAt(snaps, dec31);
  if (snapEnd == null) return null;
  const snapJan = snapAt(snaps, jan1) || 0;
  return (snapEnd - investitoAt(txs, dec31)) - (snapJan - investitoAt(txs, jan1));
}
function plCloseRange(txs, from, to) {
  let total = 0;
  const sells = [...txs].filter(t => t.type==="SELL" && t.date>from && t.date<=to)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const sell of sells) {
    const posBefore = wavgAt(txs.filter(t => t.date < sell.date), sell.date);
    const p = posBefore[sell.instrument];
    const pmc = p && p.qty > 0 ? p.cost / p.qty : 0;
    total += sell.totale - pmc * sell.qty - (sell.commission||0);
  }
  return total;
}
function sellsInRange(txs, from, to) {
  const result = [];
  const sells = [...txs].filter(t => t.type==="SELL" && t.date>from && t.date<=to)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const sell of sells) {
    const posBefore = wavgAt(txs.filter(t => t.date < sell.date), sell.date);
    const p = posBefore[sell.instrument];
    const pmc = p && p.qty > 0 ? p.cost / p.qty : 0;
    const pl = sell.totale - pmc * sell.qty; // P/L before costs
    const fees = sell.commission||0;
    const tax = sell.tax||0;
    const net = pl - tax - fees;
    const costBuy = pmc * sell.qty;
    const pct = costBuy > 0 ? (net / costBuy) * 100 : null;
    result.push({...sell, pmc, pl, fees, net, pct});
  }
  return result;
}
function yearMetrics(txs, snaps, year) {
  const yr = String(year), jan1 = `${yr}-01-01`, dec31 = `${yr}-12-31`;
  const lastSnap = snapAt(snaps, dec31);
  if (lastSnap == null) return null;
  const plOpen = plOpenYear(txs, snaps, year);
  const plClose = plCloseRange(txs, `${year-1}-12-31`, dec31);
  const cedole = txs.filter(t => t.type==="INCOME" && t.date>=jan1 && t.date<=dec31)
    .reduce((s,t) => s+(t.amount||0), 0);
  const tax = txs.filter(t => t.date>=jan1 && t.date<=dec31)
    .reduce((s,t) => s+(t.tax||0), 0);
  const rendimento = (plOpen||0) + plClose + cedole - tax;
  const mp = mediaPesata(txs, jan1, dec31);
  const pct = mp > 0 ? (rendimento/mp)*100 : null;
  const fees=txs.filter(t=>t.date>=jan1&&t.date<=dec31).reduce((s,t)=>s+(t.commission||0),0);
  return {plOpen, plClose, cedole, tax, fees, costs:tax+fees, rendimento, pct, mediaInv:mp, lastSnap};
}
function monthMetrics(txs, snaps, year, mi) {
  const yr = String(year), mStr = String(mi+1).padStart(2,"0");
  // Fix: use actual last day of month instead of always 31
  const lastDay = new Date(year, mi+1, 0).getDate();
  const mEnd = `${yr}-${mStr}-${String(lastDay).padStart(2,"0")}`;
  const prevMEnd = mi===0 ? `${year-1}-12-31` : `${yr}-${String(mi).padStart(2,"0")}-31`;

  // Need a snap in this month
  const hasSnap = snaps.some(s => {
    const sm = parseInt(s.date.slice(5,7))-1;
    return parseInt(s.date.slice(0,4))===year && sm===mi;
  });
  if (!hasSnap) return null;

  const snapEnd = snapAt(snaps, mEnd);
  if (snapEnd == null) return null;
  // If no snapshot exists before this month (e.g. first month of first year),
  // use the earliest available snapshot as baseline instead of zero
  const snapPrevRaw = snapAt(snaps, prevMEnd);
  const snapPrev = snapPrevRaw !== null ? snapPrevRaw : snapAt(snaps, `${yr}-01-01`) || 0;
  const prevMEndEff = snapPrevRaw !== null ? prevMEnd : `${yr}-01-01`;
  const plOpen = (snapEnd - investitoAt(txs, mEnd)) - (snapPrev - investitoAt(txs, prevMEndEff));
  // When baseline is jan1 (first month of data), include jan1 itself (>=)
  // Otherwise use exclusive (>) as normal month boundary
  const inclFrom = snapPrevRaw === null; // true only for first month of first year
  const afterPrev = t => inclFrom ? t.date>=prevMEndEff : t.date>prevMEndEff;
  const plClose = (() => {
    const sells = [...txs].filter(t => t.type==="SELL" && afterPrev(t) && t.date<=mEnd)
      .sort((a,b) => a.date.localeCompare(b.date));
    let tot=0;
    for(const sell of sells){
      const pb=wavgAt(txs.filter(t=>t.date<sell.date),sell.date);
      const pp=pb[sell.instrument];
      const pmc=pp&&pp.qty>0?pp.cost/pp.qty:0;
      tot+=sell.totale-pmc*sell.qty-(sell.commission||0);
    }
    return tot;
  })();
  const cedole = txs.filter(t => t.type==="INCOME" && afterPrev(t) && t.date<=mEnd)
    .reduce((s,t) => s+(t.amount||0), 0);
  const tax = txs.filter(t => afterPrev(t) && t.date<=mEnd)
    .reduce((s,t) => s+(t.tax||0), 0);
  const rendimento = plOpen + plClose + cedole - tax;
  const mStart = `${yr}-${mStr}-01`;
  const mp = mediaPesata(txs, mStart > prevMEnd ? mStart : prevMEnd, mEnd);
  const pct = mp > 0 ? (rendimento/mp)*100 : null;
  return {plOpen, plClose, cedole, tax, rendimento, pct, mediaInv:mp};
}

// ── Charts ────────────────────────────────────────────────────────────────────
function LineChart({pts}) {
  const [act, setAct] = useState(null);
  const valid = pts.filter(p => p.y != null);
  if (!valid.length) return <div className="empty" style={{padding:14,fontSize:11}}>Nessun dato</div>;
  const W=700,H=155,pL=52,pR=16,pT=10,pB=26;
  const iW=W-pL-pR, iH=H-pT-pB;
  const ys = valid.map(p => p.y);
  const mn=Math.min(0,...ys), mx=Math.max(0,...ys), rng=mx-mn||1;
  const xOf = i => pL + (i/(pts.length-1||1))*iW;
  const yOf = v => pT + iH - ((v-mn)/rng)*iH;
  const y0 = yOf(0);
  const vp = pts.map((p,i) => p.y!=null ? {x:xOf(i), y:yOf(p.y), v:p.y, lbl:p.x, i} : null).filter(Boolean);
  const path = vp.map((p,j) => `${j===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const area = vp.length>1 ? `${path} L${vp[vp.length-1].x},${y0} L${vp[0].x},${y0}Z` : "";
  return (
    <div style={{position:"relative"}} onClick={()=>setAct(null)}>
      {act!=null && vp.find(p=>p.i===act) && (()=>{
        const p = vp.find(q=>q.i===act);
        return <div style={{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",
          background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,
          padding:"3px 12px",fontFamily:"var(--mono)",fontSize:11,
          color:p.v>=0?"var(--g)":"var(--r)",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10}}>
          {p.lbl} — {fN(p.v)}
        </div>;
      })()}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{height:155,display:"block"}}>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity=".25"/>
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0"/>
        </linearGradient></defs>
        <line x1={pL} y1={y0} x2={W-pR} y2={y0} stroke="var(--b)" strokeWidth="1" strokeDasharray="4 3"/>
        {[mn,0,mx].filter((v,i,a)=>a.indexOf(v)===i).map((v,i)=>(
          <text key={i} x={pL-4} y={yOf(v)+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
            {Math.abs(v)>=1000?`${v<0?"-":""}${(Math.abs(v)/1000).toFixed(1)}k`:fN(v)}
          </text>
        ))}
        {pts.map((p,i)=><text key={i} x={xOf(i)} y={H-2} textAnchor="middle" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">{p.x}</text>)}
        {area&&<path d={area} fill="url(#lg)"/>}
        {path&&<path d={path} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinejoin="round"/>}
        {vp.map((p,j)=>(
          <circle key={j} cx={p.x} cy={p.y} r="6" fill={p.v>=0?"var(--g)":"var(--r)"} opacity=".9"
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation();setAct(act===p.i?null:p.i);}}
            onMouseEnter={()=>setAct(p.i)} onMouseLeave={()=>{}}
          />
        ))}
      </svg>
    </div>
  );
}

function BarChart({pts, onBar}) {
  const [act,setAct]=useState(null);
  const W=700,H=145,pL=52,pR=16,pT=10,pB=26;
  const iW=W-pL-pR, iH=H-pT-pB;
  const vals = pts.map(p=>p.y??0);
  const am = Math.max(1,...vals.map(Math.abs));
  const bW = iW/pts.length*0.6;
  const xOf = i => pL+(i/pts.length)*iW+(iW/pts.length)*0.2;
  const y0 = pT+iH/2, sc = (iH/2)/am;
  if (!pts.some(p=>p.y!=null)) return <div className="empty" style={{padding:14,fontSize:11}}>Nessun dato</div>;
  return (
    <div style={{position:"relative"}} onClick={()=>setAct(null)}>
      {act!=null && pts[act]?.y!=null && (
        <div style={{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",
          background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,
          padding:"3px 12px",fontFamily:"var(--mono)",fontSize:11,
          color:pts[act].y>=0?"var(--g)":"var(--r)",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10}}>
          {pts[act].x} — {fN(pts[act].y)}
        </div>
      )}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{height:145,display:"block"}}>
        <line x1={pL} y1={y0} x2={W-pR} y2={y0} stroke="var(--b)" strokeWidth="1"/>
        {vals.map((v,i)=>{const h=Math.abs(v)*sc; const y=v>=0?y0-h:y0; return(
          <rect key={i} x={xOf(i)} y={y} width={bW} height={Math.max(1,h)}
            fill={v>=0?"var(--g)":"var(--r)"} rx="2"
            opacity={pts[i].y==null?0.1:act===i?1:0.75}
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation(); setAct(act===i?null:i);}}
            onMouseEnter={()=>setAct(i)} onMouseLeave={()=>{}}
          />
        );})}
        {[am,0,-am].map((v,i)=>(
          <text key={i} x={pL-4} y={y0-v*sc+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
            {Math.abs(v)>=1000?`${v<0?"-":""}${(Math.abs(v)/1000).toFixed(0)}k`:fN(v)}
          </text>
        ))}
        {pts.map((p,i)=>(
          <text key={i} x={xOf(i)+bW/2} y={H-2} textAnchor="middle" fontSize="9"
            fill={act===i?"var(--t)":"var(--m)"} fontFamily="JetBrains Mono,monospace">{p.x}</text>
        ))}
      </svg>
    </div>
  );
}

const INST_COLORS = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a78bfa","#fb923c","#34d399","#e879f9"];
function StackedBar({byMonth, insts, activeMi, onBar, onClear}) {
  const W=700,H=155,pL=50,pR=16,pT=10,pB=26,iW=W-pL-pR,iH=H-pT-pB;
  const bW=iW/12*0.6, xOf=i=>pL+(i/12)*iW+(iW/12)*0.2;
  const tots=Array.from({length:12},(_,i)=>Object.values(byMonth[i]||{}).reduce((s,v)=>s+v,0));
  const mx=Math.max(1,...tots);
  if (!tots.some(v=>v>0)) return <div className="empty" style={{padding:14,fontSize:11}}>Nessuna cedola</div>;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{height:155,display:"block",cursor:"pointer"}}
      onClick={e=>{ if(e.target.tagName!=="rect") onClear&&onClear(); }}>
      {Array.from({length:12},(_,mi)=>{
        let yo=pT+iH;
        const isHi = activeMi==null || activeMi===mi;
        return insts.map((inst,ci)=>{
          const v=(byMonth[mi]||{})[inst]||0; const h=(v/mx)*iH; yo-=h;
          return v>0 ? <rect key={`${mi}-${ci}`} x={xOf(mi)} y={yo} width={bW} height={Math.max(1,h)}
            fill={INST_COLORS[ci%INST_COLORS.length]} rx="2" opacity={isHi?0.9:0.18}
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation(); onBar&&onBar(activeMi===mi?null:mi);}}
          /> : null;
        });
      }).flat().filter(Boolean)}
      {[0,mx/2,mx].map((v,i)=>(
        <text key={i} x={pL-4} y={pT+iH-(v/mx)*iH+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
          {v>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0)}
        </text>
      ))}
      {MN.map((m,i)=>(
        <text key={i} x={xOf(i)+bW/2} y={H-2} textAnchor="middle" fontSize="9"
          fill={activeMi===i?"var(--t)":"var(--m)"}
          fontWeight={activeMi===i?"700":"400"}
          fontFamily="JetBrains Mono,monospace">{m}</text>
      ))}
    </svg>
  );
}

function Donut({slices, total}) {
  if (!total||!slices.length) return <div className="empty">Nessuna posizione aperta</div>;
  const R=82,cx=130,cy=100,ir=50,single=slices.length===1;
  let ang=-Math.PI/2;
  const arcs=slices.map((s,ci)=>{
    const col=acColor(s.label);
    if (single) return{...s,path:null,col};
    const sw=(s.value/total)*2*Math.PI*0.999;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang); ang+=sw;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const lg=sw>Math.PI?1:0;
    const xi1=cx+ir*Math.cos(ang-sw),yi1=cy+ir*Math.sin(ang-sw);
    const xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    return{...s,path:`M${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${lg} 0 ${xi1},${yi1}Z`,col};
  });
  return (
    <div style={{display:"flex",justifyContent:"center"}}>
      <svg width="260" height="200" viewBox="0 0 260 200">
        {arcs.map((a,i)=>a.path
          ?<path key={i} d={a.path} fill={a.col} opacity=".9"/>
          :<g key={i}><circle cx={cx} cy={cy} r={R} fill={a.col} opacity=".9"/><circle cx={cx} cy={cy} r={ir} fill="var(--s1)"/></g>
        )}
        <text x={cx} y={cy-5} textAnchor="middle" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">TOTALE</text>
        <text x={cx} y={cy+11} textAnchor="middle" fontSize="12" fill="var(--t)" fontFamily="JetBrains Mono,monospace" fontWeight="700">
          {total>=1000?`${(total/1000).toFixed(1)}k`:fN(total)}
        </text>
      </svg>
    </div>
  );
}

const EMPTY={date:today(),type:"BUY",assetClass:"",instrument:"",isin:"",ticker:"",anagrafeId:null,qty:"",price:"",commission:"",tax:"",amount:""};

function LiveView({livePositions,bondPositions,fundPositions,livePrices,bondPrices,fundPrices,manualBondPrices,setManualBondPrices,liveLoading,lastUpdated,holdingsView,setHoldingsView,snaps,setSnaps,setSyncStatus,liveDonut,setLiveDonut,onClickInst,onRefresh,sbUpdate,sbInsert,snapToRow,userId,isImpersonating}) {
  var totLiveCtv=0, totBondCtv=0, totFundLiveCtv=0;
  livePositions.forEach(function(p){
    var lp=p.ticker?livePrices[p.ticker]:null;
    totLiveCtv+=lp&&lp.price>0?lp.price*p.qty:p.cost;
  });
  fundPositions.forEach(function(p){
    var fp=p.isin?fundPrices[p.isin]:null;
    totFundLiveCtv+=fp&&fp.price>0?fp.price*p.qty:p.cost;
  });
  var [editingIsin, setEditingIsin] = React.useState(null);
  var [editingVal, setEditingVal] = React.useState("");

  // Merge auto + manual bond prices
  var effectiveBondPrices = {};
  bondPositions.forEach(function(p){
    if(p.isin) {
      var auto = bondPrices[p.isin];
      var manual = manualBondPrices[p.isin];
      effectiveBondPrices[p.isin] = (auto && auto.price>0) ? auto : (manual ? manual : null);
    }
  });

  var totBondLiveCtv=0, hasBondLive=false;
  bondPositions.forEach(function(p){
    var bp=p.isin?effectiveBondPrices[p.isin]:null;
    if(bp&&bp.price>0){
      totBondLiveCtv+=bp.price/100*p.qty;
      hasBondLive=true;
    } else {
      totBondLiveCtv+=p.cost;
    }
    totBondCtv+=p.cost;
  });
  var grandTotal=totLiveCtv+totBondLiveCtv+totFundLiveCtv;

  // Totale investito azioni (always from cost, scope-level)
  var totInvAzioni=0, totCtvAzioni=0, totDiffAzioni=0, hasLiveAzioni=false;
  livePositions.forEach(function(p){
    var lp=p.ticker?livePrices[p.ticker]:null;
    var livePrice=lp&&lp.price?lp.price:null;
    totInvAzioni+=p.cost;
    if(livePrice!=null){totCtvAzioni+=livePrice*p.qty;totDiffAzioni+=(livePrice*p.qty-p.cost);hasLiveAzioni=true;}
  });
  var totDiffPctAzioni=totInvAzioni>0&&hasLiveAzioni?(totDiffAzioni/totInvAzioni)*100:null;
  var totInvBond=0, totCtvBond=0, totDiffBond=0, hasBondPrices=false;
  bondPositions.forEach(function(p){
    var bp=p.isin?effectiveBondPrices[p.isin]:null;
    var livePrice=bp&&bp.price>0?bp.price:null;
    totInvBond+=p.cost;
    if(livePrice!=null){totCtvBond+=livePrice/100*p.qty;totDiffBond+=(livePrice/100*p.qty-p.cost);hasBondPrices=true;}
  });
  var totDiffPctBond=totInvBond>0&&hasBondPrices?(totDiffBond/totInvBond)*100:null;
  var totInvFondi=0, totCtvFondi=0, totDiffFondi=0, hasFundPrices=false;
  fundPositions.forEach(function(p){
    var fp=p.isin?fundPrices[p.isin]:null;
    var livePrice=fp&&fp.price>0?fp.price:null;
    totInvFondi+=p.cost;
    if(livePrice!=null){totCtvFondi+=livePrice*p.qty;totDiffFondi+=(livePrice*p.qty-p.cost);hasFundPrices=true;}
  });
  var totDiffPctFondi=totInvFondi>0&&hasFundPrices?(totDiffFondi/totInvFondi)*100:null;

  var totInvAll=totInvAzioni+totInvBond+totInvFondi;
  var totDiffAll=grandTotal-totInvAll;
  var totDiffPctAll=totInvAll>0?(totDiffAll/totInvAll)*100:null;

  var byAC={};
  livePositions.forEach(function(p){
    var lp=p.ticker?livePrices[p.ticker]:null;
    var v=lp&&lp.price>0?lp.price*p.qty:p.cost;
    byAC[p.assetClass]=(byAC[p.assetClass]||0)+v;
  });
  if(totBondLiveCtv>0) byAC["Obbligazioni"]=(byAC["Obbligazioni"]||0)+totBondLiveCtv;
  if(totFundLiveCtv>0) byAC["Fondi"]=(byAC["Fondi"]||0)+totFundLiveCtv;
  var donutSlices=Object.entries(byAC).filter(function(e){return e[1]>0;}).map(function(e){
    return {label:e[0],value:e[1],pct:grandTotal>0?(e[1]/grandTotal)*100:0};
  });

  function handleSnap() {
    var d=today();
    var existing=snaps.find(function(s){return s.date===d;});
    setSyncStatus("saving");
    var val=Math.round(grandTotal*100)/100;
    if(existing){
      sbUpdate("snapshot",existing.id,snapToRow({date:d,value:val},userId),isImpersonating).then(function(){
        setSnaps(function(p){return p.map(function(s){return s.id===existing.id?Object.assign({},s,{value:val}):s;});});
        setSyncStatus("saved");setTimeout(function(){setSyncStatus("");},2000);
      }).catch(function(){setSyncStatus("error");});
    } else {
      sbInsert("snapshot",snapToRow({date:d,value:val},userId),isImpersonating).then(function(ins){
        var ns={id:ins&&ins.id?ins.id:Date.now(),date:d,value:val};
        setSnaps(function(p){return [...p,ns].sort(function(a,b){return a.date.localeCompare(b.date);});});
        setSyncStatus("saved");setTimeout(function(){setSyncStatus("");},2000);
      }).catch(function(){setSyncStatus("error");});
    }
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
        <div style={{fontSize:10,color:"var(--m)",fontFamily:"var(--mono)"}}>
          {liveLoading?"⏳ Aggiornamento...":lastUpdated?"Aggiornato alle "+lastUpdated.getHours()+":"+String(lastUpdated.getMinutes()).padStart(2,"0"):"Prezzi in tempo reale"}
        </div>
        <div style={{display:"flex",gap:4}}>
          {["ALL","DAY"].map(function(v){return(
            <button key={v} className={"btn "+(holdingsView===v?"bp":"bg_")}
              style={{fontSize:11,padding:"4px 14px",minWidth:50}}
              onClick={function(){setHoldingsView(v);}}>
              {v}
            </button>
          );})}
        </div>
      </div>

      <div className="tbl" style={{marginBottom:14}}>
        <table>
          <thead><tr>
            <th>Asset</th>
            {holdingsView==="ALL"&&<><th>Qtà</th><th>PMC</th><th>Investito</th><th>Prezzo</th><th>Ctv</th><th>Diff €</th><th>Diff %</th></>}
            {holdingsView==="DAY"&&<><th>Prezzo</th><th>Var %</th><th>Var €</th></>}
          </tr></thead>
          <tbody>
            {(()=>{
              return [
                (()=>{
                  // Group livePositions by assetClass, render each group with header+rows+total
                  var acGroups = {};
                  livePositions.forEach(function(p){
                    var ac = p.assetClass||"Altro";
                    if(!acGroups[ac]) acGroups[ac]=[];
                    acGroups[ac].push(p);
                  });
                  var acOrder = ["Azioni","Commodities","Crypto","Altro"];
                  var result = [];
                  acOrder.forEach(function(ac){
                    var group = acGroups[ac];
                    if(!group||!group.length) return;
                    var totInvAC=0,totCtvAC=0,totDiffAC=0,hasLiveAC=false,totVarEurAC=0,hasVarAC=false;
                    group.forEach(function(p){
                      var lp=p.ticker?livePrices[p.ticker]:null;
                      var lp2=lp&&lp.price?lp.price:null;
                      var cp=lp&&lp.change_pct!=null?lp.change_pct:null;
                      totInvAC+=p.cost;
                      if(lp2!=null){totCtvAC+=lp2*p.qty;totDiffAC+=(lp2*p.qty-p.cost);hasLiveAC=true;}
                      if(lp2!=null&&cp!=null){totVarEurAC+=lp2*p.qty*(cp/100);hasVarAC=true;}
                    });
                    var totDiffPctAC=totInvAC>0&&hasLiveAC?(totDiffAC/totInvAC)*100:null;
                    var totCpAC=totCtvAC>0&&hasVarAC?(totVarEurAC/totCtvAC)*100:null;

                    // Rows
                    group.forEach(function(p,i){
                      var pmc=p.qty>0?p.cost/p.qty:0;
                      var lp=p.ticker?livePrices[p.ticker]:null;
                      var livePrice=lp&&lp.price?lp.price:null;
                      var changePct=lp&&lp.change_pct!=null?lp.change_pct:null;
                      var ctv=livePrice!=null?livePrice*p.qty:null;
                      var diff=ctv!=null?ctv-p.cost:null;
                      var diffPct=p.cost>0&&diff!=null?(diff/p.cost)*100:null;
                      var varEur=livePrice!=null&&changePct!=null?livePrice*p.qty*(changePct/100):null;
                      var grey=!p.ticker||(lp&&lp.error);
                      result.push(
                        <tr key={ac+i} style={{opacity:grey?0.4:1,cursor:"pointer"}} onClick={function(){onClickInst(p.instrument);}}>
                          <td>
                            <div style={{display:"flex",alignItems:"center",gap:7}}>
                              <span style={{flexShrink:0,width:8,height:8,borderRadius:"50%",background:acColor(ac)}}/>
                              <div>
                                <div style={{fontWeight:600,color:"var(--t)"}}>{p.instrument}</div>
                                {p.ticker&&<div style={{fontSize:9,color:"var(--m)"}}>{p.ticker}</div>}
                                {!p.ticker&&<div style={{fontSize:9,color:"var(--y)"}}>ticker mancante</div>}
                                {lp&&lp.error&&<div style={{fontSize:9,color:"var(--r)"}}>{lp.error}</div>}
                              </div>
                            </div>
                          </td>
                          {holdingsView==="ALL"&&<><td>{fN(p.qty,p.qty%1===0?0:2)}</td><td>{fN(pmc,2)}</td></>}
                          {holdingsView==="ALL"
                            ?<>
                              <td>{fN(p.cost)}</td>
                              <td className={grey?"mu":"neu"}>{livePrice!=null?fN(livePrice,2):"—"}</td>
                              <td className={grey?"mu":"neu"}>{ctv!=null?fN(ctv):"—"}</td>
                              <td className={grey?"mu":sgn(diff)}>{diff!=null?fN(diff):"—"}</td>
                              <td className={grey?"mu":sgn(diffPct)}>{diffPct!=null?fP(diffPct,2):"—"}</td>
                            </>
                            :<>
                              <td className={grey?"mu":"neu"}>{livePrice!=null?fN(livePrice,2):"—"}</td>
                              <td className={grey||changePct==null?"mu":sgn(changePct)}>{changePct!=null?fP(changePct,2):"—"}</td>
                              <td className={grey||varEur==null?"mu":sgn(varEur)}>{varEur!=null?fN(varEur):"—"}</td>
                            </>
                          }
                        </tr>
                      );
                    });
                    // Subtotal row
                    result.push(holdingsView==="ALL"
                      ?<tr key={ac+"tot"} style={{borderTop:"1px solid var(--b)",fontWeight:700}}>
                        <td style={{color:acColor(ac)}}>{"TOT. "+ac.toUpperCase()}</td><td/><td/>
                        <td className="neu">{fN(totInvAC)}</td>
                        <td/>
                        <td className="neu">{hasLiveAC?fN(totCtvAC):"—"}</td>
                        <td className={sgn(totDiffAC)}>{hasLiveAC?fN(totDiffAC):"—"}</td>
                        <td className={sgn(totDiffPctAC)}>{totDiffPctAC!=null?fP(totDiffPctAC,2):"—"}</td>
                      </tr>
                      :<tr key={ac+"tot"} style={{borderTop:"1px solid var(--b)",fontWeight:700}}>
                        <td style={{color:acColor(ac)}}>{"TOT. "+ac.toUpperCase()}</td>
                        <td/>
                        <td className={sgn(totCpAC)}>{totCpAC!=null?fP(totCpAC,2):"—"}</td>
                        <td className={sgn(totVarEurAC)}>{hasVarAC?fN(totVarEurAC):"—"}</td>
                      </tr>
                    );
                  });
                  return result;
                })(),

                fundPositions.map(function(p,i){
                  var fp=p.isin?fundPrices[p.isin]:null;
                  var livePrice=fp&&fp.price>0?fp.price:null;
                  var ctv=livePrice!=null?livePrice*p.qty:null;
                  var diff=ctv!=null?ctv-p.cost:null;
                  var diffPct=p.cost>0&&diff!=null?(diff/p.cost)*100:null;
                  var pmc=p.qty>0?p.cost/p.qty:0;
                  var grey=!p.isin||(fp&&fp.error);
                  return (
                    <tr key={"f"+i} style={{cursor:"pointer"}} onClick={function(){onClickInst(p.instrument);}}>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <span style={{flexShrink:0,width:8,height:8,borderRadius:"50%",background:acColor("Fondi")}}/>
                          <div>
                            <div style={{fontWeight:600,color:"var(--t)"}}>{p.instrument}</div>
                            {!p.isin&&<div style={{fontSize:9,color:"var(--y)"}}>ISIN mancante</div>}
                            {fp&&fp.error&&<div style={{fontSize:9,color:"var(--r)"}}>{fp.error}</div>}
                          </div>
                        </div>
                      </td>
                      <td>{fN(p.qty,p.qty%1===0?0:3)}</td>
                      <td>{fN(pmc,3)}</td>
                      <td className="neu">{fN(p.cost)}</td>
                      <td className={grey?"mu":"neu"}>{livePrice!=null?fN(livePrice,3):"—"}</td>
                      <td className={grey?"mu":"neu"}>{ctv!=null?fN(ctv):"—"}</td>
                      <td className={grey?"mu":sgn(diff)}>{diff!=null?fN(diff):"—"}</td>
                      <td className={grey?"mu":sgn(diffPct)}>{diffPct!=null?fP(diffPct,2):"—"}</td>
                    </tr>
                  );
                }),
                fundPositions.length>0&&(()=>{
                  var tFInv=0,tFCtv=0,tFDiff=0,hasFP=false;
                  fundPositions.forEach(function(p){
                    var fp=p.isin?fundPrices[p.isin]:null;
                    var lp=fp&&fp.price>0?fp.price:null;
                    tFInv+=p.cost;
                    if(lp!=null){tFCtv+=lp*p.qty;tFDiff+=(lp*p.qty-p.cost);hasFP=true;}
                  });
                  var tFPct=tFInv>0&&hasFP?(tFDiff/tFInv)*100:null;
                  return <tr key="ftot" style={{borderTop:"1px solid var(--b)",fontWeight:700}}>
                    <td style={{color:acColor("Fondi")}}>TOT. FONDI</td><td/><td/>
                    <td className="neu">{fN(tFInv)}</td>
                    <td/>
                    <td className="neu">{hasFP?fN(tFCtv):"—"}</td>
                    <td className={sgn(tFDiff)}>{hasFP?fN(tFDiff):"—"}</td>
                    <td className={sgn(tFPct)}>{tFPct!=null?fP(tFPct,2):"—"}</td>
                  </tr>;
                })(),

                bondPositions.map(function(p,i){
                  var pmc=p.qty>0?p.cost/p.qty:0;
                  var bp=p.isin?effectiveBondPrices[p.isin]:null;
                  var livePrice=bp&&bp.price>0?bp.price:null;
                  var ctv=livePrice!=null?livePrice/100*p.qty:null;
                  var diff=ctv!=null?ctv-p.cost:null;
                  var diffPct=p.cost>0&&diff!=null?(diff/p.cost)*100:null;
                  var grey=!p.isin||(bp&&bp.error&&!manualBondPrices[p.isin]);
                  var noPrice=!livePrice;
                  var isEditing=editingIsin===p.isin;
                  return (
                    <tr key={"b"+i} style={{cursor:"pointer"}} onClick={function(){onClickInst(p.instrument);}}>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <span style={{flexShrink:0,width:8,height:8,borderRadius:"50%",background:acColor("Obbligazioni")}}/>
                          <div style={{fontWeight:600,color:"var(--t)"}}>{p.instrument}
                        {(noPrice||manualBondPrices[p.isin])&&!isEditing&&<span
                          title="Inserisci prezzo manuale"
                          style={{marginLeft:6,cursor:"pointer",fontSize:11,opacity:0.7}}
                          onClick={function(e){e.stopPropagation();setEditingIsin(p.isin);setEditingVal(manualBondPrices[p.isin]?String(manualBondPrices[p.isin].price):"");}}>✏️</span>}
                        {isEditing&&<span onClick={function(e){e.stopPropagation();}} style={{display:"inline-flex",alignItems:"center",gap:4,marginLeft:6}}>
                          <input autoFocus type="number" step="0.01" placeholder="es. 98.50"
                            style={{width:80,fontSize:11,padding:"1px 4px",background:"var(--s2)",border:"1px solid var(--bl)",borderRadius:4,color:"var(--t)"}}
                            value={editingVal}
                            onChange={function(e){setEditingVal(e.target.value);}}
                            onKeyDown={function(e){
                              if(e.key==="Enter"){
                                var v=parseFloat(editingVal);
                                if(v>0){setManualBondPrices(function(prev){var n=Object.assign({},prev);n[p.isin]={price:v,manual:true};return n;});}
                                setEditingIsin(null);
                              }
                              if(e.key==="Escape"){setEditingIsin(null);}
                            }}/>
                          <span style={{fontSize:10,color:"var(--m)"}}>↵</span>
                        </span>}
                          </div>
                        </div>
                      </td>
                      {holdingsView==="ALL"&&<><td>{fN(p.qty,0)}</td><td>{fN(pmc*100,2)}</td></>}
                      {holdingsView==="ALL"
                        ?<>
                          <td className="neu">{fN(p.cost)}</td>
                          <td className={grey?"mu":"neu"}>{livePrice!=null?fN(livePrice,2):"—"}</td>
                          <td className={grey?"mu":"neu"}>{ctv!=null?fN(ctv):"—"}</td>
                          <td className={grey?"mu":sgn(diff)}>{diff!=null?fN(diff):"—"}</td>
                          <td className={grey?"mu":sgn(diffPct)}>{diffPct!=null?fP(diffPct,2):"—"}</td>
                        </>
                        :<>
                          {(()=>{var bp2=p.isin?effectiveBondPrices[p.isin]:null;var cp=bp2&&bp2.change_pct!=null?bp2.change_pct:null;var ve=livePrice!=null&&cp!=null?livePrice/100*p.qty*(cp/100):null;return<><td className={grey?"mu":"neu"}>{livePrice!=null?fN(livePrice,2):"—"}</td><td className={cp==null?"mu":sgn(cp)}>{cp!=null?fP(cp,2):"—"}</td><td className={ve==null?"mu":sgn(ve)}>{ve!=null?fN(ve):"—"}</td></>;})()}
                        </>
                      }
                    </tr>
                  );
                }),
                bondPositions.length>0&&(()=>{
                  var totVarEurBond=0,hasVarBond=false;
                  bondPositions.forEach(function(p){
                    var bp2=p.isin?effectiveBondPrices[p.isin]:null;
                    var lp2=bp2&&bp2.price>0?bp2.price:null;
                    var cp=bp2&&bp2.change_pct!=null?bp2.change_pct:null;
                    if(lp2!=null&&cp!=null){totVarEurBond+=lp2/100*p.qty*(cp/100);hasVarBond=true;}
                  });
                  var totChangePctBond=totCtvBond>0&&hasVarBond?(totVarEurBond/totCtvBond)*100:null;
                  return holdingsView==="ALL"
                    ?<tr key="btot" style={{borderTop:"1px solid var(--b)",fontWeight:700}}>
                      <td style={{color:acColor("Obbligazioni")}}>TOT. OBBLIGAZIONI</td><td/><td/>
                      <td className="neu">{fN(totInvBond)}</td>
                      <td/>
                      <td className="neu">{hasBondPrices?fN(totCtvBond):"—"}</td>
                      <td className={sgn(totDiffBond)}>{hasBondPrices?fN(totDiffBond):"—"}</td>
                      <td className={sgn(totDiffPctBond)}>{totDiffPctBond!=null?fP(totDiffPctBond,2):"—"}</td>
                    </tr>
                    :<tr key="btot" style={{borderTop:"1px solid var(--b)",fontWeight:700}}>
                      <td style={{color:acColor("Obbligazioni")}}>TOT. OBBLIGAZIONI</td>
                      <td/>
                      <td className={sgn(totChangePctBond)}>{totChangePctBond!=null?fP(totChangePctBond,2):"—"}</td>
                      <td className={sgn(totVarEurBond)}>{hasVarBond?fN(totVarEurBond):"—"}</td>
                    </tr>;
                })()
              ];
            })()}
          </tbody>
        </table>
      </div>

      <div style={{background:"var(--s1)",border:"1px solid var(--b)",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            {holdingsView==="ALL"?<>
              <div style={{fontSize:9,color:"var(--m)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:4}}>Totale Portafoglio</div>
              <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:"var(--t)"}}>{fN(grandTotal)}</div>
              <div style={{fontSize:9,color:"var(--m)",marginTop:3}}>Investito: <span style={{color:"var(--t)"}}>{fN(totInvAll)}</span></div>
              <div style={{fontSize:9,color:"var(--m)",marginTop:1}}>Diff: <span className={sgn(totDiffAll)}>{fN(totDiffAll)}</span> / <span className={sgn(totDiffPctAll)}>{totDiffPctAll!=null?fP(totDiffPctAll,2):"—"}</span></div>
            </>:(()=>{
              var totVarDay=0,hasDayVar=false;
              livePositions.forEach(function(p){var lp=p.ticker?livePrices[p.ticker]:null;var livePrice=lp&&lp.price?lp.price:null;var cp=lp&&lp.change_pct!=null?lp.change_pct:null;if(livePrice!=null&&cp!=null){totVarDay+=livePrice*p.qty*(cp/100);hasDayVar=true;}});
              bondPositions.forEach(function(p){var bp2=p.isin?effectiveBondPrices[p.isin]:null;var lp2=bp2&&bp2.price>0?bp2.price:null;var cp=bp2&&bp2.change_pct!=null?bp2.change_pct:null;if(lp2!=null&&cp!=null){totVarDay+=lp2/100*p.qty*(cp/100);hasDayVar=true;}});
              var varDayPct=grandTotal>0&&hasDayVar?(totVarDay/grandTotal)*100:null;
              return<>
                <div style={{fontSize:9,color:"var(--m)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:4}}>Variazione Giornaliera</div>
                <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700}} className={sgn(totVarDay)}>{hasDayVar?fN(totVarDay):"—"}</div>
                <div style={{fontSize:9,color:"var(--m)",marginTop:3}}>su portafoglio totale {fN(grandTotal)}</div>
                <div style={{fontSize:9,marginTop:1}} className={sgn(varDayPct)}>{varDayPct!=null?fP(varDayPct,2):"—"}</div>
              </>;
            })()}
          </div>
          <div style={{display:"flex",gap:8,flexDirection:"column"}}>
            {holdingsView==="ALL"&&<button className="btn bp" style={{fontSize:11,padding:"8px 14px"}} onClick={handleSnap}>📸 Snapshot oggi</button>}
            {holdingsView==="ALL"&&<button className="btn bp" style={{fontSize:11,padding:"8px 14px"}} onClick={function(){setLiveDonut(true);}}>🍩 Allocazione</button>}
          </div>
        </div>
      </div>

      {liveDonut&&(
        <div className="modal-bg" onClick={function(){setLiveDonut(false);}}>
          <div className="modal" style={{maxWidth:400}} onClick={function(e){e.stopPropagation();}}>
            <div className="mhdr">
              <div className="mtitle">Allocazione Portafoglio</div>
              <button className="mx" onClick={function(){setLiveDonut(false);}}>✕</button>
            </div>
            <Donut slices={donutSlices} total={grandTotal}/>
            <div style={{marginTop:12}}>
              {donutSlices.map(function(s,i){
                return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--b)",fontFamily:"var(--mono)",fontSize:12}}>
                    <span style={{color:acColor(s.label),fontWeight:600}}>{s.label}</span>
                    <span style={{color:"var(--t)"}}>{fN(s.value)} <span style={{color:"var(--m)"}}>{fP(s.pct,1)}</span></span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function AdminTab({anagrafe,setAnagrafe,adminUsers,loadAdminUsers,deleteUser,doImpersonate,sbInsert,sbUpdate,sbDelete,setSyncStatus,anagrafeToRow,rowToAnagrafe,acColor,setConfirmDlg}) {
  const [adminView,setAdminView] = useState("anagrafe");
  const [anagModal,setAnagModal] = useState(null);
  const [anagForm,setAnagForm] = useState({asset:"",assetClass:"Obbligazioni",isin:"",ticker:""});

  const openAnagEdit = (a) => { setAnagForm({asset:a.asset,assetClass:a.assetClass,isin:a.isin||"",ticker:a.ticker||""}); setAnagModal(a); };
  const openAnagNew  = () => { setAnagForm({asset:"",assetClass:"Obbligazioni",isin:"",ticker:""}); setAnagModal("new"); };

  const saveAnag = async () => {
    if(!anagForm.asset.trim()) return;
    try {
      setSyncStatus("saving");
      if(anagModal==="new") {
        const ins = await sbInsert("anagrafe", anagrafeToRow(anagForm), true);
        setAnagrafe(p=>[...p, rowToAnagrafe(ins)]);
      } else {
        await sbUpdate("anagrafe", anagModal.id, anagrafeToRow(anagForm), true);
        setAnagrafe(p=>p.map(a=>a.id===anagModal.id?{...a,...anagForm}:a));
      }
      setSyncStatus("saved"); setTimeout(()=>setSyncStatus(""),2000);
      setAnagModal(null);
    } catch(e) { setSyncStatus("error"); alert(e.message); }
  };

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["anagrafe","📋 Anagrafe"],["utenti","👥 Utenti"]].map(([v,l])=>(
          <button key={v} className={adminView===v?"btn bp":"btn bg_"}
            style={{fontSize:12,padding:"7px 18px"}} onClick={()=>{setAdminView(v);if(v==="utenti")loadAdminUsers();}}>
            {l}
          </button>
        ))}
      </div>

      {adminView==="anagrafe"&&<div>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button className="btn bp" style={{fontSize:11,padding:"6px 14px"}} onClick={openAnagNew}>+ Nuovo strumento</button>
        </div>
        <div className="tbl"><table>
          <thead><tr><th>Asset</th><th>Tipo</th><th>ISIN</th><th>Ticker</th><th></th></tr></thead>
          <tbody>
            {anagrafe.map((a,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{a.asset}</td>
                <td style={{color:acColor(a.assetClass),fontSize:10}}>{a.assetClass}</td>
                <td style={{fontFamily:"var(--mono)",fontSize:10}}>{a.isin||"—"}</td>
                <td style={{fontFamily:"var(--mono)",fontSize:10}}>{a.ticker||"—"}</td>
                <td style={{display:"flex",gap:2}}>
                  <button className="ic" onClick={()=>openAnagEdit(a)}>✏️</button>
                  <button className="ic del" onClick={async()=>{
                    setConfirmDlg({msg:"Eliminare "+a.asset+"?", onOk:async()=>{
                      try{ await sbDelete("anagrafe",a.id, true); setAnagrafe(p=>p.filter(x=>x.id!==a.id)); }
                      catch(e){ alert(e.message); }
                    }});
                  }}>🗑</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table></div>
      </div>}

      {adminView==="utenti"&&<div>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button className="btn bg_" style={{fontSize:11,padding:"6px 14px"}} onClick={loadAdminUsers}>↻ Ricarica</button>
        </div>
        {adminUsers.length===0&&<div className="empty">Nessun utente caricato</div>}
        <div className="tbl"><table>
          <thead><tr><th>Email</th><th>ID</th><th></th></tr></thead>
          <tbody>
            {adminUsers.map((u,i)=>(
              <tr key={i}>
                <td>{u.email}</td>
                <td style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--m)"}}>{u.id}</td>
                <td style={{display:"flex",gap:4}}>
                  <button className="ic" title="Impersona" onClick={()=>doImpersonate(u.id,u.email)}>👁</button>
                  <button className="ic del" title="Elimina" onClick={()=>setConfirmDlg({msg:"Eliminare utente "+u.email+"?", onOk:()=>deleteUser(u.id)})}>🗑</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table></div>
      </div>}

      {anagModal&&(
        <div className="modal-bg" onClick={()=>setAnagModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhdr">
              <div className="mtitle">{anagModal==="new"?"Nuovo strumento":"Modifica strumento"}</div>
              <button className="mx" onClick={()=>setAnagModal(null)}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"8px 0 16px"}}>
              <div className="fg" style={{gridColumn:"span 2"}}>
                <label>Nome asset</label>
                <input value={anagForm.asset} onChange={e=>setAnagForm(p=>({...p,asset:e.target.value}))} autoFocus/>
              </div>
              <div className="fg">
                <label>Tipo</label>
                <select value={anagForm.assetClass} onChange={e=>setAnagForm(p=>({...p,assetClass:e.target.value}))}>
                  <option>Obbligazioni</option><option>Azioni</option>
                  <option>Commodities</option><option>Crypto</option><option>Fondi</option><option>Altro</option>
                </select>
              </div>
              <div className="fg">
                <label>ISIN</label>
                <input value={anagForm.isin} onChange={e=>setAnagForm(p=>({...p,isin:e.target.value}))} placeholder="es. IT0005660052"/>
              </div>
              <div className="fg" style={{gridColumn:"span 2"}}>
                <label>Ticker</label>
                <input value={anagForm.ticker} onChange={e=>setAnagForm(p=>({...p,ticker:e.target.value}))} placeholder="es. AEEM.MI"/>
              </div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn bg_" onClick={()=>setAnagModal(null)}>Annulla</button>
              <button className="btn bp" onClick={saveAnag}>Salva</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [session,setSession]   = useState(null);
  const [userProfile,setUserProfile] = useState(null); // {role: 'admin'|'user'}
  const [impUid,setImpUid]     = useState(null); // impersonated user_id
  const [impEmail,setImpEmail] = useState(null);
  const [authEmail,setAuthEmail] = useState("");
  const [authPwd,setAuthPwd]   = useState("");
  const [authErr,setAuthErr]   = useState("");
  const [authLoading,setAuthLoading] = useState(false);
  const [authMode,setAuthMode] = useState("login"); // login|signup
  const [authOpen,setAuthOpen] = useState(false);
  const [authNome,setAuthNome] = useState("");
  const [authCognome,setAuthCognome] = useState("");
  const [adminUsers,setAdminUsers] = useState([]);
  const [txs,setTxs]     = useState([]);
  const [snaps,setSnaps] = useState([]);
  const snapsRef = React.useRef(snaps);
  useEffect(()=>{ snapsRef.current = snaps; },[snaps]);
  const [anagrafe,setAnagrafe] = useState([]);
  const [ready,setReady] = useState(false);
  const [tab,setTab]     = useState("dashboard");
  const [period,setPeriod] = useState("ALL");
  const [modal,setModal]   = useState(null);
  const [confirmDlg,setConfirmDlg] = useState(null); // {msg, onOk}
  const [snapWizard,setSnapWizard] = useState(false);
  const [wizardVal,setWizardVal] = useState("");
  const [sellModal,setSellModal] = useState(false);
  const [cedoleModal,setCedoleModal] = useState(false);
  const [activeCedMi,setActiveCedMi] = useState(null); // active month in cedole chart
  const [activeCedInst,setActiveCedInst] = useState(null); // active instrument filter
  const [form,setForm]   = useState(EMPTY);
  const [ferr,setFerr]   = useState({});
  const [snapForm,setSnapForm] = useState({date:today(),value:""});
  const [serr,setSerr]   = useState({});
  const [snapEdit,setSnapEdit] = useState(null); // snap being edited
  const [txF,setTxF]     = useState({type:"ALL",ac:"ALL",inst:null});
  const [livePrices,setLivePrices] = useState({});
  const [bondPrices,setBondPrices] = useState({});
  const [fundPrices,setFundPrices] = useState({});
  const [manualBondPrices,setManualBondPrices] = useState({});
  const [liveLoading,setLiveLoading] = useState(false);
  const [liveDonut,setLiveDonut] = useState(false);
  const [holdingsView,setHoldingsView] = useState("ALL");
  const [lastUpdated,setLastUpdated] = useState(null);
  const [snapNotice,setSnapNotice] = useState(false);
  const [skipWelcome,setSkipWelcome] = useState(false);

  const [syncStatus,setSyncStatus] = useState("loading");

  // Init session on mount
  useEffect(()=>{
    (async()=>{
      const { data:{ session:s } } = await _sb.auth.getSession();
      setSession(s);
      if(s) {
        // load profile
        try {
          const profRows = await sbRpc("admin_list_users");
          const me = profRows?.find(u=>u.id===s.user.id);
          // Try profiles table for role
          const hdr = await getHdr();
          const pr = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${s.user.id}&select=role`, {headers:hdr});
          if(pr.ok) {
            const pd = await pr.json();
            if(pd[0]) setUserProfile({role:pd[0].role});
          }
        } catch(e) { console.warn("profile load", e); }
        await loadData(null);
      }
    })();
    const { data: listener } = _sb.auth.onAuthStateChange(async (_event, s) => {
      setSession(s);
      if(s && _event === "SIGNED_IN") {
        try {
          const hdr = await getHdr();
          const pr = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${s.user.id}&select=role`, {headers:hdr});
          if(pr.ok) { const pd = await pr.json(); if(pd[0]) setUserProfile({role:pd[0].role}); }
        } catch(e) {}
        await loadData(null);
      }
    });
    return () => listener?.subscription?.unsubscribe();
  },[]);

  async function loadData(uid) {
    try {
      setSyncStatus("loading");
      const [tRows, sRows, aRows] = await Promise.all([
        sbLoad("transactions_new", uid),
        sbLoad("snapshot", uid),
        sbLoad("anagrafe"),
      ]);
      const anagList = aRows.map(rowToAnagrafe);
      const anagMap = Object.fromEntries(anagList.map(a=>[a.id,a]));
      setAnagrafe(anagList);
      setTxs(tRows.map(r=>rowToTx(r,anagMap)));
      setSnaps(sRows.map(rowToSnap));
      setSyncStatus("");
    } catch(e) {
      console.error(e);
      setSyncStatus("error");
    }
    setReady(true);
  }

  async function doLogin() {
    setAuthLoading(true); setAuthErr("");
    const { error } = await _sb.auth.signInWithPassword({email:authEmail, password:authPwd});
    if(error) { setAuthErr(error.message); setAuthLoading(false); return; }
    const { data:{ session:s } } = await _sb.auth.getSession();
    setSession(s);
    try {
      const hdr = await getHdr();
      const pr = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${s.user.id}&select=role`, {headers:hdr});
      if(pr.ok) { const pd = await pr.json(); if(pd[0]) setUserProfile({role:pd[0].role}); }
    } catch(e) {}
    await loadData(null);
    setAuthLoading(false);
  }
  async function doSignup() {
    setAuthLoading(true); setAuthErr("");
    const displayName = [authNome.trim(), authCognome.trim()].filter(Boolean).join(" ");
    const { error } = await _sb.auth.signUp({email:authEmail, password:authPwd,
      options:{
        emailRedirectTo:"https://miki73e.github.io/TrackFolio/",
        data:{full_name:displayName||authEmail}
      }});
    if(error) setAuthErr(error.message);
    else setAuthErr("Se l'email non è già registrata, riceverai un link di conferma a breve.");
    setAuthLoading(false);
  }
  async function doLogout() {
    await _sb.auth.signOut();
    setSession(null); setUserProfile(null); setImpUid(null); setImpEmail(null);
    setTxs([]); setSnaps([]); setAnagrafe([]); setReady(false);
  }
  async function doImpersonate(uid, email) {
    setImpUid(uid); setImpEmail(email);
    setLivePrices({}); setBondPrices({});
    await loadData(uid);
    setTab("dashboard");
  }
  async function stopImpersonate() {
    setImpUid(null); setImpEmail(null);
    setLivePrices({}); setBondPrices({});
    await loadData(null);
    setTab("dashboard");
  }
  async function loadAdminUsers() {
    try {
      const hdr = await getHdr(true); // service role
      const r = await fetch(`${SB_URL}/rest/v1/rpc/admin_list_users`, {
        method:"POST", headers:hdr, body:"{}"
      });
      if(!r.ok) throw new Error("HTTP "+r.status);
      const rows = await r.json();
      setAdminUsers(rows||[]);
    } catch(e) { console.error(e); }
  }
  async function deleteUser(uid) {
    try {
      await sbRpc("admin_delete_user", {p_user: uid});
      setAdminUsers(p=>p.filter(u=>u.id!==uid));
    } catch(e) { alert("Errore eliminazione: "+e.message); }
  }

  const curYear = new Date().getFullYear();

  const years = useMemo(()=>{
    const s=[...snaps].sort((a,b)=>a.date.localeCompare(b.date));
    if(!s.length) return [];
    const fy=parseInt(s[0].date.slice(0,4)), ly=parseInt(s[s.length-1].date.slice(0,4));
    return Array.from({length:ly-fy+1},(_,i)=>fy+i);
  },[snaps]);

  const displayYear = period==="ALL" ? null : parseInt(period);

  const periodRange = useMemo(()=>{
    if(period==="ALL") return {from:"0000-01-01",to:"9999-12-31"};
    const yr=String(parseInt(period));
    return {from:`${yr}-01-01`, to:`${yr}-12-31`};
  },[period]);

  const allYearData = useMemo(()=>
    years.map(y=>({year:y,...(yearMetrics(txs,snaps,y)||{})}))
  ,[txs,snaps,years]);

  const monthData = useMemo(()=>{
    if(!displayYear) return null;
    return MN.map((_,mi)=>monthMetrics(txs,snaps,displayYear,mi));
  },[txs,snaps,displayYear]);

  // ALL KPIs
  const allKpis = useMemo(()=>{
    const rendimento=allYearData.reduce((s,y)=>s+(y.rendimento||0),0);
    const cedole=allYearData.reduce((s,y)=>s+(y.cedole||0),0);
    const tax=allYearData.reduce((s,y)=>s+(y.tax||0),0);
    const plClose=allYearData.reduce((s,y)=>s+(y.plClose||0),0);
    const plOpen=allYearData.reduce((s,y)=>s+(y.plOpen||0),0);
    const fees=txs.reduce((s,t)=>s+(t.commission||0),0);
    const lastY=allYearData[allYearData.length-1];
    const mp=lastY?.mediaInv||0;
    const pct=mp>0?(rendimento/mp)*100:null;
    return{rendimento,cedole,tax,fees,costs:tax+fees,plClose,plOpen,pct,mediaInv:mp};
  },[allYearData,txs]);

  const yearKpis = useMemo(()=>{
    if(!displayYear) return null;
    return allYearData.find(y=>y.year===displayYear)||null;
  },[allYearData,displayYear]);

  const kpis = period==="ALL" ? allKpis : yearKpis;
  const rNeg = kpis && kpis.rendimento < 0;

  // Line chart: ALL = month-by-month across all years; YEAR = month-by-month in year
  const linePts = useMemo(()=>{
    if(period==="ALL") {
      // All months across all years, cumulative
      const pts = [];
      let cumul = 0;
      for (const yd of allYearData) {
        const yr = yd.year;
        const months = MN.map((_,mi)=>monthMetrics(txs,snaps,yr,mi));
        for (let mi=0; mi<12; mi++) {
          const m = months[mi];
          const lbl = `${MN[mi]} ${String(yr).slice(2)}`;
          if (m != null) {
            cumul += m.rendimento;
            pts.push({x:lbl, y:cumul});
          } else {
            pts.push({x:lbl, y:null});
          }
        }
      }
      // Remove trailing nulls but keep leading ones
      return pts;
    }
    if (!monthData) return [];
    let c=0;
    return MN.map((m,i)=>{
      if (monthData[i]!=null) { c+=monthData[i].rendimento; return{x:m,y:c}; }
      return{x:m,y:null};
    });
  },[period,allYearData,monthData,txs,snaps]);

  const barPts = useMemo(()=>{
    if(period==="ALL") return allYearData.map(y=>({x:String(y.year),y:y.rendimento??null}));
    if(!monthData) return [];
    return MN.map((m,i)=>({x:m,y:monthData[i]?.rendimento??null}));
  },[period,allYearData,monthData]);

  const heatPts = useMemo(()=>{
    if(period==="ALL") return allYearData.map(y=>({x:String(y.year),pct:y.pct??null}));
    if(!monthData) return [];
    return MN.map((m,i)=>({x:m,pct:monthData[i]?.pct??null}));
  },[period,allYearData,monthData]);

  // Sells for modal
  const periodSells = useMemo(()=>{
    const from=period==="ALL"?"0000-01-01":`${parseInt(period)-1}-12-31`;
    const to=period==="ALL"?"9999-12-31":`${period}-12-31`;
    return sellsInRange(txs,from,to);
  },[txs,period]);

  // Cedole
  const cedYear = displayYear||curYear;
  const cedInsts=useMemo(()=>[...new Set(txs.filter(t=>t.type==="INCOME").map(t=>t.instrument))].sort(),[txs]);
  const cedByMonth=useMemo(()=>{
    const m={};
    for(const t of txs.filter(t=>t.type==="INCOME"&&t.date.startsWith(String(cedYear)))){
      const mi=parseInt(t.date.slice(5,7))-1;
      if(!m[mi]) m[mi]={};
      m[mi][t.instrument]=(m[mi][t.instrument]||0)+(t.amount||0);
    }
    return m;
  },[txs,cedYear]);
  const taxCedByMonth=useMemo(()=>{
    const m={};
    for(const t of txs.filter(t=>t.type==="INCOME"&&t.date.startsWith(String(cedYear)))){
      const mi=parseInt(t.date.slice(5,7))-1;
      m[mi]=(m[mi]||0)+(t.tax||0);
    }
    return m;
  },[txs,cedYear]);
  // ALL view: cedole per year per month
  const cedByYear=useMemo(()=>{
    const res={};
    for(const t of txs.filter(t=>t.type==="INCOME")){
      const yr=t.date.slice(0,4);
      const mi=parseInt(t.date.slice(5,7))-1;
      if(!res[yr]) res[yr]=Array(12).fill(0);
      res[yr][mi]+=(t.amount||0);
    }
    return res;
  },[txs]);
  const taxCedByYear=useMemo(()=>{
    const res={};
    for(const t of txs.filter(t=>t.type==="INCOME")){
      const yr=t.date.slice(0,4);
      if(!res[yr]) res[yr]=0;
      res[yr]+=(t.tax||0);
    }
    return res;
  },[txs]);

  // Asset
  const allocData=useMemo(()=>{
    const pos=wavgAt(txs,periodRange.to);
    const byAC={};
    for(const[k,p]of Object.entries(pos)){
      if(p.qty<=0) continue;
      const cls=p.assetClass||"Altro";
      if(!byAC[cls]) byAC[cls]={value:0};
      byAC[cls].value+=p.cost;
    }
    const total=Object.values(byAC).reduce((s,v)=>s+v.value,0);
    const slices=Object.entries(byAC).map(([label,v])=>({label,value:v.value,pct:(v.value/total)*100}));
    return{slices,total};
  },[txs,periodRange]);


  const livePositions=useMemo(()=>{
    const pos=wavgAt(txs,today());
    return Object.values(pos)
      .filter(p=>p.qty>0&&p.assetClass!=="Obbligazioni")
      .map(p=>{
        const anag=anagrafe.find(a=>a.asset.trim().toLowerCase()===p.instrument.trim().toLowerCase())||{};
        return {...p, ticker:anag.ticker||"", isin:anag.isin||""};
      })
      .sort((a,b)=>a.instrument.localeCompare(b.instrument));
  },[txs,anagrafe]);

  const fundPositions=useMemo(()=>{
    const pos=wavgAt(txs,today());
    return Object.values(pos)
      .filter(p=>p.qty>0&&p.assetClass==="Fondi")
      .map(p=>{
        const anag=anagrafe.find(a=>a.asset.trim().toLowerCase()===p.instrument.trim().toLowerCase())||{};
        return {...p, isin:anag.isin||""};
      })
      .sort((a,b)=>a.instrument.localeCompare(b.instrument));
  },[txs,anagrafe]);

  const bondPositions=useMemo(()=>{
    const pos=wavgAt(txs,today());
    return Object.values(pos)
      .filter(p=>p.qty>0&&p.assetClass==="Obbligazioni")
      .map(p=>{
        const anag=anagrafe.find(a=>a.asset.trim().toLowerCase()===p.instrument.trim().toLowerCase())||{};
        return {...p, isin:anag.isin||"", ticker:anag.ticker||""};
      })
      .sort((a,b)=>a.instrument.localeCompare(b.instrument));
  },[txs,anagrafe]);

  const openPositions=useMemo(()=>{
    const pos=wavgAt(txs,periodRange.to);
    return Object.values(pos).filter(p=>p.qty>0).sort((a,b)=>a.instrument.localeCompare(b.instrument));
  },[txs,periodRange]);

  const filtTxs=useMemo(()=>
    [...txs]
      .filter(t=>t.date>=periodRange.from&&t.date<=periodRange.to)
      .filter(t=>txF.type==="ALL"||t.type===txF.type)
      .filter(t=>txF.ac==="ALL"||t.assetClass===txF.ac)
      .filter(t=>!txF.inst||t.instrument===txF.inst)
      .sort((a,b)=>b.date.localeCompare(a.date))
  ,[txs,periodRange,txF]);

  const filtSnaps=useMemo(()=>
    [...snaps].filter(s=>s.date>=periodRange.from&&s.date<=periodRange.to)
      .sort((a,b)=>b.date.localeCompare(a.date))
  ,[snaps,periodRange]);

  // Form
  const instList=useMemo(()=>[...anagrafe].sort((a,b)=>a.asset.localeCompare(b.asset)),[anagrafe]);

  // Snapshot iniziale
  const firstTxDate = useMemo(()=>{
    const buySell = txs.filter(t=>t.type==="BUY"||t.type==="SELL");
    if(!buySell.length) return null;
    return [...buySell].sort((a,b)=>a.date.localeCompare(b.date))[0].date;
  },[txs]);
  const firstSnapDate = useMemo(()=>{
    if(!snaps.length) return null;
    return [...snaps].sort((a,b)=>a.date.localeCompare(b.date))[0].date;
  },[snaps]);
  const showInitialSnap = firstTxDate && (!firstSnapDate || firstSnapDate > firstTxDate);
  const initialSnapValue = useMemo(()=>{
    if(!firstTxDate) return 0;
    return investitoAt(txs, firstTxDate);
  },[txs, firstTxDate]);
  const sf=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const isI=form.type==="INCOME", isBond=form.assetClass==="Obbligazioni";
  const totPreview=!isI?(isBond?(+form.qty||0)*(+form.price||0)/100:(+form.qty||0)*(+form.price||0)):null;

  const validate=()=>{

  const fetchLivePrices = async (positions, bonds, funds) => {
    setLiveLoading(true);

    // Fetch equity/commodity/crypto prices
    const toFetch = positions.filter(p=>p.ticker&&p.assetClass!=="Obbligazioni");
    const results = {};
    await Promise.all(toFetch.map(async p=>{
      try {
        const r = await fetch("https://csyyrbkbgyjyztkjtbrm.supabase.co/functions/v1/prices", {
          method:"POST", headers:HDR,
          body:JSON.stringify({ticker:p.ticker}),
          signal:AbortSignal.timeout(12000)
        });
        if(!r.ok) throw new Error("HTTP "+r.status);
        const d = await r.json();
        if(d.price&&d.price>0) results[p.ticker]={price:d.price,currency:"",change_pct:(d.change_pct!=null?d.change_pct:null)};
        else results[p.ticker]={error:"N/D"};
      } catch(e) { results[p.ticker]={error:e.message}; }
    }));
    setLivePrices(results);
    // Fetch bond prices via get-bond-price (ISIN based)
    const bondResults = {};
    const bondsToFetch = (bonds||[]).filter(p=>p.isin);
    await Promise.all(bondsToFetch.map(async p=>{
      try {
        const r = await fetch("https://csyyrbkbgyjyztkjtbrm.supabase.co/functions/v1/get-bond-price", {
          method:"POST", headers:HDR,
          body:JSON.stringify({isin:p.isin}),
          signal:AbortSignal.timeout(12000)
        });
        if(!r.ok) throw new Error("HTTP "+r.status);
        const d = await r.json();
        // price from Borsa Italiana is already in % (e.g. 98.64), ctv = price/100 * qty
        if(d.price&&d.price>0) bondResults[p.isin]={price:d.price,change_pct:(d.change_pct!=null?d.change_pct:null)};
        else bondResults[p.isin]={error:"N/D"};
      } catch(e) { bondResults[p.isin]={error:e.message}; }
    }));
    setBondPrices(bondResults);
    // Fetch fund prices via get-fund-price (ISIN based, NAV direct value)
    const fundResults = {};
    const fundsToFetch = (funds||[]).filter(p=>p.isin);
    await Promise.all(fundsToFetch.map(async p=>{
      try {
        const r = await fetch("https://csyyrbkbgyjyztkjtbrm.supabase.co/functions/v1/get-fund-price", {
          method:"POST", headers:HDR,
          body:JSON.stringify({isin:p.isin}),
          signal:AbortSignal.timeout(12000)
        });

        else fundResults[p.isin]={error:"N/D"};
      } catch(e) { fundResults[p.isin]={error:e.message}; }
    }));
    setFundPrices(fundResults);
    setLastUpdated(new Date());
    setLiveLoading(false);
  };
