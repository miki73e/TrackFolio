// Map JS object → Supabase transaction row
// ── Anagrafe helpers ──────────────────────────────────────────────────────────
function normalizeAssetClass(v) {
  if (!v) return "";
  const u = v.toString().toUpperCase().trim();
  if (u.includes("OBBLIG")) return "Obbligazioni";
  if (u.includes("AZIONI") || u === "AZIONI") return "Azioni";
  if (u.includes("COMMODIT")) return "Commodities";
  if (u.includes("CRYPTO")) return "Crypto";
  return v;
}
function rowToAnagrafe(r) {
  return {
    id: r.id,
    isin: r.isin||"",
    asset: r.asset||"",
    assetClass: normalizeAssetClass(r.type),
    ticker: r.ticker||"",
  };
}
function anagrafeToRow(a) {
  return {
    isin: a.isin||null,
    asset: a.asset||"",
    type: a.assetClass||"",
    ticker: a.ticker||null,
  };
}

// ── Transaction mapping (transactions_new) ────────────────────────────────────
// r = Supabase row, anagMap = {id -> anagrafe object}
function rowToTx(r, anagMap) {
  // Try by anagrafe_id first, fallback to searching by asset name if missing
  var anag = anagMap[r.anagrafe_id] || {};
  if(!anag.asset && r.anagrafe_id) {
    // anagrafe_id exists but not in map — use empty object
    anag = {};
  }
  const isI = (r.action||"").toUpperCase()==="INCOME";
  const assetClass = anag.assetClass || "";
  const isBond = assetClass==="Obbligazioni";
  const qty = Number(r.qty)||0;
  const price = Number(r.price)||0;
  const totale = isI ? price : isBond ? qty*price/100 : qty*price;
  return {
    id: r.id,
    anagrafeId: r.anagrafe_id,
    date: r.data,
    type: (r.action||"").toUpperCase(),
    assetClass,
    instrument: anag.asset||"",
    isin: anag.isin||"",
    ticker: anag.ticker||"",
    qty, price,
    tax: Number(r.tax)||0,
    commission: Number(r.commissioni)||0,
    totale: Math.round(totale*10000)/10000,
    amount: isI ? price : null,
  };
}
function txToRow(t) {
  return {
    "data": t.date,
    "action": (t.type||"").toUpperCase(),
    "anagrafe_id": t.anagrafeId,
    "qty": t.qty!==undefined&&t.qty!==null ? Number(t.qty) : null,
    "price": t.price!==undefined&&t.price!==null ? Number(t.price) : null,
    "tax": t.tax!==undefined&&t.tax!==null ? Number(t.tax) : null,
    "commissioni": t.commission!==undefined&&t.commission!==null ? Number(t.commission) : null,
  };
}
// Map Supabase snapshot row → JS object
function rowToSnap(r) {
  return {id: r.id, date: r.data, value: Number(r.totale_pf)};
}
function snapToRow(s) {
  return {"data": s.date, "totale_pf": Number(s.value)};
}

async function sbLoad(table) {
  let r;
  try {
    r = await fetch(`${SB_URL}/rest/v1/${table}?select=*&order=id`, {headers: SB_HDR});
  } catch(netErr) {
    throw new Error(`Rete: ${netErr.message}`);
  }
  if (!r.ok) {
    let txt = "";
    try { txt = await r.text(); } catch(e) {}
    throw new Error(`HTTP ${r.status} su ${table}: ${txt.slice(0,200)}`);
  }
  return r.json();
}
async function sbInsert(table, row) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: "POST", headers: {...SB_HDR, "Prefer": "return=representation"},
    body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(`Insert ${table} failed: ${r.status}`);
  const rows = await r.json();
  return rows[0];
}
async function sbUpsert(table, row, onConflict="data") {
  let r;
  try {
    r = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
      method: "POST",
      headers: {...SB_HDR, "Prefer": "return=representation,resolution=merge-duplicates"},
      body: JSON.stringify(row)
    });
  } catch(netErr) {
    throw new Error("Rete: " + netErr.message);
  }
  if (!r.ok) {
    let txt=""; try{txt=await r.text();}catch(e){}
    throw new Error(`Upsert ${table} HTTP ${r.status}: ${txt.slice(0,200)}`);
  }
  const rows = await r.json();
  return rows[0];
}
async function sbUpdate(table, id, row) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "PATCH", headers: {...SB_HDR, "Prefer": "return=representation"},
    body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(`Update ${table} failed: ${r.status}`);
}
async function sbDelete(table, id) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "DELETE", headers: SB_HDR
  });
  if (!r.ok) throw new Error(`Delete ${table} failed: ${r.status}`);
}

const MN = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const AC_LIST = ["Obbligazioni","Azioni","Commodities","Crypto","Altro"];
const AC_COL  = {"Obbligazioni":"#3b82f6","Azioni":"#22c55e","Commodities":"#f59e0b","Crypto":"#a78bfa","Altro":"#fb923c"};
const acColor = cls => AC_COL[cls] || "#64748b";
const today = () => new Date().toISOString().slice(0,10);

const fN = (n, d=0) => {
  if (n==null||isNaN(n)) return "—";
  const abs = Math.abs(n).toFixed(d);
  const [int, dec] = abs.split(".");
  const grouped = int.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const formatted = dec !== undefined && d > 0 ? grouped + "," + dec : grouped;
  return (n < 0 ? "-" : "") + formatted;
};
const fP = (n, d=1) => n==null||isNaN(n) ? "—" : fN(n,d) + "%";
const sgn = n => n==null||isNaN(n) ? "neu" : n > 0 ? "green" : n < 0 ? "red" : "neu";
const heatCol = p => {
  if (p==null) return "var(--s2)";
  const t = Math.max(-1, Math.min(1, p/5));
  return t >= 0 ? `rgba(34,197,94,${0.08+t*0.4})` : `rgba(239,68,68,${0.08+Math.abs(t)*0.4})`;
};

// ── Engine ────────────────────────────────────────────────────────────────────
function wavgAt(txs, date) {
  const pos = {};
  const filtered = [...txs].filter(t => t.type !== "INCOME" && t.date <= date)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const tx of filtered) {
    const k = tx.instrument;
    if (!pos[k]) pos[k] = {qty:0, cost:0, assetClass:tx.assetClass, instrument:tx.instrument, isin:tx.isin||""};
    if (tx.type === "BUY") {
      pos[k].qty += tx.qty;
      pos[k].cost += tx.totale + (tx.commission||0);
    } else if (tx.type === "SELL" && pos[k].qty > 0) {
      const avg = pos[k].cost / pos[k].qty;
      pos[k].cost -= avg * tx.qty;
      pos[k].qty = Math.max(0, pos[k].qty - tx.qty);
      if (pos[k].qty === 0) pos[k].cost = 0;
    }
  }
  return pos;
}
function investitoAt(txs, date) {
  return Object.values(wavgAt(txs, date)).reduce((s,p) => s + (p.qty>0 ? p.cost : 0), 0);
}
function snapAt(snaps, date) {
  const s = [...snaps].sort((a,b) => a.date.localeCompare(b.date)).filter(x => x.date <= date);
  return s.length ? s[s.length-1].value : null;
}
// Last snap date at or before date
function lastSnapDate(snaps, date) {
  const s = [...snaps].sort((a,b) => a.date.localeCompare(b.date)).filter(x => x.date <= date);
  return s.length ? s[s.length-1].date : null;
}
function mediaPesata(txs, from, to) {
  const eventDates = [...new Set(
    [from, ...txs.filter(t => t.type!=="INCOME" && t.date>=from && t.date<=to).map(t=>t.date), to]
  )].sort();
  let totW = 0, totD = 0;
  for (let i = 0; i < eventDates.length-1; i++) {
    const d0 = eventDates[i], d1 = eventDates[i+1];
    const days = (new Date(d1) - new Date(d0)) / 86400000;
    if (days <= 0) continue;
    totW += investitoAt(txs, d0) * days;
    totD += days;
  }
  totW += investitoAt(txs, to);
  totD += 1;
  return totD > 0 ? totW / totD : 0;
}
function plOpenYear(txs, snaps, year) {
  const jan1 = `${year}-01-01`, dec31 = `${year}-12-31`;
  const snapEnd = snapAt(snaps, dec31);
  if (snapEnd == null) return null;
  const snapJan = snapAt(snaps, jan1) || 0;
  return (snapEnd - investitoAt(txs, dec31)) - (snapJan - investitoAt(txs, jan1));
}
function plCloseRange(txs, from, to) {
  let total = 0;
  const sells = [...txs].filter(t => t.type==="SELL" && t.date>from && t.date<=to)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const sell of sells) {
    const posBefore = wavgAt(txs.filter(t => t.date < sell.date), sell.date);
    const p = posBefore[sell.instrument];
    const pmc = p && p.qty > 0 ? p.cost / p.qty : 0;
    total += sell.totale - pmc * sell.qty - (sell.commission||0);
  }
  return total;
}
function sellsInRange(txs, from, to) {
  const result = [];
  const sells = [...txs].filter(t => t.type==="SELL" && t.date>from && t.date<=to)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const sell of sells) {
    const posBefore = wavgAt(txs.filter(t => t.date < sell.date), sell.date);
    const p = posBefore[sell.instrument];
    const pmc = p && p.qty > 0 ? p.cost / p.qty : 0;
    const pl = sell.totale - pmc * sell.qty; // P/L before costs
    const fees = sell.commission||0;
    const tax = sell.tax||0;
    const net = pl - tax - fees;
    const costBuy = pmc * sell.qty;
    const pct = costBuy > 0 ? (net / costBuy) * 100 : null;
    result.push({...sell, pmc, pl, fees, net, pct});
  }
  return result;
}
function yearMetrics(txs, snaps, year) {
  const yr = String(year), jan1 = `${yr}-01-01`, dec31 = `${yr}-12-31`;
  const lastSnap = snapAt(snaps, dec31);
  if (lastSnap == null) return null;
  const plOpen = plOpenYear(txs, snaps, year);
  const plClose = plCloseRange(txs, `${year-1}-12-31`, dec31);
  const cedole = txs.filter(t => t.type==="INCOME" && t.date>=jan1 && t.date<=dec31)
    .reduce((s,t) => s+(t.amount||0), 0);
  const tax = txs.filter(t => t.date>=jan1 && t.date<=dec31)
    .reduce((s,t) => s+(t.tax||0), 0);
  const rendimento = (plOpen||0) + plClose + cedole - tax;
  const mp = mediaPesata(txs, jan1, dec31);
  const pct = mp > 0 ? (rendimento/mp)*100 : null;
  const fees=txs.filter(t=>t.date>=jan1&&t.date<=dec31).reduce((s,t)=>s+(t.commission||0),0);
  return {plOpen, plClose, cedole, tax, fees, costs:tax+fees, rendimento, pct, mediaInv:mp, lastSnap};
}
function monthMetrics(txs, snaps, year, mi) {
  const yr = String(year), mStr = String(mi+1).padStart(2,"0");
  // Fix: use actual last day of month instead of always 31
  const lastDay = new Date(year, mi+1, 0).getDate();
  const mEnd = `${yr}-${mStr}-${String(lastDay).padStart(2,"0")}`;
  const prevMEnd = mi===0 ? `${year-1}-12-31` : `${yr}-${String(mi).padStart(2,"0")}-31`;

  // Need a snap in this month
  const hasSnap = snaps.some(s => {
    const sm = parseInt(s.date.slice(5,7))-1;
    return parseInt(s.date.slice(0,4))===year && sm===mi;
  });
  if (!hasSnap) return null;

  const snapEnd = snapAt(snaps, mEnd);
  if (snapEnd == null) return null;
  // If no snapshot exists before this month (e.g. first month of first year),
  // use the earliest available snapshot as baseline instead of zero
  const snapPrevRaw = snapAt(snaps, prevMEnd);
  const snapPrev = snapPrevRaw !== null ? snapPrevRaw : snapAt(snaps, `${yr}-01-01`) || 0;
  const prevMEndEff = snapPrevRaw !== null ? prevMEnd : `${yr}-01-01`;
  const plOpen = (snapEnd - investitoAt(txs, mEnd)) - (snapPrev - investitoAt(txs, prevMEndEff));
  // When baseline is jan1 (first month of data), include jan1 itself (>=)
  // Otherwise use exclusive (>) as normal month boundary
  const inclFrom = snapPrevRaw === null; // true only for first month of first year
  const afterPrev = t => inclFrom ? t.date>=prevMEndEff : t.date>prevMEndEff;
  const plClose = (() => {
    const sells = [...txs].filter(t => t.type==="SELL" && afterPrev(t) && t.date<=mEnd)
      .sort((a,b) => a.date.localeCompare(b.date));
    let tot=0;
    for(const sell of sells){
      const pb=wavgAt(txs.filter(t=>t.date<sell.date),sell.date);
      const pp=pb[sell.instrument];
      const pmc=pp&&pp.qty>0?pp.cost/pp.qty:0;
      tot+=sell.totale-pmc*sell.qty-(sell.commission||0);
    }
    return tot;
  })();
  const cedole = txs.filter(t => t.type==="INCOME" && afterPrev(t) && t.date<=mEnd)
    .reduce((s,t) => s+(t.amount||0), 0);
  const tax = txs.filter(t => afterPrev(t) && t.date<=mEnd)
    .reduce((s,t) => s+(t.tax||0), 0);
  const rendimento = plOpen + plClose + cedole - tax;
  const mStart = `${yr}-${mStr}-01`;
  const mp = mediaPesata(txs, mStart > prevMEnd ? mStart : prevMEnd, mEnd);
  const pct = mp > 0 ? (rendimento/mp)*100 : null;
  return {plOpen, plClose, cedole, tax, rendimento, pct, mediaInv:mp};
}

// ── Charts ────────────────────────────────────────────────────────────────────
function LineChart({pts}) {
  const [act, setAct] = useState(null);
  const valid = pts.filter(p => p.y != null);
  if (!valid.length) return <div className="empty" style={{padding:14,fontSize:11}}>Nessun dato</div>;
  const W=700,H=155,pL=52,pR=16,pT=10,pB=26;
  const iW=W-pL-pR, iH=H-pT-pB;
  const ys = valid.map(p => p.y);
  const mn=Math.min(0,...ys), mx=Math.max(0,...ys), rng=mx-mn||1;
  const xOf = i => pL + (i/(pts.length-1||1))*iW;
  const yOf = v => pT + iH - ((v-mn)/rng)*iH;
  const y0 = yOf(0);
  const vp = pts.map((p,i) => p.y!=null ? {x:xOf(i), y:yOf(p.y), v:p.y, lbl:p.x, i} : null).filter(Boolean);
  const path = vp.map((p,j) => `${j===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const area = vp.length>1 ? `${path} L${vp[vp.length-1].x},${y0} L${vp[0].x},${y0}Z` : "";
  return (
    <div style={{position:"relative"}} onClick={()=>setAct(null)}>
      {act!=null && vp.find(p=>p.i===act) && (()=>{
        const p = vp.find(q=>q.i===act);
        return <div style={{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",
          background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,
          padding:"3px 12px",fontFamily:"var(--mono)",fontSize:11,
          color:p.v>=0?"var(--g)":"var(--r)",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10}}>
          {p.lbl} — {fN(p.v)}
        </div>;
      })()}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{height:155,display:"block"}}>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity=".25"/>
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0"/>
        </linearGradient></defs>
        <line x1={pL} y1={y0} x2={W-pR} y2={y0} stroke="var(--b)" strokeWidth="1" strokeDasharray="4 3"/>
        {[mn,0,mx].filter((v,i,a)=>a.indexOf(v)===i).map((v,i)=>(
          <text key={i} x={pL-4} y={yOf(v)+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
            {Math.abs(v)>=1000?`${v<0?"-":""}${(Math.abs(v)/1000).toFixed(1)}k`:fN(v)}
          </text>
        ))}
        {pts.map((p,i)=><text key={i} x={xOf(i)} y={H-2} textAnchor="middle" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">{p.x}</text>)}
        {area&&<path d={area} fill="url(#lg)"/>}
        {path&&<path d={path} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinejoin="round"/>}
        {vp.map((p,j)=>(
          <circle key={j} cx={p.x} cy={p.y} r="6" fill={p.v>=0?"var(--g)":"var(--r)"} opacity=".9"
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation();setAct(act===p.i?null:p.i);}}
            onMouseEnter={()=>setAct(p.i)} onMouseLeave={()=>{}}
          />
        ))}
      </svg>
    </div>
  );
}

function BarChart({pts, onBar}) {
  const [act,setAct]=useState(null);
  const W=700,H=145,pL=52,pR=16,pT=10,pB=26;
  const iW=W-pL-pR, iH=H-pT-pB;
  const vals = pts.map(p=>p.y??0);
  const am = Math.max(1,...vals.map(Math.abs));
  const bW = iW/pts.length*0.6;
  const xOf = i => pL+(i/pts.length)*iW+(iW/pts.length)*0.2;
  const y0 = pT+iH/2, sc = (iH/2)/am;
  if (!pts.some(p=>p.y!=null)) return <div className="empty" style={{padding:14,fontSize:11}}>Nessun dato</div>;
  return (
    <div style={{position:"relative"}} onClick={()=>setAct(null)}>
      {act!=null && pts[act]?.y!=null && (
        <div style={{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",
          background:"var(--s2)",border:"1px solid var(--b)",borderRadius:6,
          padding:"3px 12px",fontFamily:"var(--mono)",fontSize:11,
          color:pts[act].y>=0?"var(--g)":"var(--r)",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10}}>
          {pts[act].x} — {fN(pts[act].y)}
        </div>
      )}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{height:145,display:"block"}}>
        <line x1={pL} y1={y0} x2={W-pR} y2={y0} stroke="var(--b)" strokeWidth="1"/>
        {vals.map((v,i)=>{const h=Math.abs(v)*sc; const y=v>=0?y0-h:y0; return(
          <rect key={i} x={xOf(i)} y={y} width={bW} height={Math.max(1,h)}
            fill={v>=0?"var(--g)":"var(--r)"} rx="2"
            opacity={pts[i].y==null?0.1:act===i?1:0.75}
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation(); setAct(act===i?null:i);}}
            onMouseEnter={()=>setAct(i)} onMouseLeave={()=>{}}
          />
        );})}
        {[am,0,-am].map((v,i)=>(
          <text key={i} x={pL-4} y={y0-v*sc+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
            {Math.abs(v)>=1000?`${v<0?"-":""}${(Math.abs(v)/1000).toFixed(0)}k`:fN(v)}
          </text>
        ))}
        {pts.map((p,i)=>(
          <text key={i} x={xOf(i)+bW/2} y={H-2} textAnchor="middle" fontSize="9"
            fill={act===i?"var(--t)":"var(--m)"} fontFamily="JetBrains Mono,monospace">{p.x}</text>
        ))}
      </svg>
    </div>
  );
}

const INST_COLORS = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a78bfa","#fb923c","#34d399","#e879f9"];
function StackedBar({byMonth, insts, activeMi, onBar, onClear}) {
  const W=700,H=155,pL=50,pR=16,pT=10,pB=26,iW=W-pL-pR,iH=H-pT-pB;
  const bW=iW/12*0.6, xOf=i=>pL+(i/12)*iW+(iW/12)*0.2;
  const tots=Array.from({length:12},(_,i)=>Object.values(byMonth[i]||{}).reduce((s,v)=>s+v,0));
  const mx=Math.max(1,...tots);
  if (!tots.some(v=>v>0)) return <div className="empty" style={{padding:14,fontSize:11}}>Nessuna cedola</div>;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{height:155,display:"block",cursor:"pointer"}}
      onClick={e=>{ if(e.target.tagName!=="rect") onClear&&onClear(); }}>
      {Array.from({length:12},(_,mi)=>{
        let yo=pT+iH;
        const isHi = activeMi==null || activeMi===mi;
        return insts.map((inst,ci)=>{
          const v=(byMonth[mi]||{})[inst]||0; const h=(v/mx)*iH; yo-=h;
          return v>0 ? <rect key={`${mi}-${ci}`} x={xOf(mi)} y={yo} width={bW} height={Math.max(1,h)}
            fill={INST_COLORS[ci%INST_COLORS.length]} rx="2" opacity={isHi?0.9:0.18}
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation(); onBar&&onBar(activeMi===mi?null:mi);}}
          /> : null;
        });
      }).flat().filter(Boolean)}
      {[0,mx/2,mx].map((v,i)=>(
        <text key={i} x={pL-4} y={pT+iH-(v/mx)*iH+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
          {v>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0)}
        </text>
      ))}
      {MN.map((m,i)=>(
        <text key={i} x={xOf(i)+bW/2} y={H-2} textAnchor="middle" fontSize="9"
          fill={activeMi===i?"var(--t)":"var(--m)"}
          fontWeight={activeMi===i?"700":"400"}
          fontFamily="JetBrains Mono,monospace">{m}</text>
      ))}
    </svg>
  );
}

function Donut({slices, total}) {
  if (!total||!slices.length) return <div className="empty">Nessuna posizione aperta</div>;
  const R=82,cx=130,cy=100,ir=50,single=slices.length===1;
  let ang=-Math.PI/2;
  const arcs=slices.map((s,ci)=>{
    const col=acColor(s.label);
    if (single) return{...s,path:null,col};
    const sw=(s.value/total)*2*Math.PI*0.999;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang); ang+=sw;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const lg=sw>Math.PI?1:0;
    const xi1=cx+ir*Math.cos(ang-sw),yi1=cy+ir*Math.sin(ang-sw);
    const xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    return{...s,path:`M${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${lg} 0 ${xi1},${yi1}Z`,col};
  });
  return (
    <div style={{display:"flex",justifyContent:"center"}}>
      <svg width="260" height="200" viewBox="0 0 260 200">
        {arcs.map((a,i)=>a.path
          ?<path key={i} d={a.path} fill={a.col} opacity=".9"/>
          :<g key={i}><circle cx={cx} cy={cy} r={R} fill={a.col} opacity=".9"/><circle cx={cx} cy={cy} r={ir} fill="var(--s1)"/></g>
        )}
        <text x={cx} y={cy-5} textAnchor="middle" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">TOTALE</text>
        <text x={cx} y={cy+11} textAnchor="middle" fontSize="12" fill="var(--t)" fontFamily="JetBrains Mono,monospace" fontWeight="700">
          {total>=1000?`${(total/1000).toFixed(1)}k`:fN(total)}
        </text>
      </svg>
    </div>
  );
}

const EMPTY={date:today(),type:"BUY",assetClass:"",instrument:"",isin:"",ticker:"",anagrafeId:null,qty:"",price:"",commission:"",tax:"",amount:""};

function LiveView({livePositions,bondPositions,livePrices,bondPrices,manualBondPrices,setManualBondPrices,liveLoading,lastUpdated,snaps,setSnaps,setSyncStatus,liveDonut,setLiveDonut,onClickInst,onRefresh,sbUpdate,sbInsert,snapToRow}) {
  var totLiveCtv=0, totBondCtv=0;
  livePositions.forEach(function(p){
    var lp=p.ticker?livePrices[p.ticker]:null;
    // use live price if available, otherwise fallback to cost (investito)
    totLiveCtv+=lp&&lp.price>0?lp.price*p.qty:p.cost;
  });
  var [editingIsin, setEditingIsin] = React.useState(null);
  var [editingVal, setEditingVal] = React.useState("");

  // Merge auto + manual bond prices
  var effectiveBondPrices = {};
  bondPositions.forEach(function(p){
    if(p.isin) {
      var auto = bondPrices[p.isin];
      var manual = manualBondPrices[p.isin];
      effectiveBondPrices[p.isin] = (auto && auto.price>0) ? auto : (manual ? manual : null);
    }
  });

  var totBondLiveCtv=0, hasBondLive=false;
  bondPositions.forEach(function(p){
    var bp=p.isin?effectiveBondPrices[p.isin]:null;
    if(bp&&bp.price>0){
      totBondLiveCtv+=bp.price/100*p.qty;
      hasBondLive=true;
    } else {
      totBondLiveCtv+=p.cost;
    }
    totBondCtv+=p.cost;
  });
  var grandTotal=totLiveCtv+totBondLiveCtv;

  // Totale investito azioni (always from cost, scope-level)
  var totInvAzioni=0, totCtvAzioni=0, totDiffAzioni=0, hasLiveAzioni=false;
  livePositions.forEach(function(p){
    var lp=p.ticker?livePrices[p.ticker]:null;
    var livePrice=lp&&lp.price?lp.price:null;
    totInvAzioni+=p.cost;
    if(livePrice!=null){totCtvAzioni+=livePrice*p.qty;totDiffAzioni+=(livePrice*p.qty-p.cost);hasLiveAzioni=true;}
  });
  var totDiffPctAzioni=totInvAzioni>0&&hasLiveAzioni?(totDiffAzioni/totInvAzioni)*100:null;
  var totInvBond=0, totCtvBond=0, totDiffBond=0, hasBondPrices=false;
  bondPositions.forEach(function(p){
    var bp=p.isin?effectiveBondPrices[p.isin]:null;
    var livePrice=bp&&bp.price>0?bp.price:null;
    totInvBond+=p.cost;
    if(livePrice!=null){totCtvBond+=livePrice/100*p.qty;totDiffBond+=(livePrice/100*p.qty-p.cost);hasBondPrices=true;}
  });
  var totDiffPctBond=totInvBond>0&&hasBondPrices?(totDiffBond/totInvBond)*100:null;
  var totInvAll=totInvAzioni+totInvBond;
  var totDiffAll=grandTotal-totInvAll;
  var totDiffPctAll=totInvAll>0?(totDiffAll/totInvAll)*100:null;

  var byAC={};
  livePositions.forEach(function(p){
    var lp=p.ticker?livePrices[p.ticker]:null;
    var v=lp&&lp.price>0?lp.price*p.qty:p.cost;
    byAC[p.assetClass]=(byAC[p.assetClass]||0)+v;
  });
  byAC["Obbligazioni"]=(byAC["Obbligazioni"]||0)+totBondLiveCtv;
  var donutSlices=Object.entries(byAC).map(function(e){
    return {label:e[0],value:e[1],pct:grandTotal>0?(e[1]/grandTotal)*100:0};
  });

  function handleSnap() {
    var d=today();
    var existing=snaps.find(function(s){return s.date===d;});
    setSyncStatus("saving");
    var val=Math.round(grandTotal*100)/100;
    if(existing){
      sbUpdate("snapshot",existing.id,snapToRow({date:d,value:val})).then(function(){
        setSnaps(function(p){return p.map(function(s){return s.id===existing.id?Object.assign({},s,{value:val}):s;});});
        setSyncStatus("saved");setTimeout(function(){setSyncStatus("");},2000);
      }).catch(function(){setSyncStatus("error");});
    } else {
      sbInsert("snapshot",snapToRow({date:d,value:val})).then(function(ins){
        var ns={id:ins&&ins.id?ins.id:Date.now(),date:d,value:val};
        setSnaps(function(p){return [...p,ns].sort(function(a,b){return a.date.localeCompare(b.date);});});
        setSyncStatus("saved");setTimeout(function(){setSyncStatus("");},2000);
      }).catch(function(){setSyncStatus("error");});
    }
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
        <div style={{fontSize:10,color:"var(--m)",fontFamily:"var(--mono)"}}>
          {liveLoading?"⏳ Aggiornamento...":lastUpdated?"Aggiornato alle "+lastUpdated.getHours()+":"+String(lastUpdated.getMinutes()).padStart(2,"0"):"Prezzi in tempo reale"}
        </div>
        <button className="btn bp" style={{fontSize:10,padding:"5px 10px"}} onClick={onRefresh} disabled={liveLoading} title="Aggiorna ora">↻</button>
      </div>

      <div className="tbl" style={{marginBottom:14}}>
        <table>
          <thead><tr>
            <th>Asset</th><th>Qtà</th><th>PMC</th><th>Investito</th>
            <th>Prezzo Live</th><th>Ctv. Live</th><th>Diff €</th><th>Diff %</th>
          </tr></thead>
          <tbody>
            {(()=>{
              return [
                livePositions.map(function(p,i){
                  var pmc=p.qty>0?p.cost/p.qty:0;
                  var lp=p.ticker?livePrices[p.ticker]:null;
                  var livePrice=lp&&lp.price?lp.price:null;
                  var ctv=livePrice!=null?livePrice*p.qty:null;
                  var diff=ctv!=null?ctv-p.cost:null;
                  var diffPct=p.cost>0&&diff!=null?(diff/p.cost)*100:null;
                  var grey=!p.ticker||(lp&&lp.error);
                  return (
                    <tr key={"a"+i} style={{opacity:grey?0.4:1,cursor:"pointer"}} onClick={function(){onClickInst(p.instrument);}}>
                      <td><div style={{fontWeight:600,color:acColor(p.assetClass)}}>{p.instrument}</div>
                        {p.ticker&&<div style={{fontSize:9,color:"var(--m)"}}>{p.ticker}</div>}
                        {!p.ticker&&<div style={{fontSize:9,color:"var(--y)"}}>ticker mancante</div>}
                        {lp&&lp.error&&<div style={{fontSize:9,color:"var(--r)"}}>{lp.error}</div>}
                      </td>
                      <td>{fN(p.qty,p.qty%1===0?0:2)}</td>
                      <td>{fN(pmc,2)}</td>
                      <td>{fN(p.cost)}</td>
                      <td className={grey?"mu":livePrice>=pmc?"green":"red"}>{livePrice!=null?fN(livePrice,2):"—"}</td>
                      <td className={grey?"mu":sgn(diff)}>{ctv!=null?fN(ctv):"—"}</td>
                      <td className={grey?"mu":sgn(diff)}>{diff!=null?fN(diff):"—"}</td>
                      <td className={grey?"mu":sgn(diffPct)}>{diffPct!=null?fP(diffPct,2):"—"}</td>
                    </tr>
                  );
                }),
                <tr key="atot" style={{borderTop:"1px solid var(--b)",fontWeight:700}}>
                  <td style={{color:"#fff"}}>TOT. AZIONI</td>
                  <td/><td/>
                  <td className="neu">{fN(totInvAzioni)}</td>
                  <td/>
                  <td className="neu">{hasLiveAzioni?fN(totCtvAzioni):"—"}</td>
                  <td className={sgn(totDiffAzioni)}>{hasLiveAzioni?fN(totDiffAzioni):"—"}</td>
                  <td className={sgn(totDiffPctAzioni)}>{totDiffPctAzioni!=null?fP(totDiffPctAzioni,2):"—"}</td>
                </tr>,
                bondPositions.length>0&&<tr key="bhead">
                  <td colSpan="8" style={{background:"var(--bg)",fontSize:9,color:"var(--m)",textTransform:"uppercase",letterSpacing:".08em",padding:"8px 11px"}}>Obbligazioni</td>
                </tr>,
                bondPositions.map(function(p,i){
                  var pmc=p.qty>0?p.cost/p.qty:0;
                  var bp=p.isin?effectiveBondPrices[p.isin]:null;
                  var livePrice=bp&&bp.price>0?bp.price:null;
                  var ctv=livePrice!=null?livePrice/100*p.qty:null;
                  var diff=ctv!=null?ctv-p.cost:null;
                  var diffPct=p.cost>0&&diff!=null?(diff/p.cost)*100:null;
                  var grey=!p.isin||(bp&&bp.error&&!manualBondPrices[p.isin]);
                  var noPrice=!livePrice;
                  var isEditing=editingIsin===p.isin;
                  return (
                    <tr key={"b"+i} style={{cursor:"pointer"}} onClick={function(){onClickInst(p.instrument);}}>
                      <td style={{fontWeight:600,color:acColor("Obbligazioni")}}>
                        {p.instrument}
                        {(noPrice||manualBondPrices[p.isin])&&!isEditing&&<span
                          title="Inserisci prezzo manuale"
                          style={{marginLeft:6,cursor:"pointer",fontSize:11,opacity:0.7}}
                          onClick={function(e){e.stopPropagation();setEditingIsin(p.isin);setEditingVal(manualBondPrices[p.isin]?String(manualBondPrices[p.isin].price):"");}}>✏️</span>}
                        {isEditing&&<span onClick={function(e){e.stopPropagation();}} style={{display:"inline-flex",alignItems:"center",gap:4,marginLeft:6}}>
                          <input autoFocus type="number" step="0.01" placeholder="es. 98.50"
                            style={{width:80,fontSize:11,padding:"1px 4px",background:"var(--s2)",border:"1px solid var(--bl)",borderRadius:4,color:"var(--t)"}}
                            value={editingVal}
                            onChange={function(e){setEditingVal(e.target.value);}}
                            onKeyDown={function(e){
                              if(e.key==="Enter"){
                                var v=parseFloat(editingVal);
                                if(v>0){setManualBondPrices(function(prev){var n=Object.assign({},prev);n[p.isin]={price:v,manual:true};return n;});}
                                setEditingIsin(null);
                              }
                              if(e.key==="Escape"){setEditingIsin(null);}
                            }}/>
                          <span style={{fontSize:10,color:"var(--m)"}}>↵</span>
                        </span>}
                      </td>
                      <td>{fN(p.qty,0)}</td>
                      <td>{fN(pmc*100,2)}</td>
                      <td className="neu">{fN(p.cost)}</td>
                      <td className={grey?"mu":livePrice>=pmc*100?"green":"red"}>{livePrice!=null?fN(livePrice,2):"—"}</td>
                      <td className={grey?"mu":sgn(diff)}>{ctv!=null?fN(ctv):"—"}</td>
                      <td className={grey?"mu":sgn(diff)}>{diff!=null?fN(diff):"—"}</td>
                      <td className={grey?"mu":sgn(diffPct)}>{diffPct!=null?fP(diffPct,2):"—"}</td>
                    </tr>
                  );
                }),
                bondPositions.length>0&&(()=>{
                  return <tr key="btot" style={{borderTop:"1px solid var(--b)",fontWeight:700}}>
                    <td style={{color:"#fff"}}>TOT. OBBLIGAZIONI</td><td/><td/>
                    <td className="neu">{fN(totInvBond)}</td>
                    <td/>
                    <td className="neu">{hasBondPrices?fN(totCtvBond):"—"}</td>
                    <td className={sgn(totDiffBond)}>{hasBondPrices?fN(totDiffBond):"—"}</td>
                    <td className={sgn(totDiffPctBond)}>{totDiffPctBond!=null?fP(totDiffPctBond,2):"—"}</td>
                  </tr>;
                })()
              ];
            })()}
          </tbody>
        </table>
      </div>

      <div style={{background:"var(--s1)",border:"1px solid var(--b)",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,color:"var(--m)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:4}}>Totale Portafoglio</div>
            <div style={{fontFamily:"var(--mono)",fontSize:22,fontWeight:700,color:"var(--t)"}}>{fN(grandTotal)}</div>
            <div style={{fontSize:9,color:"var(--m)",marginTop:3}}>{fN(totLiveCtv)} azioni + {fN(totBondLiveCtv)} obbligazioni</div>
            <div style={{fontSize:9,color:"var(--m)",marginTop:1}}>Diff: <span className={sgn(totDiffAll)}>{fN(totDiffAll)}</span> / <span className={sgn(totDiffPctAll)}>{totDiffPctAll!=null?fP(totDiffPctAll,2):"—"}</span></div>
          </div>
          <div style={{display:"flex",gap:8,flexDirection:"column"}}>
            <button className="btn bp" style={{fontSize:11,padding:"8px 14px"}} onClick={handleSnap}>📸 Snapshot oggi</button>
            <button className="btn bp" style={{fontSize:11,padding:"8px 14px"}} onClick={function(){setLiveDonut(true);}}>🍩 Allocazione</button>
          </div>
        </div>
      </div>

      {liveDonut&&(
        <div className="modal-bg" onClick={function(){setLiveDonut(false);}}>
          <div className="modal" style={{maxWidth:400}} onClick={function(e){e.stopPropagation();}}>
            <div className="mhdr">
              <div className="mtitle">Allocazione Portafoglio</div>
              <button className="mx" onClick={function(){setLiveDonut(false);}}>✕</button>
            </div>
            <Donut slices={donutSlices} total={grandTotal}/>
            <div style={{marginTop:12}}>
              {donutSlices.map(function(s,i){
                return (
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--b)",fontFamily:"var(--mono)",fontSize:12}}>
                    <span style={{color:acColor(s.label),fontWeight:600}}>{s.label}</span>
                    <span style={{color:"var(--t)"}}>{fN(s.value)} <span style={{color:"var(--m)"}}>{fP(s.pct,1)}</span></span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  const [bondPrices,setBondPrices] = useState({});
  const [manualBondPrices,setManualBondPrices] = useState({});
  const [liveLoading,setLiveLoading] = useState(false);
  const [liveDonut,setLiveDonut] = useState(false);
  const [lastUpdated,setLastUpdated] = useState(null);

  const [syncStatus,setSyncStatus] = useState("loading");

  // Load directly from Supabase on mount
  useEffect(()=>{
    (async()=>{
      try {
        const [tRows, sRows, aRows] = await Promise.all([
          sbLoad("transactions_new"),
          sbLoad("snapshot"),
          sbLoad("anagrafe"),
        ]);
        const anagList = aRows.map(rowToAnagrafe);

        setAnagrafe(anagList);

        setSyncStatus("");
      } catch(e) {
        console.error(e);
        setSyncStatus("error");
      }
      setReady(true);
    })();
  },[]);

  const curYear = new Date().getFullYear();

  const years = useMemo(()=>{
    const s=[...snaps].sort((a,b)=>a.date.localeCompare(b.date));
    if(!s.length) return [];
    const fy=parseInt(s[0].date.slice(0,4)), ly=parseInt(s[s.length-1].date.slice(0,4));
    return Array.from({length:ly-fy+1},(_,i)=>fy+i);
  },[snaps]);

  const displayYear = period==="ALL" ? null : parseInt(period);

  const periodRange = useMemo(()=>{
    if(period==="ALL") return {from:"0000-01-01",to:"9999-12-31"};
    const yr=String(parseInt(period));
    return {from:`${yr}-01-01`, to:`${yr}-12-31`};
  },[period]);

  const allYearData = useMemo(()=>
    years.map(y=>({year:y,...(yearMetrics(txs,snaps,y)||{})}))
  ,[txs,snaps,years]);

  const monthData = useMemo(()=>{
    if(!displayYear) return null;
    return MN.map((_,mi)=>monthMetrics(txs,snaps,displayYear,mi));
  },[txs,snaps,displayYear]);

  // ALL KPIs
  const allKpis = useMemo(()=>{
    const rendimento=allYearData.reduce((s,y)=>s+(y.rendimento||0),0);
    const cedole=allYearData.reduce((s,y)=>s+(y.cedole||0),0);
    const tax=allYearData.reduce((s,y)=>s+(y.tax||0),0);
    const plClose=allYearData.reduce((s,y)=>s+(y.plClose||0),0);
    const plOpen=allYearData.reduce((s,y)=>s+(y.plOpen||0),0);
    const fees=txs.reduce((s,t)=>s+(t.commission||0),0);
    const lastY=allYearData[allYearData.length-1];
    const mp=lastY?.mediaInv||0;
    const pct=mp>0?(rendimento/mp)*100:null;
    return{rendimento,cedole,tax,fees,costs:tax+fees,plClose,plOpen,pct,mediaInv:mp};
  },[allYearData,txs]);

  const yearKpis = useMemo(()=>{
    if(!displayYear) return null;
    return allYearData.find(y=>y.year===displayYear)||null;
  },[allYearData,displayYear]);

  const kpis = period==="ALL" ? allKpis : yearKpis;
  const rNeg = kpis && kpis.rendimento < 0;

  // Line chart: ALL = month-by-month across all years; YEAR = month-by-month in year
  const linePts = useMemo(()=>{
    if(period==="ALL") {
      // All months across all years, cumulative
      const pts = [];
      let cumul = 0;
      for (const yd of allYearData) {
        const yr = yd.year;
        const months = MN.map((_,mi)=>monthMetrics(txs,snaps,yr,mi));
        for (let mi=0; mi<12; mi++) {
          const m = months[mi];
          const lbl = `${MN[mi]} ${String(yr).slice(2)}`;
          if (m != null) {
            cumul += m.rendimento;
            pts.push({x:lbl, y:cumul});
          } else {
            pts.push({x:lbl, y:null});
          }
        }

                          }
                        </tr>
                      </>);
                    })()}

                </table>
              </div>

          {isI&&form.amount!==""&&(
            <div className="totbox">
              <span style={{fontSize:10,color:"var(--m)",textTransform:"uppercase",letterSpacing:".08em"}}>Netto</span>
              <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:700,color:"var(--g)"}}>{fN((+form.amount||0)-(+form.tax||0))}</div>
            </div>
          )}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn bg_" onClick={()=>setModal(null)}>Annulla</button>
            <button className="btn bp" onClick={saveTx}>{typeof modal==="string"?"Salva":"Aggiorna"}</button>
          </div>
        </div>
      </div>
    )}
  </>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
