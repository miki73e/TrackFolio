                      const tot=activeCedMi!=null
                        ? (cedByMonth[activeCedMi]||{})[inst]||0
                        : Object.values(cedByMonth).reduce((s,m)=>s+(m[inst]||0),0);
                      if(!tot) return null;
                      const instActive=activeCedInst===inst;
                      const instDimmed=activeCedInst&&!instActive;
                      return(
                        <tr key={inst} style={{opacity:instDimmed?0.3:1,cursor:"pointer"}}
                          onClick={e=>{e.stopPropagation();setActiveCedInst(instActive?null:inst);}}>
                          <td style={{color:INST_COLORS[cedInsts.indexOf(inst)%INST_COLORS.length],fontWeight:600}}>{inst}{instActive?" ✓":""}</td>
                          {activeCedMi!=null
                            ? <td className="green">{fN(tot)}</td>
                            : <>{MN.map((_,i)=>{const v=(cedByMonth[i]||{})[inst]||0;
                                return <td key={i} className={v>0?"green":v<0?"red":"mu"}>{v?fN(v):"—"}</td>;})}
                              <td className="green" style={{fontWeight:700}}>{fN(tot)}</td></>
                          }
                        </tr>
                      );
                    })}
                    {(()=>{
                      const miList = activeCedMi!=null ? [activeCedMi] : Array.from({length:12},(_,i)=>i);
                      const totals = miList.map(i=>Object.values(cedByMonth[i]||{}).reduce((s,v)=>s+v,0));
                      const taxes  = miList.map(i=>taxCedByMonth[i]||0);
                      const grandTot=totals.reduce((a,b)=>a+b,0);
                      const grandTax=taxes.reduce((a,b)=>a+b,0);
                      return (<>
                        <tr style={{borderTop:"1px solid var(--b)"}}>
                          <td style={{fontWeight:700}}>Totale</td>
                          {activeCedMi!=null
                            ? <td className="green" style={{fontWeight:700}}>{fN(grandTot)}</td>
                            : <>{miList.map(i=><td key={i} className={totals[i]>0?"green":totals[i]<0?"red":"mu"} style={{fontWeight:700}}>{totals[i]?fN(totals[i]):"—"}</td>)}<td className={grandTot>0?"green":grandTot<0?"red":"mu"} style={{fontWeight:700}}>{fN(grandTot)}</td></>
                          }
                        </tr>
                        <tr>
                          <td style={{color:"var(--m)"}}>Tax</td>
                          {activeCedMi!=null
                            ? <td className="red">{fN(grandTax)}</td>
                            : <>{miList.map(i=><td key={i} className={taxes[i]>0?"red":taxes[i]<0?"green":"mu"}>{taxes[i]?fN(taxes[i]):"—"}</td>)}<td className={grandTax>0?"red":grandTax<0?"green":"mu"}>{fN(grandTax)}</td></>
                          }
                        </tr>
                        <tr>
                          <td style={{color:"var(--m)"}}>Net</td>
                          {activeCedMi!=null
                            ? <td className="green" style={{fontWeight:700}}>{fN(grandTot-grandTax)}</td>
                            : <>{miList.map(i=>{const n=totals[i]-taxes[i];return <td key={i} className={n>0?"green":n<0?"red":"mu"}>{n?fN(n):"—"}</td>;})})<td className={grandTot-grandTax>0?"green":grandTot-grandTax<0?"red":"mu"} style={{fontWeight:700}}>{fN(grandTot-grandTax)}</td></>
                          }
                        </tr>
                      </>);
                    })()}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </div>
      </div>
    )}

    {/* TX MODAL */}
    {modal&&(
      <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal">
          <div className="mhdr">
            <div className="mtitle">{typeof modal==="string"?"Nuova Transazione":"Modifica Transazione"}</div>
            <button className="mx" onClick={()=>setModal(null)}>✕</button>
          </div>
          <div className="fg2">
            <div className="fg"><label>Data</label>
              <input type="date" className={ferr.date?"err":""} value={form.date} onChange={sf("date")}/>
              {ferr.date&&<span className="em">{ferr.date}</span>}
            </div>
            <div className="fg"><label>Tipo</label>
              <select value={form.type} onChange={sf("type")}>
                <option value="BUY">BUY</option><option value="SELL">SELL</option><option value="INCOME">CEDOLA/DIV</option>
              </select>
            </div>
            <div className="fg" style={{gridColumn:"span 2"}}>
              <label>Strumento</label>
              <input list="il-name" className={ferr.instrument?"err":""} value={form.instrument}
                onChange={e=>{
                  const val=e.target.value;
                  const anag=instList.find(a=>a.asset===val);
                  if(anag) setForm(p=>({...p,instrument:anag.asset,assetClass:anag.assetClass,isin:anag.isin||"",ticker:anag.ticker||"",anagrafeId:anag.id}));
                  else setForm(p=>({...p,instrument:val,anagrafeId:null}));
                }}
                onBlur={e=>{
                  const val=e.target.value.trim();
                  if(val&&!instList.find(a=>a.asset===val))
                    setFerr(f=>({...f,instrument:"Titolo non censito — contatta l'admin"}));
                }}
                onFocus={()=>setFerr(f=>({...f,instrument:undefined}))}
                placeholder=""/>
              <datalist id="il-name">{instList.map(a=><option key={a.id} value={a.asset}/>)}</datalist>
              {ferr.instrument&&<span className="em">{ferr.instrument}</span>}
            </div>
            <div className="fg"><label>ISIN</label>
              <input list="il-isin" className={ferr.isin?"err":""} value={form.isin||""}
                onChange={e=>{
                  const val=e.target.value;
                  const anag=instList.find(a=>a.isin===val);
                  if(anag) { setForm(p=>({...p,instrument:anag.asset,assetClass:anag.assetClass,isin:anag.isin||"",ticker:anag.ticker||"",anagrafeId:anag.id})); setFerr(f=>({...f,instrument:undefined,isin:undefined})); }
                  else setForm(p=>({...p,isin:val,anagrafeId:null}));
                }}
                onBlur={e=>{
                  const val=e.target.value.trim();
                  if(val&&!instList.find(a=>a.isin===val))
                    setFerr(f=>({...f,isin:"ISIN non censito — contatta l'admin"}));
                }}
                onFocus={()=>setFerr(f=>({...f,isin:undefined}))}
                placeholder=""/>
              <datalist id="il-isin">{instList.map(a=>a.isin?<option key={a.id} value={a.isin}>{a.asset}</option>:null)}</datalist>
              {ferr.isin&&<span className="em">{ferr.isin}</span>}
            </div>
            <div className="fg"><label>Tipo Asset</label>
              <input readOnly value={form.assetClass||"— da strumento —"}
                style={{opacity:0.6,cursor:"not-allowed",background:"var(--s2)",
                  border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",
                  color:form.assetClass?"var(--t)":"var(--m)",width:"100%",boxSizing:"border-box",fontFamily:"var(--mono)",fontSize:13}}/>
              {ferr.assetClass&&<span className="em">{ferr.assetClass}</span>}
            </div>

            {isI?(
              <div className="fg" style={{gridColumn:"span 2"}}>
                <label>Importo Lordo</label>
                <input type="number" step="any" className={ferr.amount?"err":""} value={form.amount} onChange={sf("amount")}/>
                {ferr.amount&&<span className="em">{ferr.amount}</span>}
              </div>
            ):<>
              <div className="fg"><label>Quantità</label>
                <input type="number" className={ferr.qty?"err":""} value={form.qty} onChange={sf("qty")}/>
                {ferr.qty&&<span className="em">{ferr.qty}</span>}
              </div>
              <div className="fg"><label>Prezzo {isBond?"(%)":""}</label>
                <input type="number" className={ferr.price?"err":""} value={form.price} onChange={sf("price")}/>
                {ferr.price&&<span className="em">{ferr.price}</span>}
              </div>
              <div className="fg"><label>Commissioni (opz.)</label>
                <input type="number" value={form.commission} onChange={sf("commission")} disabled={isI} style={{opacity:isI?0.3:1}}/>
              </div>
            </>}
            {(form.type==="SELL"||isI)&&(
              <div className="fg"><label>Tax</label>
                <input type="number" step="any" value={form.tax} onChange={sf("tax")}/>
              </div>
            )}
          </div>
          {!isI&&totPreview>0&&(
            <div className="totbox">
              <span style={{fontSize:10,color:"var(--m)",textTransform:"uppercase",letterSpacing:".08em"}}>Totale{isBond?" · prezzo %":""}</span>
              <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:700,color:"var(--t)"}}>{fN(totPreview)}</div>
              {(+form.commission)>0&&<div style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--m)"}}>{fN(totPreview+(+form.commission))} con comm.</div>}
            </div>
          )}
          {isI&&form.amount!==""&&(
            <div className="totbox">
              <span style={{fontSize:10,color:"var(--m)",textTransform:"uppercase",letterSpacing:".08em"}}>Netto</span>
              <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:700,color:"var(--g)"}}>{fN((+form.amount||0)-(+form.tax||0))}</div>
            </div>
          )}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn bg_" onClick={()=>setModal(null)}>Annulla</button>
            <button className="btn bp" onClick={saveTx}>{typeof modal==="string"?"Salva":"Aggiorna"}</button>
          </div>
        </div>
      </div>
    )}
  </>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
