  if(!text||text.trim()==="null"||text.trim()==="") return null;
  return JSON.parse(text);
}

// Map JS object → Supabase transaction row
// ── Anagrafe helpers ──────────────────────────────────────────────────────────
function normalizeAssetClass(v) {
  if (!v) return "";
  const u = v.toString().toUpperCase().trim();
  if (u.includes("OBBLIG")) return "Obbligazioni";
  if (u.includes("AZIONI") || u === "AZIONI") return "Azioni";
  if (u.includes("COMMODIT")) return "Commodities";
  if (u.includes("CRYPTO")) return "Crypto";
  if (u.includes("FONDI") || u.includes("FONDO")) return "Fondi";
  if (u.includes("MULTI")) return "Multi Asset";
  return v;
}
function rowToAnagrafe(r) {
  return {
    id: r.id,
    isin: r.isin||"",
    asset: r.asset||"",
    assetClass: normalizeAssetClass(r.type),
    ticker: r.ticker||"",
    prodotto: r.prodotto||"",
  };
}
function anagrafeToRow(a) {
  return {
    isin: a.isin||null,
    asset: a.asset||"",
    type: a.assetClass||"",
    ticker: a.ticker||null,
    prodotto: a.prodotto||null,
  };
}

// ── Transaction mapping (transactions_new) ────────────────────────────────────
// r = Supabase row, anagMap = {id -> anagrafe object}
function rowToTx(r, anagMap) {
  // Try by anagrafe_id first, fallback to searching by asset name if missing
  var anag = anagMap[r.anagrafe_id] || {};
  if(!anag.asset && r.anagrafe_id) {
    // anagrafe_id exists but not in map — use empty object
    anag = {};
  }
  const isI = (r.action||"").toUpperCase()==="INCOME";
  const assetClass = anag.assetClass || "";
  const isBond = assetClass==="Obbligazioni";
  const qty = Number(r.qty)||0;
  const price = Number(r.price)||0;
  const totale = isI ? price : isBond ? qty*price/100 : qty*price;
  return {
    id: r.id,
    anagrafeId: r.anagrafe_id,
    date: r.data,
    type: (r.action||"").toUpperCase(),
    assetClass,
    instrument: anag.asset||"",
    isin: anag.isin||"",
    ticker: anag.ticker||"",
    qty, price,
    tax: Number(r.tax)||0,
    commission: Number(r.commissioni)||0,
    totale: Math.round(totale*10000)/10000,
    amount: isI ? price : null,
    prodotto: anag.prodotto||"",
    commenti: r.commenti||"",
  };
}
function txToRow(t) {
  const row = {
    "data": t.date,
    "action": (t.type||"").toUpperCase(),
    "anagrafe_id": t.anagrafeId,
    "qty": t.qty!==undefined&&t.qty!==null ? Number(t.qty) : null,
    "price": t.price!==undefined&&t.price!==null ? Number(t.price) : null,
    "tax": t.tax!==undefined&&t.tax!==null ? Number(t.tax) : null,
    "commissioni": t.commission!==undefined&&t.commission!==null ? Number(t.commission) : null,
    "commenti": t.commenti||null,
  };
  if(t.userId) row["user_id"] = t.userId;
  return row;
}
// Map Supabase snapshot row → JS object
function rowToSnap(r) {
  return {id: r.id, date: r.data, value: Number(r.totale_pf), is_initial: r.is_initial||false};
}
function snapToRow(s, userId) {
  const row = {"data": s.date, "totale_pf": Number(s.value)};
  if(userId) row["user_id"] = userId;
  return row;
}

async function fetchWithTimeout(url, opts, ms=20000) {
  // AbortSignal.timeout uses platform timer — not throttled when tab is hidden
  const signal = (typeof AbortSignal !== "undefined" && AbortSignal.timeout)
    ? AbortSignal.timeout(ms)
    : undefined;
  try {
    const r = await fetch(url, signal ? {...opts, signal} : opts);
    return r;
  } catch(e) {
    if(e.name==="TimeoutError"||e.name==="AbortError")
      throw new Error("Request timeout — riprova");
    throw e;
  }
}

// Last known prices — persisted in Supabase prices_cache
// In-memory cache for current session (loaded on startup)
let _pricesCache = {}; // {isin: {price, source, updated_at}}

async function loadPricesCache(userId) {
  try {
    const hdr = getHdr();
    const r = await fetchWithTimeout(`${SB_URL}/rest/v1/prices_cache?user_id=eq.${userId}&select=isin,price,source,updated_at`, {headers: hdr});
    if(!r.ok) return;
    const rows = await r.json();
    _pricesCache = {};
    (rows||[]).forEach(row => { _pricesCache[row.isin] = {price: Number(row.price), source: row.source, updated_at: row.updated_at}; });
  } catch(e) { console.warn("prices_cache load failed", e); }
}

async function saveLastKnownPrice(isin, price, source) {
  if(!isin) return;
  _pricesCache[isin] = {price, source: source||"live", updated_at: new Date().toISOString()};
  try {
    const hdr = getHdr();
    await fetchWithTimeout(`${SB_URL}/rest/v1/prices_cache?on_conflict=user_id,isin`, {
      method: "POST",
      headers: {...hdr, "Prefer": "return=minimal,resolution=merge-duplicates"},
      body: JSON.stringify({isin, price, source: source||"live", updated_at: new Date().toISOString(), user_id: _currentSession?.user?.id})
    });
  } catch(e) { console.warn("prices_cache save failed", e); }
}

async function sbLoad(table, impersonateUid) {
  const hdr = getHdr();
  let r;
  try {
    let url = `${SB_URL}/rest/v1/${table}?select=*&order=id`;
    if(impersonateUid) url += `&user_id=eq.${impersonateUid}`;
    r = await fetchWithTimeout(url, {headers: hdr});
  } catch(netErr) {
    throw new Error(`Rete: ${netErr.message}`);
  }
  if (!r.ok) {
    let txt = "";
    try { txt = await r.text(); } catch(e) {}
    throw new Error(`HTTP ${r.status} su ${table}: ${txt.slice(0,200)}`);
  }
  return r.json();
}
async function sbInsert(table, row) {
  const hdr = getHdr();
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}`, {
    method: "POST", headers: {...hdr, "Prefer": "return=representation"},
    body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(`Insert ${table} failed: ${r.status}`);
  const rows = await r.json();
  return rows[0];
}
async function sbUpsert(table, row, onConflict="data") {
  const hdr = getHdr();
  let r;
  try {
    r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
      method: "POST",
      headers: {...hdr, "Prefer": "return=representation,resolution=merge-duplicates"},
      body: JSON.stringify(row)
    });
  } catch(netErr) {
    throw new Error("Rete: " + netErr.message);
  }
  if (!r.ok) {
    let txt=""; try{txt=await r.text();}catch(e){}
    throw new Error(`Upsert ${table} HTTP ${r.status}: ${txt.slice(0,200)}`);
  }
  const rows = await r.json();
  return rows[0];
}
async function sbUpdate(table, id, row) {
  const hdr = getHdr();
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "PATCH", headers: {...hdr, "Prefer": "return=representation"},
    body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(`Update ${table} failed: ${r.status}`);
}
async function sbDelete(table, id) {
  const hdr = getHdr();
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "DELETE", headers: hdr
  });
  if (!r.ok) throw new Error(`Delete ${table} failed: ${r.status}`);
}
async function sbRpc(fn, params) {
  const hdr = getHdr();
  const r = await fetchWithTimeout(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: "POST", headers: hdr,
    body: JSON.stringify(params||{})
  });
  if (!r.ok) throw new Error(`RPC ${fn} failed: ${r.status}`);
  const text = await r.text();
  if(!text || text.trim()==="" || text.trim()==="null") return null;
  try { return JSON.parse(text); } catch(e) { return null; }
}

const AC_COL  = {"Obbligazioni":"#1d6fd8","Azioni":"#16a34a","Commodities":"#b45309","Crypto":"#7c3aed","Multi Asset":"#0e7490","Fondi":"#be185d","Altro":"#c2410c"};
// Palette dinamica per classi non mappate in AC_COL
const EXTRA_COLORS = ["#10b981","#f43f5e","#8b5cf6","#0ea5e9","#d97706","#6366f1","#ec4899"];
let _acColorCache = {};
let _acColorIdx = 0;
const acColor = cls => {
  if(AC_COL[cls]) return AC_COL[cls];
  if(_acColorCache[cls]) return _acColorCache[cls];
  _acColorCache[cls] = EXTRA_COLORS[_acColorIdx % EXTRA_COLORS.length];
  _acColorIdx++;
  return _acColorCache[cls];
};
const today = () => new Date().toISOString().slice(0,10);

const fN = (n, d=0) => {
  if (n==null||isNaN(n)) return "—";
  const v = Object.is(n,-0)?0:n; n=v;
  const abs = Math.abs(n).toFixed(d);
  const [int, dec] = abs.split(".");
  const grouped = int.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const formatted = dec !== undefined && d > 0 ? grouped + "," + dec : grouped;
  return (n < 0 ? "-" : "") + formatted;
};
const fP = (n, d=1) => n==null||isNaN(n) ? "—" : fN(n,d) + "%";
const sgn = n => n==null||isNaN(n) ? "neu" : Math.abs(n)<0.005 ? "neu" : n > 0 ? "green" : "red";
const heatCol = p => {
  if (p==null) return "var(--s2)";
  const t = Math.max(-1, Math.min(1, p/5));
  return t >= 0 ? `rgba(34,197,94,${0.08+t*0.4})` : `rgba(239,68,68,${0.08+Math.abs(t)*0.4})`;
};

// ── Engine ────────────────────────────────────────────────────────────────────
function wavgAt(txs, date) {
  const pos = {};
  const filtered = [...txs].filter(t => t.type !== "INCOME" && t.date <= date)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const tx of filtered) {
    const k = tx.instrument;
    if (!pos[k]) pos[k] = {qty:0, cost:0, assetClass:tx.assetClass, instrument:tx.instrument, isin:tx.isin||""};
    if (tx.type === "BUY") {
      pos[k].qty += tx.qty;
      pos[k].cost += tx.totale;
    } else if (tx.type === "SELL" && pos[k].qty > 0) {
      const avg = pos[k].cost / pos[k].qty;
      pos[k].cost -= avg * tx.qty;
      pos[k].qty = Math.max(0, pos[k].qty - tx.qty);
      if (pos[k].qty === 0) pos[k].cost = 0;
    }
  }
  return pos;
}
function investitoAt(txs, date) {
  return Object.values(wavgAt(txs, date)).reduce((s,p) => s + (p.qty>0 ? p.cost : 0), 0);
}
function snapAt(snaps, date) {
  const s = [...snaps].sort((a,b) => a.date.localeCompare(b.date)).filter(x => x.date <= date);
  return s.length ? s[s.length-1].value : null;
}
// Last snap date at or before date
function lastSnapDate(snaps, date) {
  const s = [...snaps].sort((a,b) => a.date.localeCompare(b.date)).filter(x => x.date <= date);
  return s.length ? s[s.length-1].date : null;
}
function mediaPesata(txs, from, to) {
  const eventDates = [...new Set(
    [from, ...txs.filter(t => t.type!=="INCOME" && t.date>=from && t.date<=to).map(t=>t.date), to]
  )].sort();
  let totW = 0, totD = 0;
  for (let i = 0; i < eventDates.length-1; i++) {
    const d0 = eventDates[i], d1 = eventDates[i+1];
    const days = (new Date(d1) - new Date(d0)) / 86400000;
    if (days <= 0) continue;
    totW += investitoAt(txs, d0) * days;
    totD += days;
  }
  totW += investitoAt(txs, to);
  totD += 1;
  return totD > 0 ? totW / totD : 0;
}
function plOpenYear(txs, snaps, year) {
  const jan1 = `${year}-01-01`, dec31 = `${year}-12-31`;
  const snapEnd = snapAt(snaps, dec31);
  if (snapEnd == null) return null;
  const snapJan = snapAt(snaps, jan1) || 0;
  return (snapEnd - investitoAt(txs, dec31)) - (snapJan - investitoAt(txs, jan1));
}
function plCloseRange(txs, from, to) {
  let total = 0;
  const sells = [...txs].filter(t => t.type==="SELL" && t.date>from && t.date<=to)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const sell of sells) {
    const posBefore = wavgAt(txs.filter(t => t.date < sell.date), sell.date);
    const p = posBefore[sell.instrument];
    const pmc = p && p.qty > 0 ? p.cost / p.qty : 0;
    total += sell.totale - pmc * sell.qty - (sell.commission||0);
  }
  return total;
}
function sellsInRange(txs, from, to) {
  const result = [];
  const sells = [...txs].filter(t => t.type==="SELL" && t.date>from && t.date<=to)
    .sort((a,b) => a.date.localeCompare(b.date));
  for (const sell of sells) {
    const posBefore = wavgAt(txs.filter(t => t.date < sell.date), sell.date);
    const p = posBefore[sell.instrument];
    const pmc = p && p.qty > 0 ? p.cost / p.qty : 0;
    const pl = sell.totale - pmc * sell.qty; // P/L before costs
    const fees = sell.commission||0;
    const tax = sell.tax||0;
    const net = pl - tax - fees;
    const costBuy = pmc * sell.qty;
    const pct = costBuy > 0 ? (net / costBuy) * 100 : null;
    result.push({...sell, pmc, pl, fees, net, pct});
  }
  return result;
}
function yearMetrics(txs, snaps, year) {
  const yr = String(year), jan1 = `${yr}-01-01`, dec31 = `${yr}-12-31`;
  const lastSnap = snapAt(snaps, dec31);
  if (lastSnap == null) return null;
  const plOpen = plOpenYear(txs, snaps, year);
  const plClose = plCloseRange(txs, `${year-1}-12-31`, dec31);
  const cedole = txs.filter(t => t.type==="INCOME" && t.date>=jan1 && t.date<=dec31)
    .reduce((s,t) => s+(t.amount||0), 0);
  const tax = txs.filter(t => t.date>=jan1 && t.date<=dec31)
    .reduce((s,t) => s+(t.tax||0), 0);
  const fees=txs.filter(t=>t.date>=jan1&&t.date<=dec31).reduce((s,t)=>s+(t.commission||0),0);
  const rendimento = (plOpen||0) + plClose + cedole - tax - fees;
  const mp = mediaPesata(txs, jan1, dec31);
  const pct = mp > 0 ? (rendimento/mp)*100 : null;
  return {plOpen, plClose, cedole, tax, fees, costs:tax+fees, rendimento, pct, mediaInv:mp, lastSnap};
}
function monthMetrics(txs, snaps, year, mi) {
  const yr = String(year), mStr = String(mi+1).padStart(2,"0");
  // Fix: use actual last day of month instead of always 31
  const lastDay = new Date(year, mi+1, 0).getDate();
  const mEnd = `${yr}-${mStr}-${String(lastDay).padStart(2,"0")}`;
  const prevMEnd = mi===0 ? `${year-1}-12-31` : `${yr}-${String(mi).padStart(2,"0")}-31`;

  // Need a snap in this month
  const hasSnap = snaps.some(s => {
    const sm = parseInt(s.date.slice(5,7))-1;
    return parseInt(s.date.slice(0,4))===year && sm===mi;
  });
  if (!hasSnap) return null;

  const snapEnd = snapAt(snaps, mEnd);
  if (snapEnd == null) return null;
  // If no snapshot exists before this month (e.g. first month of first year),
  // use the earliest available snapshot as baseline instead of zero
  const snapPrevRaw = snapAt(snaps, prevMEnd);
  const snapPrev = snapPrevRaw !== null ? snapPrevRaw : snapAt(snaps, `${yr}-01-01`) || 0;
  const prevMEndEff = snapPrevRaw !== null ? prevMEnd : `${yr}-01-01`;
  const plOpen = (snapEnd - investitoAt(txs, mEnd)) - (snapPrev - investitoAt(txs, prevMEndEff));
  // When baseline is jan1 (first month of data), include jan1 itself (>=)
  // Otherwise use exclusive (>) as normal month boundary
  const inclFrom = snapPrevRaw === null; // true only for first month of first year
  const afterPrev = t => inclFrom ? t.date>=prevMEndEff : t.date>prevMEndEff;
  const plClose = (() => {
    const sells = [...txs].filter(t => t.type==="SELL" && afterPrev(t) && t.date<=mEnd)
      .sort((a,b) => a.date.localeCompare(b.date));
    let tot=0;
    for(const sell of sells){
      const pb=wavgAt(txs.filter(t=>t.date<sell.date),sell.date);
      const pp=pb[sell.instrument];
      const pmc=pp&&pp.qty>0?pp.cost/pp.qty:0;
      tot+=sell.totale-pmc*sell.qty-(sell.commission||0);
    }
    return tot;
  })();
  const cedole = txs.filter(t => t.type==="INCOME" && afterPrev(t) && t.date<=mEnd)
    .reduce((s,t) => s+(t.amount||0), 0);
  const tax = txs.filter(t => afterPrev(t) && t.date<=mEnd)
    .reduce((s,t) => s+(t.tax||0), 0);
  const mFees=txs.filter(t=>t.date>prevMEndEff&&t.date<=mEnd).reduce((s,t)=>s+(t.commission||0),0);
  const rendimento = plOpen + plClose + cedole - tax - mFees;
  const mStart = `${yr}-${mStr}-01`;
  const mp = mediaPesata(txs, mStart > prevMEnd ? mStart : prevMEnd, mEnd);
  const pct = mp > 0 ? (rendimento/mp)*100 : null;
  return {plOpen, plClose, cedole, tax, rendimento, pct, mediaInv:mp};
}

// ── Charts ────────────────────────────────────────────────────────────────────
function LineChart({pts}) {

  const area = vp.length>1 ? `${path} L${vp[vp.length-1].x},${y0} L${vp[0].x},${y0}Z` : "";

    <div style={{position:"relative"}} onClick={()=>setAct(null)}>
      {act!=null && vp.find(p=>p.i===act) && (()=>{

        <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity=".25"/>
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0"/>
        </linearGradient></defs>
        <line x1={pL} y1={y0} x2={W-pR} y2={y0} stroke="var(--b)" strokeWidth="1" strokeDasharray="4 3"/>
        {[mn,0,mx].filter((v,i,a)=>a.indexOf(v)===i).map((v,i)=>(
          <text key={i} x={pL-4} y={yOf(v)+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
            {Math.abs(v)>=1000?`${v<0?"-":""}${(Math.abs(v)/1000).toFixed(1)}k`:fN(v)}
          </text>
        ))}
        {pts.map((p,i)=><text key={i} x={xOf(i)} y={H-2} textAnchor="middle" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">{p.x}</text>)}
        {area&&<path d={area} fill="url(#lg)"/>}
        {path&&<path d={path} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinejoin="round"/>}
        {vp.map((p,j)=>(
          <circle key={j} cx={p.x} cy={p.y} r="8" fill={p.v>=0?"var(--g)":"var(--r)"} opacity=".9"
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation();setAct(p.i);}}
          />
        ))}
      </svg>
    </div>
  );
}

function BarChart({pts, onBar}) {
  const [act,setAct]=useState(null);

}

const INST_COLORS = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#a78bfa","#fb923c","#34d399","#e879f9"];
function StackedBar({byMonth, insts, activeMi, onBar, onClear, allInsts}) {
  const W=700,H=155,pL=50,pR=16,pT=10,pB=26,iW=W-pL-pR,iH=H-pT-pB;
  const bW=iW/12*0.6, xOf=i=>pL+(i/12)*iW+(iW/12)*0.2;
  const tots=Array.from({length:12},(_,i)=>Object.values(byMonth[i]||{}).reduce((s,v)=>s+v,0));
  const mx=Math.max(1,...tots);
  if (!tots.some(v=>v>0)) return <div className="empty" style={{padding:14,fontSize:11}}>Nessuna cedola</div>;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{height:155,display:"block",cursor:"pointer"}}
      onClick={e=>{ if(e.target.tagName!=="rect") onClear&&onClear(); }}>
      {Array.from({length:12},(_,mi)=>{
        let yo=pT+iH;
        const isHi = activeMi==null || activeMi===mi;
        return insts.map((inst,ci)=>{
          const v=(byMonth[mi]||{})[inst]||0; const h=(v/mx)*iH; yo-=h;
          return v>0 ? <rect key={`${mi}-${ci}`} x={xOf(mi)} y={yo} width={bW} height={Math.max(1,h)}
            fill={INST_COLORS[((allInsts||insts).indexOf(inst))%INST_COLORS.length]} rx="2" opacity={isHi?0.9:0.18}
            style={{cursor:"pointer"}}
            onClick={e=>{e.stopPropagation(); onBar&&onBar(activeMi===mi?null:mi);}}
          /> : null;
        });
      }).flat().filter(Boolean)}
      {[0,mx/2,mx].map((v,i)=>(
        <text key={i} x={pL-4} y={pT+iH-(v/mx)*iH+4} textAnchor="end" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">
          {v>=1000?`${(v/1000).toFixed(1)}k`:v.toFixed(0)}
        </text>
      ))}
      {MN.map((m,i)=>(
        <text key={i} x={xOf(i)+bW/2} y={H-2} textAnchor="middle" fontSize="9"
          fill={activeMi===i?"var(--t)":"var(--m)"}
          fontWeight={activeMi===i?"700":"400"}
          fontFamily="JetBrains Mono,monospace">{m}</text>
      ))}
    </svg>
  );
}

function Donut({slices, total}) {
  if (!total||!slices.length) return <div className="empty">Nessuna posizione aperta</div>;
  const R=82,cx=130,cy=100,ir=50,single=slices.length===1;
  let ang=-Math.PI/2;
  const arcs=slices.map((s,ci)=>{
    const col=acColor(s.label);
    if (single) return{...s,path:null,col};
    const sw=(s.value/total)*2*Math.PI*0.999;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang); ang+=sw;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const lg=sw>Math.PI?1:0;
    const xi1=cx+ir*Math.cos(ang-sw),yi1=cy+ir*Math.sin(ang-sw);
    const xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    return{...s,path:`M${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${lg} 0 ${xi1},${yi1}Z`,col};
  });
  return (
    <div style={{display:"flex",justifyContent:"center"}}>
      <svg width="260" height="200" viewBox="0 0 260 200">
        {arcs.map((a,i)=>a.path
          ?<path key={i} d={a.path} fill={a.col} opacity=".9"/>
          :<g key={i}><circle cx={cx} cy={cy} r={R} fill={a.col} opacity=".9"/><circle cx={cx} cy={cy} r={ir} fill="var(--s1)"/></g>
        )}
        <text x={cx} y={cy-5} textAnchor="middle" fontSize="9" fill="var(--m)" fontFamily="JetBrains Mono,monospace">TOTALE</text>
        <text x={cx} y={cy+11} textAnchor="middle" fontSize="12" fill="var(--t)" fontFamily="JetBrains Mono,monospace" fontWeight="700">
          {total>=1000?`${(total/1000).toFixed(1)}k`:fN(total)}
        </text>
      </svg>
    </div>
  );
}

const EMPTY={date:today(),type:"BUY",assetClass:"",prodotto:"",instrument:"",isin:"",ticker:"",anagrafeId:null,qty:"",price:"",commission:"",tax:"",amount:"",commenti:""};

function LiveView({livePositions,bondPositions,livePrices,bondPrices,manualBondPrices,setManualBondPrices,pricesCacheVer,liveLoading,lastUpdated,holdingsView,setHoldingsView,snaps,setSnaps,setSyncStatus,onClickInst,onRefresh,sbUpdate,sbInsert,snapToRow,userId,isImpersonating}) {
  var [editingIsin, setEditingIsin] = React.useState(null);
  var [editingVal, setEditingVal] = React.useState("");
  var [collapsed, setCollapsed] = React.useState(function(){ return localStorage.getItem("tf_holdings_collapsed")==="1"; });

  // effectiveBondPrices: live → manual → cache
  var effectiveBondPrices = {};
  bondPositions.forEach(function(p){
    if(p.isin) {
      var auto = bondPrices[p.isin];
      var manual = manualBondPrices[p.isin];
      var lkpE = _pricesCache[p.isin]||null;
      if(manual) effectiveBondPrices[p.isin] = {price:manual.price, change_pct:null, stale:false};
      else if(auto && auto.price>0) effectiveBondPrices[p.isin] = auto;
      else if(lkpE) effectiveBondPrices[p.isin] = {price:lkpE.price, change_pct:null, stale:true};
      else effectiveBondPrices[p.isin] = null;
    }
  });

  // Logica prezzo unica per ogni posizione (bond o non-bond)
  function getPos(p) {
    var isBond = p.assetClass==="Obbligazioni";
    var cacheKey = p.isin;
    var manualP = manualBondPrices[cacheKey];
    var lkp = _pricesCache[cacheKey]||null;
    var rawPrice=null, changePct=null, stale=false;
    if(isBond){
      var bp=effectiveBondPrices[cacheKey];
      if(manualP){ rawPrice=manualP.price; }
      else if(bp&&bp.price>0){ rawPrice=bp.price; if(bp.stale) stale=true; }
      else if(lkp){ rawPrice=lkp.price; stale=true; }
      changePct=bp&&bp.change_pct!=null?bp.change_pct:null;
    } else {
      var lp=livePrices[p.ticker];
      if(manualP){ rawPrice=manualP.price; }
      else if(lp&&lp.price){ rawPrice=lp.price; if(lp.stale) stale=true; }
      else if(lkp){ rawPrice=lkp.price; stale=true; }
      changePct=lp&&lp.change_pct!=null?lp.change_pct:null;
    }
    var ctv=rawPrice!=null?(isBond?rawPrice/100*p.qty:rawPrice*p.qty):null;
    return {rawPrice, ctv, changePct, stale, isBond};
  }

  // Tutte le posizioni
  var allPos = [];
  livePositions.forEach(function(p){ allPos.push(p); });
  bondPositions.forEach(function(p){ allPos.push(p); });

  // Grand total e inv
  var grandTotal=0, totInvAll=0;
  allPos.forEach(function(p){
    var g=getPos(p);
    grandTotal+=g.ctv!=null?g.ctv:p.cost;
    totInvAll+=p.cost;
  });
  // Aggiorna global per auto-snapshot da App
  window._tf_grand_total = grandTotal;
  var totDiffAll=grandTotal-totInvAll;
  var totDiffPctAll=totInvAll>0?(totDiffAll/totInvAll)*100:null;

  // Donut
  var byAC={};
  allPos.forEach(function(p){
    var g=getPos(p);
    var v=g.ctv!=null?g.ctv:p.cost;
    byAC[p.assetClass]=(byAC[p.assetClass]||0)+v;
  });
  var donutSlices=Object.entries(byAC).filter(function(e){return e[1]>0;}).map(function(e){
    return {label:e[0],value:e[1],pct:grandTotal>0?(e[1]/grandTotal)*100:0};
  });

  // Day totals
  var totVarDay=0, hasDayVar=false;
  allPos.forEach(function(p){
    var g=getPos(p);
    if(g.ctv!=null&&g.changePct!=null){totVarDay+=g.ctv*(g.changePct/100);hasDayVar=true;}
  });
  var varDayPct=grandTotal>0&&hasDayVar?(totVarDay/grandTotal)*100:null;

  function handleSnap() {
    var d=today();
    var thisMonth=d.slice(0,7); // YYYY-MM
    // Cerca snap dello stesso mese (escludi initial)
    var existing=snaps.find(function(s){return !s.is_initial&&s.date.slice(0,7)===thisMonth;});
    setSyncStatus("saving");
    var val=Math.round(grandTotal*100)/100;
    if(existing){
      (isImpersonating?adminCall("update-snap",{id:existing.id,row:snapToRow({date:d,value:val},userId)}):sbUpdate("snapshot",existing.id,snapToRow({date:d,value:val},userId))).then(function(){
        setSnaps(function(p){return p.map(function(s){return s.id===existing.id?Object.assign({},s,{date:d,value:val}):s;});});
        setSyncStatus("saved");setTimeout(function(){setSyncStatus("");},2000);
      }).catch(function(){setSyncStatus("error");});
    } else {
      (isImpersonating?adminCall("insert-snap",{row:snapToRow({date:d,value:val},userId)}):sbInsert("snapshot",snapToRow({date:d,value:val},userId))).then(function(ins){
        var ns={id:ins&&ins.id?ins.id:Date.now(),date:d,value:val};
        setSnaps(function(p){return [...p,ns].sort(function(a,b){return a.date.localeCompare(b.date);});});
        setSyncStatus("saved");setTimeout(function(){setSyncStatus("");},2000);

    }
  }

  // Asset table rows — logica unificata per TUTTI i type

    var acOrder=Object.keys(acGroups).sort(function(a,b){return a.localeCompare(b);});

        if(p.isBond){
          var bp=effectiveBondPrices[cacheKey];
          rawPrice=manualP?manualP.price:(bp&&bp.price>0?bp.price:(_pricesCache[cacheKey]?_pricesCache[cacheKey].price:null));
          changePct=bp&&bp.change_pct!=null?bp.change_pct:null;
        } else {
          var lp=livePrices[p.ticker];
          rawPrice=manualP?manualP.price:(lp&&lp.price?lp.price:null);
          changePct=lp&&lp.change_pct!=null?lp.change_pct:null;
        }
        var ctv=rawPrice!=null?(p.isBond?rawPrice/100*p.qty:rawPrice*p.qty):null;
        totInvAC+=p.cost;
        if(ctv!=null){totCtvAC+=ctv;totDiffAC+=(ctv-p.cost);hasLiveAC=true;}
        if(ctv!=null&&changePct!=null){totVarEurAC+=ctv*(changePct/100);hasVarAC=true;}
      });
      var totDiffPctAC=totInvAC>0&&hasLiveAC?(totDiffAC/totInvAC)*100:null;
      var totCpAC=totCtvAC>0&&hasVarAC?(totVarEurAC/totCtvAC)*100:null;

      // ── Righe strumento ──

        if(p.isBond){

          else if(lkp){ rawPrice=lkp.price; stale=true; }

        }

        var livePrice=rawPrice;
        var ctv=livePrice!=null?(p.isBond?livePrice/100*p.qty:livePrice*p.qty):null;
        var diff=ctv!=null?ctv-p.cost:null;
        var diffPct=p.cost>0&&diff!=null?(diff/p.cost)*100:null;
        var varEur=ctv!=null&&changePct!=null?ctv*(changePct/100):null;
        var noPrice=!livePrice;
        var grey=noPrice&&!stale;
        var isEditing=editingIsin===cacheKey;
        var displayPrice=p.isBond?livePrice:livePrice; // bond price shown as % directly

        result.push(

                      onClick={function(e){e.stopPropagation();setEditingIsin(cacheKey);setEditingVal(manualP?String(manualP.price):"");}}>✏️</span>}
                    {isEditing&&<span onClick={function(e){e.stopPropagation();}} style={{display:"inline-flex",alignItems:"center",gap:4,flexShrink:0}}>
                      <input autoFocus type="number" step="0.01" placeholder="es. 98.50"

                        value={editingVal} onChange={function(e){setEditingVal(e.target.value);}}

            </td>
            {view==="ALL"&&<><td>{fN(p.qty,p.isBond?0:p.qty%1===0?0:2)}</td><td>{fN(p.isBond?pmc*100:pmc,2)}</td></>}
            {view==="ALL"?<>

  const [plOpenModal,setPlOpenModal] = useState(false); // torna a plDetail dopo chiusura sub-modal
  const [activeCedMi,setActiveCedMi] = useState(null); // active month in cedole chart
  const [activeCedInst,setActiveCedInst] = useState(null); // active instrument filter
  const [form,setForm]   = useState(EMPTY);
  const [ferr,setFerr]   = useState({});
  const [snapForm,setSnapForm] = useState({date:today(),value:"",is_initial:false});
  const [serr,setSerr]   = useState({});
  const [snapEdit,setSnapEdit] = useState(null); // snap being edited
  const [txF,setTxF]     = useState({type:"ALL",ac:"ALL",inst:null});
  const [livePrices,setLivePrices] = useState({});
  const [bondPrices,setBondPrices] = useState({});
  const [manualBondPrices,setManualBondPrices] = useState({});
  const [pricesCacheVer, setPricesCacheVer] = useState(0); // bump to re-render after cache load
  const [liveLoading,setLiveLoading] = useState(false);
  const [liveDonut,setLiveDonut] = useState(false);
  const [holdingsView,setHoldingsView] = useState("ALL");
  const [lastUpdated,setLastUpdated] = useState(null);
  const [snapNotice,setSnapNotice] = useState(false);
  const [autoSnapDone,setAutoSnapDone] = useState(false);
  const [autoSnapNotice,setAutoSnapNotice] = useState(false);
  const [snapImpactWarning,setSnapImpactWarning] = useState(null);
  const [showDeleteAccount,setShowDeleteAccount] = useState(false);
  const [recoveryMode,setRecoveryMode] = useState(false);
  const [newPwd,setNewPwd] = useState("");
  const [newPwdErr,setNewPwdErr] = useState("");
  const [newPwdLoading,setNewPwdLoading] = useState(false);
  const [showUserMenu,setShowUserMenu] = useState(false);
  const [lightMode,setLightMode] = useState(()=>localStorage.getItem("tf_theme")==="light"); // {snaps:[...]} o null
  const [txDetail,setTxDetail] = useState(null); // tx detail modal
  const [showCosts,setShowCosts] = useState(false);

  // Reset stuck syncStatus when returning to tab
  useEffect(()=>{
    const onVis = () => {
      if(document.visibilityState === "visible") {
        setTimeout(()=>{
          setSyncStatus(s => s==="saving" ? "" : s);
        }, 2000);
      }
    };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, []);

  // ESC key clears all modals
  useEffect(()=>{
    const onKey = (e) => {
      if(e.key === "Escape") {
        setSnapNotice(false);
        setAutoSnapNotice(false);
        setSnapImpactWarning(null);
        setShowUserMenu(false);
        setPlDetailModal(false);
        setPlOpenModal(false);
        setTxDetail(null);
        setShowCosts(false);
        setConfirmDlg(null);
        setSellModal(false);
        setCedoleModal(false);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);
  const [skipWelcome,setSkipWelcome] = useState(false);

  const [syncStatus,setSyncStatus] = useState("loading");

  // Init session on mount
  useEffect(()=>{
    let dataLoadStarted = false; // evita doppia loadData da SIGNED_IN + getSession

    const { data: listener } = _sb.auth.onAuthStateChange(async (_event, s) => {
      _currentSession = s;
      if(_event === "SIGNED_IN") {
        // loadData è gestito solo da getSession — SIGNED_IN aggiorna solo la sessione
        if(window._tf_is_recovery) { setSession(s); return; }
        if(impUidRef.current) { setSession(s); return; }
        setSession(s);
        return;
      }
      if(_event === "TOKEN_REFRESHED") {
        _currentSession = s;
        return; // non ricaricare dati — se stiamo impersonando, mantieni stato corrente
      }
      if(_event === "SIGNED_OUT") {
        dataLoadStarted = false;
        setSession(null); setUserProfile(null); setImpUid(null); setImpEmail(null);
        setTxs([]); setSnaps([]); setAnagrafe([]); setReady(false); setLoading(true);
        return;
      }
    });

    if(window._tf_is_recovery) {
      setRecoveryMode(true);
      setReady(true);
      setLoading(false);
      (async()=>{
        try { await _sb.auth.getSessionFromUrl({ storeSession: true }); } catch(e) {}
      })();
    } else {
      (async()=>{
        const { data:{ session:s } } = await _sb.auth.getSession();
        _currentSession = s;
        setSession(s);
        if(s) {
          dataLoadStarted = true;
          try {
            const hdr = getHdr();
            const pr = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${s.user.id}&select=role`, {headers:hdr});
            if(pr.ok) { const pd = await pr.json(); if(pd[0]) setUserProfile({role:pd[0].role}); }
          } catch(e) { console.warn("profile load", e); }
          await loadData(null);
        } else {
          setReady(true); setLoading(false);
        }
      })();
    }
    return () => listener?.subscription?.unsubscribe();
  },[]);

  async function loadData(uid) {
    setLoading(true);
    try {
      setSyncStatus("loading");
      // Load prices cache for this user
      const effectiveUid2 = uid || session?.user?.id || _currentSession?.user?.id;
      if(effectiveUid2) { await loadPricesCache(effectiveUid2); setPricesCacheVer(v=>v+1); }
      let tRows, sRows, aRows;
      if(uid) {
        const [result, anagRes] = await Promise.all([
          adminCall("get-data", {user_id: uid}),
          sbLoad("anagrafe"),
        ]);
        tRows = result.transactions;
        sRows = result.snapshots;
        aRows = anagRes;
      } else {
        [tRows, sRows, aRows] = await Promise.all([
          sbLoad("transactions_new", null),
          sbLoad("snapshot", null),
          sbLoad("anagrafe"),
        ]);
      }
      const anagList = aRows.map(rowToAnagrafe);
      const anagMap = Object.fromEntries(anagList.map(a=>[a.id,a]));
      setAnagrafe(anagList);
      setTxs(tRows.map(r=>rowToTx(r,anagMap)));
      setSnaps(sRows.map(rowToSnap));
      setReady(true);
      setLoading(false);
      setSyncStatus("");
    } catch(e) {
      console.error(e);
      setLoading(false);
      setSyncStatus("error");
      setTimeout(()=>setSyncStatus(""),3000);
    }
  }

  async function doLogin() {
    setAuthLoading(true); setAuthErr("");
    setLoading(true); // blocca wizard prima che SIGNED_IN scatti durante signInWithPassword
    const { error } = await _sb.auth.signInWithPassword({email:authEmail, password:authPwd});
    if(error) { setAuthErr(error.message); setAuthLoading(false); setLoading(false); return; }
    const { data:{ session:s } } = await _sb.auth.getSession();

  async function updateInitialAndCascade(allTxs, txDate, userId) {

      const todayStr = today();
      const currentSnaps = snapsRef.current;

      // 1. Aggiorna sempre initial
      const buySell = allTxs.filter(t=>t.type==="BUY"||t.type==="SELL");
      if(!buySell.length) return;
      const oldestDate = buySell.reduce((m,t)=>t.date<m?t.date:m, buySell[0].date);
      const initialInv = investitoAt(allTxs, oldestDate);
      const existingInitial = currentSnaps.find(s=>s.is_initial);
      const initialRow = {data: oldestDate, totale_pf: initialInv, is_initial: true, user_id: userId};
      if(existingInitial) {
        impUid ? await adminCall("update-snap",{id:existingInitial.id,row:initialRow}) : await sbUpdate("snapshot", existingInitial.id, initialRow);
        setSnaps(p=>p.map(s=>s.id===existingInitial.id?{...s,date:oldestDate,value:initialInv,is_initial:true}:s));
      } else {
        const ins = impUid ? await adminCall("insert-snap",{row:initialRow}) : await sbInsert("snapshot", initialRow);
        setSnaps(p=>[...p,{id:ins?.id||Date.now(),date:oldestDate,value:initialInv,is_initial:true}].sort((a,b)=>a.date.localeCompare(b.date)));
      }

      // 2. Verifica snapshot impattati — no cascade, avvisa l'utente
      const impattati = currentSnaps.filter(s=>!s.is_initial && s.date>=txDate && s.date<=todayStr);
      if(impattati.length > 0) {

    } catch(e) { console.error("cascade error", e); }

          if(lkp) results[p.ticker]={price:lkp.price,currency:"",change_pct:null,stale:true};

    const bondResults = {};

          signal:AbortSignal.timeout(25000)
        });
        if(!r.ok) throw new Error("HTTP "+r.status);
        const d = await r.json();
        if(d.price&&d.price>0) {
          bondResults[p.isin]={price:d.price,change_pct:(d.change_pct!=null?d.change_pct:null)};
          saveLastKnownPrice(p.isin, d.price, "live");
        } else {
          const lkp = _pricesCache[p.isin]||null;
          if(lkp) bondResults[p.isin]={price:lkp.price,change_pct:null,stale:true};
          else bondResults[p.isin]={error:"N/D"};
        }
      } catch(e) { bondResults[p.isin]={error:e.message}; }

            grandTotalCalc += price!=null?price*p.qty:p.cost;
          });
          bondPositions.forEach(p=>{

            const price = bp&&bp.price>0?bp.price:(_pricesCache[p.isin]?.price||null);
            grandTotalCalc += price!=null?price/100*p.qty:p.cost;

          const newTotale = isBondUpd ? updated.qty*updated.price/100 : updated.qty*updated.price;

            const totale_actual=orig.type==="BUY"?(orig.totale||0):-(orig.totale||0);

                        <tr style={{borderTop:"1px solid var(--b)"}}>
                          <td style={{fontWeight:700}}>Totale</td>
                          {Array(12).fill(null).map((_,i)=><td key={i}/>)}
                          <td className={grandTot>0?"green":grandTot<0?"red":"mu"} style={{fontWeight:700}}>{fN(grandTot)}</td>
                        </tr>
                        <tr>
                          <td style={{color:"var(--m)"}}>Tax</td>
                          {Array(12).fill(null).map((_,i)=><td key={i}/>)}
                          <td className={grandTax>0?"red":grandTax<0?"green":"mu"}>{fN(grandTax)}</td>
                        </tr>
                        <tr>
                          <td style={{color:"var(--m)"}}>Net</td>
                          {Array(12).fill(null).map((_,i)=><td key={i}/>)}
                          <td className={grandNet>0?"green":grandNet<0?"red":"mu"} style={{fontWeight:700}}>{fN(grandNet)}</td>
                        </tr>
                      </>);
                    })()}
                  </tbody>
                </table>
              </div>
            </>
          ) : (
            /* ── YEAR view: stacked bar + instrument×month table ── */
            <>
              <div style={{marginBottom:12,overflowX:"auto"}}>
                {(()=>{
                  const filtInsts = activeCedInst ? [activeCedInst] : cedInsts;
                  const filtByMonth = activeCedInst
                    ? Object.fromEntries(Object.entries(cedByMonth).map(([k,v])=>
                        [k, {[activeCedInst]: v[activeCedInst]||0}]))
                    : cedByMonth;
                  return <StackedBar byMonth={filtByMonth} insts={filtInsts} allInsts={cedInsts} activeMi={activeCedMi} onBar={mi=>setActiveCedMi(mi)} onClear={()=>setActiveCedMi(null)}/>;
                })()}
              </div>
              <div style={{overflowX:"auto"}}>
                <table>
                  <thead><tr>
                    <th>Strumento</th>
                    {activeCedMi==null ? MN.map((m,i)=><th key={i}>{m}</th>) : <th>{MN[activeCedMi]}</th>}
                    {activeCedMi==null && <th>Totale</th>}
                  </tr></thead>
                  <tbody>
                    {cedInsts.map(inst=>{
                      const tot=activeCedMi!=null
                        ? (cedByMonth[activeCedMi]||{})[inst]||0
                        : Object.values(cedByMonth).reduce((s,m)=>s+(m[inst]||0),0);
                      if(!tot) return null;
                      const instActive=activeCedInst===inst;
                      const instDimmed=activeCedInst&&!instActive;
                      return(
                        <tr key={inst} style={{opacity:instDimmed?0.3:1,cursor:"pointer"}}
                          onClick={e=>{e.stopPropagation();setActiveCedInst(instActive?null:inst);}}>
                          <td><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{flexShrink:0,width:8,height:8,borderRadius:"50%",background:INST_COLORS[cedInsts.indexOf(inst)%INST_COLORS.length]}}/><span style={{fontWeight:600,color:"var(--t)"}}>{inst}{instActive?" ✓":""}</span></div></td>
                          {activeCedMi!=null
                            ? <td className="green">{fN(tot)}</td>
                            : <>{MN.map((_,i)=>{const v=(cedByMonth[i]||{})[inst]||0;
                                return <td key={i} className={v>0?"green":v<0?"red":"mu"}>{v?fN(v):"—"}</td>;})}
                              <td className="green" style={{fontWeight:700}}>{fN(tot)}</td></>
                          }
                        </tr>
                      );
                    })}
                    {(()=>{
                      const miList = activeCedMi!=null ? [activeCedMi] : Array.from({length:12},(_,i)=>i);
                      const totals = miList.map(i=>Object.values(cedByMonth[i]||{}).reduce((s,v)=>s+v,0));
                      const taxes  = miList.map(i=>taxCedByMonth[i]||0);
                      const grandTot=totals.reduce((a,b)=>a+b,0);
                      const grandTax=taxes.reduce((a,b)=>a+b,0);
                      return (<>
                        <tr style={{borderTop:"1px solid var(--b)"}}>
                          <td style={{fontWeight:700}}>Totale</td>
                          {activeCedMi!=null
                            ? <td className="green" style={{fontWeight:700}}>{fN(grandTot)}</td>
                            : <>{miList.map(i=><td key={i} className={totals[i]>0?"green":totals[i]<0?"red":"mu"} style={{fontWeight:700}}>{totals[i]?fN(totals[i]):"—"}</td>)}<td className={grandTot>0?"green":grandTot<0?"red":"mu"} style={{fontWeight:700}}>{fN(grandTot)}</td></>
                          }
                        </tr>
                        <tr>
                          <td style={{color:"var(--m)"}}>Tax</td>
                          {activeCedMi!=null
                            ? <td className="red">{fN(grandTax)}</td>
                            : <>{miList.map(i=><td key={i} className={taxes[i]>0?"red":taxes[i]<0?"green":"mu"}>{taxes[i]?fN(taxes[i]):"—"}</td>)}<td className={grandTax>0?"red":grandTax<0?"green":"mu"}>{fN(grandTax)}</td></>
                          }
                        </tr>
                        <tr>
                          <td style={{color:"var(--m)"}}>Net</td>
                          {activeCedMi!=null
                            ? <td className="green" style={{fontWeight:700}}>{fN(grandTot-grandTax)}</td>
                            : <>{miList.map(i=>{const n=totals[i]-taxes[i];return <td key={i} className={n>0?"green":n<0?"red":"mu"}>{n?fN(n):"—"}</td>;})})<td className={grandTot-grandTax>0?"green":grandTot-grandTax<0?"red":"mu"} style={{fontWeight:700}}>{fN(grandTot-grandTax)}</td></>
                          }
                        </tr>
                      </>);
                    })()}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </div>
      </div>
    )}

    {/* TX MODAL */}
    {modal&&(
      <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal">
          <div className="mhdr">
            <div className="mtitle">{typeof modal==="string"?"Nuova Transazione":"Modifica Transazione"}</div>
            <button className="mx" onClick={()=>setModal(null)}>✕</button>
          </div>
          <div className="fg2">
            <div className="fg"><label>Data</label>
              <input type="date" className={ferr.date?"err":""} value={form.date} onChange={sf("date")}/>
              {ferr.date&&<span className="em">{ferr.date}</span>}
            </div>
            <div className="fg"><label>Tipo</label>
              <select value={form.type} onChange={sf("type")}>
                <option value="BUY">BUY</option><option value="SELL">SELL</option><option value="INCOME">CEDOLA/DIV</option>
              </select>
            </div>
            <div className="fg" style={{gridColumn:"span 2"}}>
              <label>Nome</label>
              <input list="il-name" className={ferr.instrument?"err":""} value={form.instrument}
                onChange={e=>{
                  const val=e.target.value;
                  const anag=instList.find(a=>a.asset===val);
                  if(anag) setForm(p=>({...p,instrument:anag.asset,assetClass:anag.assetClass,prodotto:anag.prodotto||"",isin:anag.isin||"",ticker:anag.ticker||"",anagrafeId:anag.id}));
                  else setForm(p=>({...p,instrument:val,anagrafeId:null}));
                }}
                onBlur={e=>{
                  const val=e.target.value.trim();
                  if(val&&!instList.find(a=>a.asset===val))
                    setFerr(f=>({...f,instrument:"Titolo non censito — contatta l'admin"}));
                }}
                onFocus={()=>setFerr(f=>({...f,instrument:undefined}))}
                placeholder=""/>
              <datalist id="il-name">{instList.map(a=><option key={a.id} value={a.asset}/>)}</datalist>
              {ferr.instrument&&<span className="em">{ferr.instrument}</span>}
            </div>
            <div className="fg"><label>ISIN</label>
              <input list="il-isin" className={ferr.isin?"err":""} value={form.isin||""}
                onChange={e=>{
                  const val=e.target.value;
                  const anag=instList.find(a=>a.isin===val);
                  if(anag) { setForm(p=>({...p,instrument:anag.asset,assetClass:anag.assetClass,prodotto:anag.prodotto||"",isin:anag.isin||"",ticker:anag.ticker||"",anagrafeId:anag.id})); setFerr(f=>({...f,instrument:undefined,isin:undefined})); }
                  else setForm(p=>({...p,isin:val,anagrafeId:null}));
                }}
                onBlur={e=>{
                  const val=e.target.value.trim();
                  if(val&&!instList.find(a=>a.isin===val))
                    setFerr(f=>({...f,isin:"ISIN non censito — contatta l'admin"}));
                }}
                onFocus={()=>setFerr(f=>({...f,isin:undefined}))}
                placeholder=""/>
              <datalist id="il-isin">{instList.map(a=>a.isin?<option key={a.id} value={a.isin}>{a.asset}</option>:null)}</datalist>
              {ferr.isin&&<span className="em">{ferr.isin}</span>}
            </div>
            <div className="fg"><label>Strumento</label>
              <input readOnly value={form.prodotto||"— da strumento —"}
                style={{opacity:0.6,cursor:"not-allowed",background:"var(--s2)",
                  border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",
                  color:form.prodotto?"var(--t)":"var(--m)",width:"100%",boxSizing:"border-box",fontFamily:"var(--mono)",fontSize:13}}/>
            </div>
            <div className="fg"><label>Tipo Asset</label>
              <input readOnly value={form.assetClass||"— da strumento —"}
                style={{opacity:0.6,cursor:"not-allowed",background:"var(--s2)",
                  border:"1px solid var(--b)",borderRadius:6,padding:"8px 10px",
                  color:form.assetClass?"var(--t)":"var(--m)",width:"100%",boxSizing:"border-box",fontFamily:"var(--mono)",fontSize:13}}/>
              {ferr.assetClass&&<span className="em">{ferr.assetClass}</span>}
            </div>

            {isI?(
              <div className="fg" style={{gridColumn:"span 2"}}>
                <label>Importo Lordo</label>
                <input type="number" step="any" className={ferr.amount?"err":""} value={form.amount} onChange={sf("amount")}/>
                {ferr.amount&&<span className="em">{ferr.amount}</span>}
              </div>
            ):<>
              <div className="fg"><label>Quantità</label>
                <input type="number" className={ferr.qty?"err":""} value={form.qty} onChange={sf("qty")}/>
                {ferr.qty&&<span className="em">{ferr.qty}</span>}
              </div>
              <div className="fg"><label>Prezzo {isBond?"(%)":""}</label>
                <input type="number" className={ferr.price?"err":""} value={form.price} onChange={sf("price")}/>
                {ferr.price&&<span className="em">{ferr.price}</span>}
              </div>
              <div className="fg"><label>Commissioni (opz.)</label>
                <input type="number" value={form.commission} onChange={sf("commission")} disabled={isI} style={{opacity:isI?0.3:1}}/>
              </div>
            </>}
            {(form.type==="SELL"||isI)&&(
              <div className="fg"><label>Tax</label>
                <input type="number" step="any" value={form.tax} onChange={sf("tax")}/>
              </div>
            )}
          </div>
          <div className="fg" style={{gridColumn:"span 2",marginTop:4}}>
            <label>Commenti</label>
            <input type="text" value={form.commenti||""} onChange={sf("commenti")} placeholder="Note opzionali"/>
          </div>
          {!isI&&totPreview>0&&(
            <div className="totbox">
              <span style={{fontSize:10,color:"var(--m)",textTransform:"uppercase",letterSpacing:".08em"}}>Totale{isBond?" · prezzo %":""}</span>
              <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:700,color:"var(--t)"}}>{fN(totPreview)}</div>
              {(+form.commission)>0&&<div style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--m)"}}>{fN(totPreview+(+form.commission))} con comm.</div>}
            </div>
          )}
          {isI&&form.amount!==""&&(
            <div className="totbox">
              <span style={{fontSize:10,color:"var(--m)",textTransform:"uppercase",letterSpacing:".08em"}}>Netto</span>
              <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:700,color:"var(--g)"}}>{fN((+form.amount||0)-(+form.tax||0))}</div>
            </div>
          )}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn bg_" onClick={()=>setModal(null)}>Annulla</button>
            <button className="btn bp" onClick={saveTx}>{typeof modal==="string"?"Salva":"Aggiorna"}</button>
          </div>
        </div>
      </div>
    )}
  </>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
